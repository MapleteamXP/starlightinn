<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="-1">
<meta name="cache-control" content="no-cache">
<title>Starlight Inn v19.5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0}
canvas{display:block}

/* Loading */
#loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;z-index:9999;transition:opacity .6s}
#loading.done{opacity:0;pointer-events:none}
#loading h1{color:#9370DB;font-size:40px;letter-spacing:6px;margin-bottom:20px;text-shadow:0 0 30px rgba(147,112,219,.4)}
#loading .bar{width:300px;height:10px;background:#1a1a2e;border-radius:5px;border:1px solid #333;overflow:hidden}
#loading .fill{width:0%;height:100%;background:linear-gradient(90deg,#9370DB,#32CD32);transition:width .3s}
#loading .txt{color:#666;margin-top:12px;font-size:13px}

/* Title */
#title{position:fixed;inset:0;display:none;z-index:5000}
#title.on{display:block}
#title .bg{position:absolute;inset:0}
#title .bg img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
#title .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,26,.3),rgba(10,10,26,.95))}
#title .content{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;width:90%;max-width:400px}
#title .logo{color:#9370DB;font-size:44px;font-weight:bold;letter-spacing:6px;text-shadow:0 0 40px rgba(147,112,219,.5);margin-bottom:6px}
#title .sub{color:#32CD32;font-size:13px;letter-spacing:3px;margin-bottom:30px}
#title .btn{display:block;width:100%;max-width:280px;margin:8px auto;padding:14px 24px;font-size:16px;font-weight:bold;border:none;border-radius:10px;cursor:pointer;letter-spacing:1px;transition:transform .15s}
#title .btn:hover{transform:scale(1.04)}
#title .bp{background:linear-gradient(135deg,#9370DB,#8A2BE2);color:#fff;box-shadow:0 4px 20px rgba(147,112,219,.3)}
#title .bg2{background:linear-gradient(135deg,#32CD32,#228B22);color:#fff}
#title .bb{background:linear-gradient(135deg,#4169E1,#1E90FF);color:#fff}
#title .row{display:flex;gap:10px;justify-content:center}
#title .row .btn{max-width:135px;font-size:14px;padding:10px}
#title .ver{position:fixed;bottom:10px;right:14px;color:#333;font-size:11px}

/* Auth */
#auth{position:fixed;inset:0;display:none;z-index:4500;background:rgba(10,10,26,.95);align-items:center;justify-content:center}
#auth.on{display:flex}
#auth .box{background:linear-gradient(180deg,#1a1a2e,#0f0f1a);border:2px solid #9370DB;border-radius:16px;padding:32px;width:360px;max-width:90vw}
#auth .box h2{color:#9370DB;text-align:center;margin-bottom:20px;font-size:22px}
#auth .box label{display:block;color:#888;font-size:12px;margin-top:10px;margin-bottom:4px}
#auth .box input{width:100%;padding:12px;border:2px solid #333;border-radius:8px;background:#0a0a1a;color:#fff;font-size:15px;outline:none}
#auth .box input:focus{border-color:#32CD32}
#auth .box .err{color:#ff4444;font-size:13px;text-align:center;margin:8px 0;min-height:18px}
#auth .box .abtn{width:100%;padding:14px;margin-top:14px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:16px}
#auth .box .ap{background:linear-gradient(135deg,#9370DB,#8A2BE2);color:#fff}
#auth .box .ag{background:#333;color:#fff;margin-top:8px}
#auth .box .swap{text-align:center;color:#888;font-size:13px;margin-top:14px;cursor:pointer}
#auth .box .swap span{color:#32CD52;text-decoration:underline}

/* Character */
#char{position:fixed;inset:0;display:none;z-index:4000;background:#0a0a1a;overflow-y:auto}
#char.on{display:block}
#char .head{text-align:center;padding:24px;border-bottom:1px solid #222;position:sticky;top:0;background:#0a0a1a;z-index:10}
#char .head h1{color:#9370DB;font-size:28px}
#char .head p{color:#888;font-size:13px;margin-top:4px}
#char .body{max-width:900px;margin:0 auto;padding:24px;display:flex;gap:24px}
#char .left{flex:1}
#char .right{flex:0 4;align-self:flex-start;position:sticky;top:80px}
#char .sec{background:rgba(255,255,255,.02);border:1px solid #222;border-radius:12px;padding:16px;margin-bottom:16px}
#char .sec h3{color:#32CD32;font-size:12px;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
#char .gend{display:flex;gap:8px}
#char .gend button{flex:1;padding:10px;border:2px solid #333;border-radius:8px;background:transparent;color:#666;font-weight:bold;cursor:pointer}
#char .gend button.on{border-color:#9370DB;color:#9370DB;background:rgba(147,112,219,.1)}
#char .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
#char .cell{cursor:pointer;border:3px solid #333;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.03);aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;transition:all .15s}
#char .cell:hover{border-color:#666;transform:translateY(-2px)}
#char .cell.on{border-color:#32CD32;background:rgba(50,205,50,.08);box-shadow:0 0 15px rgba(50,205,50,.2)}
#char .cell img{width:80%;height:80%;object-fit:contain;image-rendering:pixelated}
#char .colors{display:flex;gap:8px;flex-wrap:wrap}
#char .colors .dot{width:28px;height:28px;border-radius:50%;border:2px solid #333;cursor:pointer;transition:all .15s}
#char .colors .dot:hover{transform:scale(1.15);border-color:#fff}
#char .colors .dot.on{border-color:#32CD32;box-shadow:0 0 8px rgba(50,205,50,.4)}
#char .preview{width:180px;height:260px;background:rgba(255,255,255,.03);border:3px solid #9370DB;border-radius:14px;display:flex;align-items:center;justify-content:center}
#char .preview img{max-width:90%;max-height:90%;image-rendering:pixelated;object-fit:contain}
#char .acts{display:flex;gap:10px;margin-top:16px;justify-content:center}
#char .acts button{padding:12px 24px;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
#char .acts .sv{background:linear-gradient(135deg,#9370DB,#8A2BE2);color:#fff}
#char .acts .bk{background:#333;color:#fff}

/* Game */
#game{position:fixed;inset:0;display:none;z-index:100}
#game.on{display:block}
#game canvas{position:absolute;inset:0}

/* Top bar */
#tbar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(10,10,20,.92);border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:500}
#tbar .grp{display:flex;align-items:center;gap:8px}
#tbar button{padding:6px 14px;border:1px solid #444;border-radius:6px;background:rgba(255,255,255,.05);color:#ccc;font-size:11px;font-weight:bold;cursor:pointer}
#tbar button:hover{border-color:#9370DB;color:#9370DB}
#tbar .rname{color:#32CD32;font-weight:bold;font-size:14px}
#tbar .cur{font-size:12px;font-weight:bold}
#tbar .cg{color:#FFD700}
#tbar .cm{color:#87CEEB}
#tbar .cl{color:#9370DB}

/* Bottom bar */
#bbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(10,10,20,.95);border-top:1px solid #333;display:flex;align-items:center;padding:0 14px;gap:8px;z-index:500}
#bbar input{flex:1;max-width:360px;padding:9px 16px;border:1px solid #444;border-radius:20px;background:#0a0a1a;color:#fff;font-size:13px;outline:none}
#bbar input:focus{border-color:#9370DB}
#bbar button{padding:8px 16px;border:1px solid #444;border-radius:6px;background:rgba(255,255,255,.05);color:#ccc;font-size:11px;cursor:pointer}
#bbar button:hover{border-color:#32CD32;color:#32CD32}

/* Panels */
.pan{position:fixed;background:rgba(10,10,20,.96);border:2px solid #9370DB;border-radius:14px;z-index:600;display:none;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.pan.on{display:flex}
.pan .ph{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #333;background:rgba(147,112,219,.05)}
.pan .ph h2{color:#9370DB;font-size:16px}
.pan .ph .x{background:none;border:none;color:#9370DB;font-size:22px;cursor:pointer;width:30px}
.pan .pb{padding:14px;overflow-y:auto;flex:1}

/* Room cards */
.rcard{background:rgba(255,255,255,.03);border:1px solid #333;border-radius:10px;padding:12px;cursor:pointer;transition:all .15s}
.rcard:hover{border-color:#32CD32;background:rgba(50,205,50,.05);transform:scale(1.02)}
.rcard .icon{font-size:36px;text-align:center;margin-bottom:6px}
.rcard .nm{color:#32CD32;font-size:13px;font-weight:bold;text-align:center}
.rcard .ds{color:#777;font-size:11px;text-align:center;margin-top:3px}

/* Chat */
.cmsg{position:absolute;background:rgba(0,0,0,.8);border:1px solid rgba(147,112,219,.4);border-radius:10px;padding:8px 12px;color:#fff;font-size:12px;max-width:200px;pointer-events:none;z-index:200;transform:translate(-50%,-100%);margin-top:-14px}
.cmsg .cn{color:#9370DB;font-weight:bold;font-size:10px;margin-bottom:2px}

/* Exits */
@keyframes pulse{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}
</style>
</head>
<body>

<div id="loading">
  <h1>STARLIGHT INN</h1>
  <div class="bar"><div class="fill" id="lfill"></div></div>
  <div class="txt" id="ltxt">Loading...</div>
</div>

<div id="title">
  <div class="bg"><img src="assets/title-bg-v16.png?v=19" alt=""></div>
  <div class="ov"></div>
  <div class="content">
    <div class="logo">STARLIGHT INN</div>
    <div class="sub">A COZY VIRTUAL WORLD</div>
    <div id="welcome" style="color:#aaa;font-size:13px;margin-bottom:12px;display:none"></div>
    <button class="btn bp" onclick="goPlay()">PLAY NOW</button>
    <div class="row">
      <button class="btn bg2" onclick="showAuth('login')">LOG IN</button>
      <button class="btn bb" onclick="showAuth('register')">REGISTER</button>
    </div>
    <div class="ver">v19.5</div>
  </div>
</div>

<div id="auth">
  <div class="box">
    <h2 id="atitle">Welcome Back</h2>
    <label>Username</label>
    <input type="text" id="auser" placeholder="Your name" maxlength="16">
    <label>Password</label>
    <input type="password" id="apass" placeholder="Password" maxlength="32">
    <div class="err" id="aerr"></div>
    <button class="abtn ap" id="abtn" onclick="doAuth()">LOG IN</button>
    <button class="abtn ag" onclick="backTitle()">BACK</button>
    <div class="swap" id="aswap" onclick="swapAuth()">No account? <span>Register</span></div>
  </div>
</div>

<div id="char">
  <div class="head"><h1>Create Your Character</h1><p>Choose your look</p></div>
  <div class="body">
    <div class="left">
      <div class="sec">
        <h3>Gender</h3>
        <div class="gend">
          <button class="on" data-g="boy" onclick="pickGender('boy')">BOY</button>
          <button data-g="girl" onclick="pickGender('girl')">GIRL</button>
        </div>
      </div>
      <div class="sec">
        <h3>Choose Character</h3>
        <div class="grid" id="cgrid"></div>
      </div>
    </div>
    <div class="right">
      <div class="preview" id="preview"><img id="pimg" src=""></div>
      <div class="acts">
        <button class="sv" onclick="saveChar()">SAVE & PLAY</button>
        <button class="bk" onclick="backTitle()">BACK</button>
      </div>
    </div>
  </div>
</div>

<div id="game">
  <canvas id="gc"></canvas>
  <div id="chatlyr" style="position:absolute;inset:0;pointer-events:none;z-index:150"></div>
  <div id="pathlyr" style="position:absolute;inset:0;pointer-events:none;z-index:50"></div>

  <div id="tbar">
    <div class="grp">
      <button onclick="togglePan('rooms')">NAVIGATOR</button>
      <span class="rname" id="rnm">Grand Lobby</span>
    </div>
    <div class="grp">
      <span class="cur cg">GOLD: <span id="cg">500</span></span>
      <span class="cur cm">GEMS: <span id="cm">50</span></span>
      <span class="cur cl">LVL: <span id="cl">1</span></span>
    </div>
  </div>

  <div id="bbar">
    <input type="text" id="ci" placeholder="Press Enter to chat..." onkeydown="if(event.key==='Enter'){doChat(this.value);this.value=''}">
    <button onclick="togglePan('rooms')">ROOMS</button>
    <button onclick="backTitle()">QUIT</button>
  </div>

  <div id="rooms" class="pan" style="width:380px;height:480px;top:52px;left:10px">
    <div class="ph"><h2>Room Navigator</h2><button class="x" onclick="closePan('rooms')">&times;</button></div>
    <div class="pb"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px" id="rlist"></div></div>
  </div>
</div>

<script>

// ============ CONFIG ============
const VER = '19.5';
const GH = 'https://mapleteamxp.github.io/starlightinn';
const ASSET = (p) => GH+'/'+p+'?v='+VER;

const ROOMS = [
  {id:'lobby',name:'Grand Lobby',icon:'🏛️',desc:'Main gathering hall',w:1200,h:800,walk:[100,1100,400,750],spawn:[600,600]},
  {id:'tavern',name:'Moonlight Tavern',icon:'🍺',desc:'Food and drinks',w:1000,h:700,walk:[80,920,350,650],spawn:[500,520]},
  {id:'garden',name:'Starlight Garden',icon:'🌸',desc:'Peaceful nature retreat',w:1100,h:750,walk:[100,1000,380,700],spawn:[550,550]},
  {id:'library',name:'Ancient Library',icon:'📚',desc:'Quiet reading space',w:1000,h:700,walk:[80,920,350,650],spawn:[500,520]},
  {id:'bedroom',name:'Cozy Bedroom',icon:'🛏️',desc:'Rest and relax',w:900,h:650,walk:[70,830,330,600],spawn:[450,480]},
  {id:'beach',name:'Midnight Beach',icon:'🏖️',desc:'Ocean breeze at night',w:1100,h:750,walk:[100,1000,380,700],spawn:[550,550]},
  {id:'rooftop',name:'Rooftop Lounge',icon:'🌃',desc:'City views above',w:1000,h:700,walk:[80,920,350,650],spawn:[500,520]},
  {id:'arcade',name:'Pixel Arcade',icon:'🎮',desc:'Games and fun',w:1000,h:700,walk:[80,920,350,650],spawn:[500,520]},
  {id:'spa',name:'Crystal Spa',icon:'💎',desc:'Relaxation and wellness',w:900,h:650,walk:[70,830,330,600],spawn:[450,480]},
  {id:'market',name:'Night Market',icon:'🛒',desc:'Trade and shop',w:1100,h:750,walk:[100,1000,380,700],spawn:[550,550]},
  {id:'event',name:'Event Hall',icon:'🎉',desc:'Special events',w:1200,h:800,walk:[100,1100,400,750],spawn:[600,600]},
  {id:'winter',name:'Winter Cabin',icon:'❄️',desc:'Cozy snow retreat',w:1000,h:700,walk:[80,920,350,650],spawn:[500,520]}
];

const CHARS = [
  {id:'boy_hoodie',name:'Hoodie Boy',g:'boy',src:'assets/sprites/avatars/char_boy_hoodie.png'},
  {id:'girl_dress',name:'Dress Girl',g:'girl',src:'assets/sprites/avatars/char_girl_dress.png'},
  {id:'boy_jacket',name:'Jacket Boy',g:'boy',src:'assets/sprites/avatars/char_boy_jacket.png'},
  {id:'girl_maid',name:'Maid Girl',g:'girl',src:'assets/sprites/avatars/char_girl_maid.png'},
  {id:'boy_tank',name:'Tank Boy',g:'boy',src:'assets/sprites/avatars/char_boy_tank.png'},
  {id:'wizard',name:'Wizard',g:'boy',src:'assets/sprites/avatars/char_wizard.png'},
  {id:'knight',name:'Knight',g:'boy',src:'assets/sprites/avatars/char_knight.png'},
  {id:'catgirl',name:'Cat Girl',g:'girl',src:'assets/sprites/avatars/char_catgirl.png'},
  {id:'innkeeper',name:'Innkeeper',g:'boy',src:'assets/sprites/avatars/char_innkeeper.png'},
  {id:'vampire',name:'Vampire',g:'boy',src:'assets/sprites/avatars/char_vampire.png'},
  {id:'lady',name:'Lady',g:'girl',src:'assets/sprites/avatars/char_lady.png'},
  {id:'steampunk',name:'Steampunk',g:'boy',src:'assets/sprites/avatars/char_steampunk.png'},
  {id:'goth',name:'Goth Girl',g:'girl',src:'assets/sprites/avatars/char_goth.png'},
  {id:'sporty',name:'Sporty Girl',g:'girl',src:'assets/sprites/avatars/char_sporty.png'}
];

const SKIN_COLORS = ['#FFDBAC','#F1C27D','#E0AC69','#8D5524','#C68642','#F5D0A9','#FFEBC4','#D2A679'];
const HAIR_COLORS = ['#2C1608','#4A2511','#8B4513','#DAA520','#FFD700','#FF4500','#DC143C','#4B0082','#2F4F4F','#C0C0C0','#FFFFFF','#FF69B4'];
const CLOTHES_COLORS = ['#9370DB','#32CD32','#4169E1','#DC143C','#FF8C00','#FFD700','#00CED1','#FF1493','#2F4F4F','#8B4513','#4A0080','#228B22'];

// ============ GAME STATE ============
let ST = {
  screen:'loading', room:null, me:null, users:[], chats:[],
  gold:500, gems:50, lvl:1, xp:0,
  cam:{x:0,y:0}, mx:0, my:0,
  clicked:false, path:[], target:null,
  assets:{}, loaded:0, total:0,
  account:null, char:null, gender:'boy',
  selectedChar:0, selectedSkin:0, selectedHair:0, selectedClothes:0,
  panels:{}, online:8, tick:0
};

let CV, CX, W, H, LOOP;

// ============ STORAGE ============
function saveAcc(a){ localStorage.setItem('si_accounts', JSON.stringify(a||[])) }
function loadAcc(){ try{return JSON.parse(localStorage.getItem('si_accounts')||'[]')}catch(e){return[]} }
function saveSession(u,p){ localStorage.setItem('si_session', JSON.stringify({u,p,t:Date.now()})) }
function loadSession(){ try{return JSON.parse(localStorage.getItem('si_session')||'null')}catch(e){return null} }
function clearSession(){ localStorage.removeItem('si_session') }
function saveCharData(c){ localStorage.setItem('si_char', JSON.stringify(c)) }
function loadCharData(){ try{return JSON.parse(localStorage.getItem('si_char')||'null')}catch(e){return null} }

// ============ ASSET LOADER ============
function preload(){
  const imgs = [];
  // Title bg
  imgs.push(['titlebg', ASSET('assets/title-bg-v16.png')]);
  // Room backgrounds
  ROOMS.forEach(r => imgs.push(['room_'+r.id, ASSET('assets/sprites/rooms/v19/bg_'+r.id+'.png')]));
  // Character sprites
  CHARS.forEach(c => imgs.push(['char_'+c.id, ASSET(c.src)]));

  ST.total = imgs.length;
  let done = 0;

  imgs.forEach(([k,url]) => {
    const img = new Image();
    img.onload = img.onerror = () => {
      done++;
      ST.assets[k] = img;
      updateLoad(done, ST.total);
      if(done >= ST.total) setTimeout(initGame, 300);
    };
    img.src = url;
  });

  // Safety timeout - proceed even if some assets fail
  setTimeout(() => {
    if(ST.screen === 'loading'){ console.log('Force init after timeout'); initGame(); }
  }, 8000);
}

function updateLoad(done,total){
  const pct = Math.round((done/total)*100);
  const f = document.getElementById('lfill');
  const t = document.getElementById('ltxt');
  if(f) f.style.width = pct+'%';
  if(t) t.textContent = 'Loading assets... '+pct+'%';
}


// ============ CHARACTER CREATOR ============
function pickGender(g){
  ST.gender = g;
  document.querySelectorAll('#char .gend button').forEach(b=>b.classList.toggle('on', b.dataset.g===g));
  renderCharGrid();
}

function renderCharGrid(){
  const grid = document.getElementById('cgrid');
  if(!grid) return;
  const filtered = CHARS.filter(c => c.g === ST.gender);
  grid.innerHTML = '';
  filtered.forEach((c, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (idx===ST.selectedChar?' on':'');
    cell.onclick = () => selectChar(idx);
    const img = document.createElement('img');
    img.src = GH+'/'+c.src+'?v='+VER;
    img.alt = c.name;
    cell.appendChild(img);
    grid.appendChild(cell);
  });
}

function selectChar(idx){
  ST.selectedChar = idx;
  renderCharGrid();
  updatePreview();
}

function updatePreview(){
  const filtered = CHARS.filter(c => c.g === ST.gender);
  const ch = filtered[ST.selectedChar];
  if(!ch) return;
  const img = document.getElementById('pimg');
  if(img) img.src = GH+'/'+ch.src+'?v='+VER;
}

function saveChar(){
  const filtered = CHARS.filter(c => c.g === ST.gender);
  const ch = filtered[ST.selectedChar];
  if(!ch){ showErr('Pick a character'); return; }
  ST.char = { ...ch, skin: SKIN_COLORS[ST.selectedSkin], hair: HAIR_COLORS[ST.selectedHair], clothes: CLOTHES_COLORS[ST.selectedClothes] };
  saveCharData(ST.char);
  enterGame();
}

// ============ AUTH SYSTEM ============
let authMode = 'login';

function showAuth(mode){
  authMode = mode;
  const auth = document.getElementById('auth');
  const title = document.getElementById('atitle');
  const btn = document.getElementById('abtn');
  const swap = document.getElementById('aswap');
  const err = document.getElementById('aerr');
  if(err) err.textContent = '';
  if(mode==='login'){
    if(title) title.textContent = 'Welcome Back';
    if(btn) btn.textContent = 'LOG IN';
    if(swap) swap.innerHTML = 'No account? <span>Register</span>';
  } else {
    if(title) title.textContent = 'Join Starlight Inn';
    if(btn) btn.textContent = 'REGISTER';
    if(swap) swap.innerHTML = 'Have an account? <span>Log In</span>';
  }
  if(auth) auth.classList.add('on');
  hide('title'); hide('char');
}

function swapAuth(){ showAuth(authMode==='login'?'register':'login'); }

function doAuth(){
  const user = document.getElementById('auser').value.trim();
  const pass = document.getElementById('apass').value;
  const err = document.getElementById('aerr');
  if(!user||!pass){ if(err) err.textContent='Fill all fields'; return; }
  if(user.length<3){ if(err) err.textContent='Username min 3 chars'; return; }
  if(pass.length<4){ if(err) err.textContent='Password min 4 chars'; return; }

  let accs = loadAcc();
  if(authMode==='register'){
    if(accs.find(a=>a.u===user)){ if(err) err.textContent='Username taken'; return; }
    accs.push({u:user,p:pass});
    saveAcc(accs);
    ST.account = {u:user};
    saveSession(user, pass);
    hide('auth');
    show('char');
    ST.screen = 'char';
    renderCharGrid();
    updatePreview();
  } else {
    const a = accs.find(a=>a.u===user&&a.p===pass);
    if(!a){ if(err) err.textContent='Wrong username or password'; return; }
    ST.account = {u:user};
    saveSession(user, pass);
    const ch = loadCharData();
    if(ch){ ST.char = ch; enterGame(); }
    else { hide('auth'); show('char'); ST.screen='char'; renderCharGrid(); updatePreview(); }
  }
}

function goPlay(){
  const sess = loadSession();
  if(sess && sess.t && Date.now()-sess.t < 7*24*60*60*1000){
    const accs = loadAcc();
    const a = accs.find(x=>x.u===sess.u&&x.p===sess.p);
    if(a){
      ST.account = {u:sess.u};
      const ch = loadCharData();
      if(ch){ ST.char = ch; enterGame(); return; }
      else { show('char'); ST.screen='char'; renderCharGrid(); updatePreview(); return; }
    }
  }
  hide('title'); show('char'); ST.screen='char';
  renderCharGrid(); updatePreview();
}

function backTitle(){
  hide('auth'); hide('char'); show('title'); ST.screen='title';
}

function showErr(msg){
  const e = document.getElementById('aerr');
  if(e) e.textContent = msg;
}

// ============ INIT GAME ============
function initGame(){
  ST.screen = 'title';
  hide('loading'); show('title');

  const sess = loadSession();
  if(sess && sess.u){
    const welcome = document.getElementById('welcome');
    if(welcome){ welcome.textContent = 'Welcome back, '+sess.u; welcome.style.display='block'; }
  }

  setupCanvas();
  setupInput();
  buildRoomList();
}

function setupCanvas(){
  CV = document.getElementById('gc');
  if(!CV) return;
  W = window.innerWidth;
  H = window.innerHeight;
  CV.width = W;
  CV.height = H;
  CX = CV.getContext('2d');
  CX.imageSmoothingEnabled = false;
}

function setupInput(){
  if(!CV) return;
  CV.addEventListener('mousedown', onClick);
  CV.addEventListener('touchstart', onTouch, {passive:false});
  window.addEventListener('keydown', onKey);
  window.addEventListener('resize', ()=>{
    W = window.innerWidth; H = window.innerHeight;
    if(CV){ CV.width=W; CV.height=H; }
  });
}

function buildRoomList(){
  const list = document.getElementById('rlist');
  if(!list) return;
  list.innerHTML = '';
  ROOMS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'rcard';
    card.innerHTML = '<div class="icon">'+r.icon+'</div><div class="nm">'+r.name+'</div><div class="ds">'+r.desc+'</div>';
    card.onclick = () => enterRoom(r.id);
    list.appendChild(card);
  });
}

// ============ ROOM SYSTEM ============
function enterRoom(rid){
  const room = ROOMS.find(r=>r.id===rid);
  if(!room) return;
  ST.room = room;
  ST.chats = [];
  const chatlyr = document.getElementById('chatlyr');
  if(chatlyr) chatlyr.innerHTML = '';

  if(!ST.me){
    ST.me = {
      x: room.spawn[0], y: room.spawn[1],
      tx: room.spawn[0], ty: room.spawn[1],
      vx:0, vy:0, speed:3,
      frame:0, dir:2, walking:false,
      name: ST.account ? ST.account.u : 'Guest',
      char: ST.char || CHARS[0]
    };
  } else {
    ST.me.x = room.spawn[0]; ST.me.y = room.spawn[1];
    ST.me.tx = room.spawn[0]; ST.me.ty = room.spawn[1];
    ST.me.vx = 0; ST.me.vy = 0; ST.me.walking = false;
  }

  // Generate fake NPCs for atmosphere
  ST.users = [];
  const npcNames = ['Luna','Orion','Stella','Cosmo','Aurora','Nova','Celeste','Phoenix'];
  const npcChars = CHARS.filter((c,i) => i < 8);
  for(let i=0; i<ST.online-1; i++){
    const nx = room.walk[0] + Math.random()*(room.walk[1]-room.walk[0]);
    const ny = room.walk[2] + Math.random()*(room.walk[3]-room.walk[2]);
    ST.users.push({
      x:nx, y:ny, tx:nx, ty:ny, vx:0, vy:0, speed:1.5+Math.random(),
      frame:0, dir:Math.floor(Math.random()*4), walking:false,
      name:npcNames[i%npcNames.length], char:npcChars[i%npcChars.length],
      timer: Math.random()*200, targetX:nx, targetY:ny
    });
  }

  ST.screen = 'game';
  hide('loading'); hide('title'); hide('char'); hide('auth');
  show('game');
  const rnm = document.getElementById('rnm');
  if(rnm) rnm.textContent = room.name;

  startLoop();
}

function enterGame(){
  enterRoom('lobby');
}


// ============ GAME LOOP ============
function startLoop(){
  if(LOOP) cancelAnimationFrame(LOOP);
  LOOP = requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(ST.screen !== 'game') return;
  ST.tick++;
  update();
  render();
  LOOP = requestAnimationFrame(gameLoop);
}

function update(){
  // Update me
  updateEntity(ST.me, true);

  // Update NPCs
  ST.users.forEach(u => {
    u.timer++;
    // Random movement every so often
    if(!u.walking && u.timer > 150 + Math.random()*200){
      u.timer = 0;
      const r = ST.room;
      u.targetX = r.walk[0] + Math.random()*(r.walk[1]-r.walk[0]);
      u.targetY = r.walk[2] + Math.random()*(r.walk[3]-r.walk[2]);
      moveTo(u, u.targetX, u.targetY);
    }
    updateEntity(u, false);

    // Stop NPC when close to target
    if(u.walking && Math.abs(u.x-u.tx)<5 && Math.abs(u.y-u.ty)<5){
      u.walking = false; u.vx=0; u.vy=0;
    }
  });

  // Camera follow
  if(ST.me){
    const tx = ST.me.x - W/2;
    const ty = ST.me.y - H/2;
    ST.cam.x += (tx - ST.cam.x) * 0.08;
    ST.cam.y += (ty - ST.cam.y) * 0.08;
  }

  // Update chat bubbles
  updateChats();
}

function updateEntity(e, isMe){
  if(!e) return;
  if(e.walking){
    const dx = e.tx - e.x;
    const dy = e.ty - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < e.speed){
      e.x = e.tx; e.y = e.ty;
      e.walking = false; e.vx=0; e.vy=0;
      e.frame = 0;
    } else {
      e.vx = (dx/dist) * e.speed;
      e.vy = (dy/dist) * e.speed;
      e.x += e.vx; e.y += e.vy;
      // Direction
      if(Math.abs(dx) > Math.abs(dy)){
        e.dir = dx > 0 ? 2 : 0;
      } else {
        e.dir = dy > 0 ? 3 : 1;
      }
      // Animation frame
      if(ST.tick % 8 === 0) e.frame = (e.frame + 1) % 4;
    }
  }
}

function moveTo(e, x, y){
  if(!e || !ST.room) return;
  // Clamp to walkable area
  const w = ST.room.walk;
  x = Math.max(w[0], Math.min(w[1], x));
  y = Math.max(w[2], Math.min(w[3], y));
  e.tx = x; e.ty = y;
  e.walking = true;
}

// ============ RENDER ============
function render(){
  if(!CX) return;
  // Clear
  CX.fillStyle = '#0a0a1a';
  CX.fillRect(0, 0, W, H);

  if(!ST.room) return;

  CX.save();
  CX.translate(-ST.cam.x, -ST.cam.y);

  // Draw room background
  const bgKey = 'room_'+ST.room.id;
  const bg = ST.assets[bgKey];
  if(bg && bg.width > 0){
    // Center the background in the room
    const bx = (ST.room.w - bg.width) / 2;
    const by = (ST.room.h - bg.height) / 2;
    CX.drawImage(bg, bx, by);
  } else {
    // Fallback gradient background
    const grd = CX.createLinearGradient(0, 0, 0, ST.room.h);
    grd.addColorStop(0, '#1a0a2e');
    grd.addColorStop(1, '#0a1a0a');
    CX.fillStyle = grd;
    CX.fillRect(0, 0, ST.room.w, ST.room.h);
    // Grid pattern
    CX.strokeStyle = 'rgba(147,112,219,0.1)';
    CX.lineWidth = 1;
    for(let x=0; x<ST.room.w; x+=50){ CX.beginPath(); CX.moveTo(x,0); CX.lineTo(x,ST.room.h); CX.stroke(); }
    for(let y=0; y<ST.room.h; y+=50){ CX.beginPath(); CX.moveTo(0,y); CX.lineTo(ST.room.w,y); CX.stroke(); }
  }

  // Draw walkable area debug (subtle)
  // CX.strokeStyle = 'rgba(50,205,50,0.15)';
  // CX.strokeRect(ST.room.walk[0], ST.room.walk[2], ST.room.walk[1]-ST.room.walk[0], ST.room.walk[3]-ST.room.walk[2]);

  // Collect all entities for z-sort
  const entities = [];
  if(ST.me) entities.push({...ST.me, isMe:true});
  ST.users.forEach(u => entities.push({...u, isMe:false}));

  // Sort by Y for depth
  entities.sort((a,b) => a.y - b.y);

  // Draw entities
  entities.forEach(e => drawAvatar(e));

  // Draw click target
  if(ST.target){
    const age = Date.now() - ST.target.t;
    if(age < 1000){
      const alpha = 1 - age/1000;
      CX.beginPath();
      CX.arc(ST.target.x, ST.target.y, 8 + age/50, 0, Math.PI*2);
      CX.strokeStyle = 'rgba(147,112,219,'+alpha+')';
      CX.lineWidth = 2;
      CX.stroke();
    } else {
      ST.target = null;
    }
  }

  CX.restore();
}

function drawAvatar(e){
  const charKey = 'char_'+e.char.id;
  const sprite = ST.assets[charKey];

  const ax = e.x;
  const ay = e.y;
  const sw = 64; // sprite width
  const sh = 96; // sprite height

  if(sprite && sprite.width > 0){
    // Draw sprite
    const flip = e.dir === 0;
    CX.save();
    CX.translate(ax, ay);
    if(flip){ CX.scale(-1, 1); }

    // Walking bob animation
    let bobY = 0;
    if(e.walking){
      bobY = Math.sin(ST.tick * 0.3) * 2;
    }

    // Shadow
    CX.fillStyle = 'rgba(0,0,0,0.3)';
    CX.beginPath();
    CX.ellipse(0, 4, 20, 6, 0, 0, Math.PI*2);
    CX.fill();

    // Draw sprite centered above shadow
    const dw = sw * 1.5;
    const dh = sh * 1.5;
    CX.drawImage(sprite, -dw/2, -dh + bobY, dw, dh);

    CX.restore();
  } else {
    // Fallback: draw chibi-style body with head
    CX.save();
    CX.translate(ax, ay);
    // Shadow
    CX.fillStyle = 'rgba(0,0,0,0.3)';
    CX.beginPath();
    CX.ellipse(0, 4, 18, 5, 0, 0, Math.PI*2);
    CX.fill();
    // Body
    CX.fillStyle = e.isMe ? '#32CD32' : '#9370DB';
    CX.beginPath();
    CX.ellipse(0, -8, 14, 18, 0, 0, Math.PI*2);
    CX.fill();
    // Head
    CX.fillStyle = e.isMe ? '#4ADE4A' : '#A855F7';
    CX.beginPath();
    CX.arc(0, -28, 12, 0, Math.PI*2);
    CX.fill();
    // Eyes
    CX.fillStyle = '#fff';
    CX.beginPath(); CX.arc(-4, -30, 3, 0, Math.PI*2); CX.fill();
    CX.beginPath(); CX.arc(4, -30, 3, 0, Math.PI*2); CX.fill();
    CX.fillStyle = '#222';
    CX.beginPath(); CX.arc(-4, -30, 1.5, 0, Math.PI*2); CX.fill();
    CX.beginPath(); CX.arc(4, -30, 1.5, 0, Math.PI*2); CX.fill();
    // Smile
    CX.strokeStyle = '#fff';
    CX.lineWidth = 1.5;
    CX.beginPath();
    CX.arc(0, -26, 5, 0.2, Math.PI-0.2);
    CX.stroke();
    CX.restore();
  }

  // Name tag (always drawn)
  CX.fillStyle = 'rgba(0,0,0,0.6)';
  CX.font = 'bold 11px sans-serif';
  CX.textAlign = 'center';
  const nm = e.isMe ? e.name + ' (You)' : e.name;
  const tw = CX.measureText(nm).width;
  const nx = ax - tw/2 - 4;
  const ny = ay - 50;
  CX.beginPath();
  CX.rect(nx, ny, tw+8, 18);
  CX.fill();
  CX.fillStyle = e.isMe ? '#32CD32' : '#ccc';
  CX.fillText(nm, ax, ny + 13);
}

// ============ INPUT ============
function onClick(ev){
  if(ST.screen !== 'game' || !ST.room) return;
  const rect = CV.getBoundingClientRect();
  const wx = ev.clientX - rect.left + ST.cam.x;
  const wy = ev.clientY - rect.top + ST.cam.y;

  ST.target = {x:wx, y:wy, t:Date.now()};
  moveTo(ST.me, wx, wy);

  // Check if clicked on an NPC (chat interaction)
  let clickedNPC = false;
  ST.users.forEach(u => {
    const dx = wx - u.x; const dy = wy - u.y;
    if(Math.sqrt(dx*dx+dy*dy) < 30){
      clickedNPC = true;
      const msgs = ['Hello!','Nice night!','Welcome!','Hey there!','✨'];
      addChat(u.name, msgs[Math.floor(Math.random()*msgs.length)], false);
    }
  });
}

function onTouch(ev){
  ev.preventDefault();
  if(ev.touches.length > 0){
    const t = ev.touches[0];
    onClick({clientX:t.clientX, clientY:t.clientY});
  }
}

function onKey(ev){
  if(ST.screen !== 'game') return;
  // ESC closes panels
  if(ev.key === 'Escape'){
    closeAllPanels();
  }
  // Arrow keys for movement
  if(!ST.room) return;
  const spd = 6;
  let dx = 0, dy = 0;
  if(ev.key==='ArrowUp' || ev.key==='w') dy = -spd;
  if(ev.key==='ArrowDown' || ev.key==='s') dy = spd;
  if(ev.key==='ArrowLeft' || ev.key==='a') dx = -spd;
  if(ev.key==='ArrowRight' || ev.key==='d') dx = spd;
  if(dx!==0 || dy!==0){
    ev.preventDefault();
    moveTo(ST.me, ST.me.x + dx*10, ST.me.y + dy*10);
  }
}


// ============ CHAT ============
function doChat(txt){
  if(!txt.trim() || ST.screen !== 'game') return;
  addChat(ST.me.name, txt.trim(), true);

  // NPCs might respond
  if(Math.random() > 0.6){
    setTimeout(() => {
      const u = ST.users[Math.floor(Math.random()*ST.users.length)];
      if(u){
        const responses = ['Nice!','Haha','Cool','I agree','Interesting!','Tell me more','👍','Wow!'];
        addChat(u.name, responses[Math.floor(Math.random()*responses.length)], false);
      }
    }, 500 + Math.random()*1500);
  }
}

function addChat(name, text, isMe){
  const chatlyr = document.getElementById('chatlyr');
  if(!chatlyr) return;

  const bubble = document.createElement('div');
  bubble.className = 'cmsg';
  bubble.innerHTML = '<div class="cn">'+name+'</div>'+escapeHtml(text);
  chatlyr.appendChild(bubble);

  const chat = {el:bubble, t:Date.now(), life:5000};
  ST.chats.push(chat);

  // Position the bubble
  updateChatPosition(chat, name);
}

function updateChatPosition(chat, name){
  let target = null;
  if(ST.me && ST.me.name === name) target = ST.me;
  if(!target) target = ST.users.find(u => u.name === name);

  if(target && chat.el){
    const sx = target.x - ST.cam.x;
    const sy = target.y - ST.cam.y - 55;
    chat.el.style.left = sx + 'px';
    chat.el.style.top = sy + 'px';
    chat.el.style.transform = 'translate(-50%,-100%)';
  }
}

function updateChats(){
  const now = Date.now();
  for(let i = ST.chats.length-1; i>=0; i--){
    const c = ST.chats[i];
    const age = now - c.t;

    // Update position
    const name = c.el.querySelector('.cn')?.textContent;
    if(name) updateChatPosition(c, name);

    // Fade out
    if(age > c.life - 1000){
      c.el.style.opacity = (c.life - age) / 1000;
    }

    // Remove
    if(age > c.life){
      c.el.remove();
      ST.chats.splice(i, 1);
    }
  }
}

function escapeHtml(t){
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ============ UI PANELS ============
function togglePan(id){
  const pan = document.getElementById(id);
  if(!pan) return;
  const isOn = pan.classList.contains('on');
  closeAllPanels();
  if(!isOn) pan.classList.add('on');
}

function closePan(id){
  const pan = document.getElementById(id);
  if(pan) pan.classList.remove('on');
}

function closeAllPanels(){
  document.querySelectorAll('.pan').forEach(p => p.classList.remove('on'));
}

function hide(id){ const e=document.getElementById(id); if(e) e.style.display='none'; }
function show(id){ const e=document.getElementById(id); if(e) e.style.display='block'; }

// ============ INITIALIZE ============
function boot(){
  preload();
}

// Start immediately
document.addEventListener('DOMContentLoaded', boot);

// Fallback: if already loaded, boot now
if(document.readyState === 'complete' || document.readyState === 'interactive'){
  setTimeout(boot, 1);
}

</script>
