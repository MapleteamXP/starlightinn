<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starlight Inn - Virtual World</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --habbo-teal: #0e7c8a;
      --habbo-dark: #073a42;
      --habbo-light: #1a9aaa;
      --habbo-accent: #f4d03f;
      --habbo-bg: #0a3d44;
      --habbo-panel: #0e5a63;
      --habbo-panel-border: #178a99;
      --habbo-text: #ffffff;
      --habbo-text-dim: #a0d8e0;
      --habbo-danger: #e74c3c;
      --habbo-success: #2ecc71;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif; background: var(--habbo-bg); color: var(--habbo-text);
      overflow: hidden; width: 100vw; height: 100vh; user-select: none;
    }
    #gameCanvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
    .ui-overlay { position: absolute; pointer-events: none; top: 0; left: 0; right: 0; bottom: 0; }
    .ui-overlay > * { pointer-events: auto; }
    #topBar {
      position: absolute; top: 0; left: 0; right: 0; height: 48px;
      background: linear-gradient(180deg, var(--habbo-panel) 0%, var(--habbo-dark) 100%);
      border-bottom: 3px solid var(--habbo-accent); display: flex;
      align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100;
    }
    #logo { font-size: 20px; font-weight: 800; color: var(--habbo-accent); text-shadow: 2px 2px 0 var(--habbo-dark); letter-spacing: 1px; }
    #topBarRight { display: flex; align-items: center; gap: 12px; }
    .currency-badge {
      background: var(--habbo-accent); color: var(--habbo-dark); padding: 4px 12px;
      border-radius: 16px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px;
    }
    .currency-badge::before { content: "\2605"; font-size: 16px; }
    .top-btn {
      background: var(--habbo-light); border: 2px solid var(--habbo-panel-border); color: white;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit;
      font-weight: 600; font-size: 13px; transition: all 0.15s;
    }
    .top-btn:hover { background: var(--habbo-accent); color: var(--habbo-dark); transform: translateY(-1px); }
    #toolbar {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 64px;
      background: linear-gradient(0deg, var(--habbo-panel) 0%, var(--habbo-dark) 100%);
      border: 3px solid var(--habbo-panel-border); border-bottom: none;
      border-radius: 16px 16px 0 0; display: flex; align-items: center;
      padding: 0 12px; gap: 6px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    }
    .tool-btn {
      width: 52px; height: 52px; background: var(--habbo-light); border: 2px solid var(--habbo-panel-border);
      border-radius: 10px; color: white; cursor: pointer; font-family: inherit; font-size: 11px;
      font-weight: 700; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px; transition: all 0.15s; position: relative;
    }
    .tool-btn .icon { font-size: 20px; }
    .tool-btn:hover { background: var(--habbo-accent); color: var(--habbo-dark); transform: translateY(-4px); }
    .tool-btn.active { background: var(--habbo-accent); color: var(--habbo-dark); box-shadow: 0 0 10px rgba(244,208,63,0.5); }
    .panel {
      position: absolute; background: var(--habbo-panel); border: 3px solid var(--habbo-panel-border);
      border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 200;
      display: none; flex-direction: column; overflow: hidden; min-width: 280px;
    }
    .panel.open { display: flex; }
    .panel-header {
      background: linear-gradient(180deg, var(--habbo-light) 0%, var(--habbo-teal) 100%);
      padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 2px solid var(--habbo-accent);
    }
    .panel-title { font-weight: 700; font-size: 15px; }
    .panel-close { background: var(--habbo-danger); border: none; color: white; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; line-height: 1; }
    .panel-body { padding: 12px; overflow-y: auto; max-height: 60vh; }
    #navigatorPanel { top: 60px; left: 12px; width: 320px; }
    .room-list { display: flex; flex-direction: column; gap: 6px; }
    .room-item { background: rgba(0,0,0,0.2); border: 2px solid transparent; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
    .room-item:hover { border-color: var(--habbo-accent); background: rgba(244,208,63,0.1); }
    .room-item .room-name { font-weight: 700; font-size: 14px; }
    .room-item .room-desc { font-size: 12px; color: var(--habbo-text-dim); margin-top: 2px; }
    .room-item .room-meta { font-size: 11px; color: var(--habbo-accent); margin-top: 4px; }
    #catalogPanel { top: 60px; right: 12px; width: 360px; }
    .catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .catalog-item { background: rgba(0,0,0,0.2); border: 2px solid var(--habbo-panel-border); border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .catalog-item:hover { border-color: var(--habbo-accent); transform: scale(1.05); }
    .catalog-item .cat-icon { font-size: 28px; margin-bottom: 4px; }
    .catalog-item .cat-name { font-size: 11px; font-weight: 600; }
    .catalog-item .cat-price { font-size: 11px; color: var(--habbo-accent); font-weight: 700; }
    #inventoryPanel { bottom: 76px; left: 50%; transform: translateX(-50%); width: 520px; }
    .inv-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
    .inv-item { aspect-ratio: 1; background: rgba(0,0,0,0.2); border: 2px solid var(--habbo-panel-border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.15s; position: relative; }
    .inv-item:hover { border-color: var(--habbo-accent); background: rgba(244,208,63,0.15); }
    .inv-item .inv-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: 700; color: var(--habbo-accent); }
    #settingsPanel { top: 60px; right: 50%; transform: translateX(50%); width: 300px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .setting-row label { font-size: 13px; }
    .setting-row input[type="range"] { width: 120px; }
    .setting-row select { background: var(--habbo-dark); color: white; border: 1px solid var(--habbo-panel-border); border-radius: 4px; padding: 4px 8px; font-family: inherit; }
    #chatBar { position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; background: var(--habbo-panel); padding: 6px 10px; border-radius: 8px; border: 2px solid var(--habbo-panel-border); }
    #chatInput { width: 340px; padding: 8px 12px; border: 2px solid var(--habbo-panel-border); border-radius: 6px; background: var(--habbo-dark); color: white; font-family: inherit; font-size: 14px; outline: none; }
    #chatInput::placeholder { color: var(--habbo-text-dim); }
    #chatSend { background: var(--habbo-accent); border: none; color: var(--habbo-dark); padding: 8px 16px; border-radius: 6px; font-family: inherit; font-weight: 700; cursor: pointer; font-size: 13px; }
    #chatSend:hover { filter: brightness(1.1); }
    .chat-bubble { position: absolute; background: white; color: #333; padding: 6px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; max-width: 220px; word-wrap: break-word; box-shadow: 0 2px 8px rgba(0,0,0,0.3); pointer-events: none; z-index: 50; transform: translate(-50%, -100%); margin-top: -14px; animation: bubbleIn 0.2s ease-out; }
    .chat-bubble::after { content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: white transparent transparent transparent; }
    @keyframes bubbleIn { from { opacity: 0; transform: translate(-50%, -90%); } to { opacity: 1; transform: translate(-50%, -100%); } }
    #notificationArea { position: absolute; top: 60px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 300; pointer-events: none; }
    .notification { background: var(--habbo-panel); border-left: 4px solid var(--habbo-accent); padding: 10px 14px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); font-size: 13px; font-weight: 600; animation: notifIn 0.3s ease-out; pointer-events: auto; min-width: 200px; }
    @keyframes notifIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    #roomInfo { position: absolute; top: 56px; left: 50%; transform: translateX(-50%); background: rgba(14, 92, 101, 0.92); border: 2px solid var(--habbo-accent); border-radius: 8px; padding: 8px 20px; text-align: center; z-index: 90; }
    #roomInfo h2 { font-size: 16px; color: var(--habbo-accent); }
    #roomInfo p { font-size: 12px; color: var(--habbo-text-dim); }
    #minimap { position: absolute; top: 60px; right: 12px; width: 140px; height: 140px; background: rgba(7, 58, 66, 0.9); border: 2px solid var(--habbo-panel-border); border-radius: 8px; z-index: 90; display: none; }
    #minimap.open { display: block; }
    #minimapCanvas { width: 100%; height: 100%; border-radius: 6px; }
    #loadingScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--habbo-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
    #loadingScreen.hidden { opacity: 0; pointer-events: none; }
    #loadingScreen h1 { font-size: 36px; color: var(--habbo-accent); margin-bottom: 20px; text-shadow: 3px 3px 0 var(--habbo-dark); }
    .loader { width: 60px; height: 60px; border: 5px solid var(--habbo-panel-border); border-top-color: var(--habbo-accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingScreen p { margin-top: 16px; color: var(--habbo-text-dim); font-size: 14px; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--habbo-dark); }
    ::-webkit-scrollbar-thumb { background: var(--habbo-light); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--habbo-panel-border); }
    @media (max-width: 768px) {
      #toolbar { gap: 2px; padding: 0 4px; }
      .tool-btn { width: 42px; height: 42px; font-size: 9px; }
      .tool-btn .icon { font-size: 16px; }
      #chatInput { width: 200px; }
      #inventoryPanel { width: 340px; }
      .inv-grid { grid-template-columns: repeat(5, 1fr); }
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <h1>✦ STARLIGHT INN</h1>
    <div class="loader"></div>
    <p>Loading your virtual world...</p>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div class="ui-overlay">
    <div id="topBar">
      <div id="logo">✦ STARLIGHT INN</div>
      <div id="topBarRight">
        <div class="currency-badge" id="currencyDisplay">1,000</div>
        <button class="top-btn" id="btnNavigator">🌍 Navigator</button>
        <button class="top-btn" id="btnCatalog">🛒 Catalog</button>
        <button class="top-btn" id="btnInventory">🎒 Inventory</button>
        <button class="top-btn" id="btnSettings">⚙️ Settings</button>
      </div>
    </div>
    <div id="roomInfo">
      <h2 id="roomName">Lobby</h2>
      <p id="roomDesc">Welcome to Starlight Inn!</p>
    </div>
    <div id="minimap"><canvas id="minimapCanvas" width="140" height="140"></canvas></div>
    <div class="panel" id="navigatorPanel">
      <div class="panel-header"><span class="panel-title">🌍 Room Navigator</span><button class="panel-close" data-panel="navigatorPanel">×</button></div>
      <div class="panel-body">
        <div style="margin-bottom:8px;font-size:12px;color:var(--habbo-text-dim);">Public Rooms</div>
        <div class="room-list" id="publicRoomList"></div>
        <div style="margin:12px 0 8px;font-size:12px;color:var(--habbo-text-dim);">Your Rooms</div>
        <div class="room-list" id="userRoomList"></div>
      </div>
    </div>
    <div class="panel" id="catalogPanel">
      <div class="panel-header"><span class="panel-title">🛒 Furniture Catalog</span><button class="panel-close" data-panel="catalogPanel">×</button></div>
      <div class="panel-body"><div class="catalog-grid" id="catalogGrid"></div></div>
    </div>
    <div class="panel" id="inventoryPanel">
      <div class="panel-header"><span class="panel-title">🎒 My Inventory</span><button class="panel-close" data-panel="inventoryPanel">×</button></div>
      <div class="panel-body">
        <div class="inv-grid" id="inventoryGrid"></div>
        <div style="margin-top:10px;font-size:11px;color:var(--habbo-text-dim);text-align:center;">Click an item to select it, then click a tile to place.</div>
      </div>
    </div>
    <div class="panel" id="settingsPanel">
      <div class="panel-header"><span class="panel-title">⚙️ Settings</span><button class="panel-close" data-panel="settingsPanel">×</button></div>
      <div class="panel-body">
        <div class="setting-row"><label>Show Minimap</label><input type="checkbox" id="settingMinimap" checked></div>
        <div class="setting-row"><label>Show Names</label><input type="checkbox" id="settingNames" checked></div>
        <div class="setting-row"><label>Chat Bubbles</label><input type="checkbox" id="settingChat" checked></div>
        <div class="setting-row"><label>NPC Count</label><select id="settingNPCs"><option value="0">None</option><option value="3" selected>3</option><option value="5">5</option><option value="8">8</option></select></div>
        <div class="setting-row"><label>Camera Speed</label><input type="range" id="settingCamSpeed" min="1" max="10" value="5"></div>
        <div class="setting-row"><label>Sound Effects</label><input type="checkbox" id="settingSound"></div>
        <div style="margin-top:12px;font-size:11px;color:var(--habbo-text-dim);text-align:center;">Starlight Inn v1.0<br>Built with HTML5 Canvas</div>
      </div>
    </div>
    <div id="chatBar">
      <input type="text" id="chatInput" placeholder="Click here to chat..." maxlength="100" autocomplete="off">
      <button id="chatSend">Send</button>
    </div>
    <div id="toolbar">
      <button class="tool-btn" id="toolChat" title="Chat (Enter)"><span class="icon">💬</span><span>Chat</span></button>
      <button class="tool-btn" id="toolWalk" title="Walk (Click tiles)"><span class="icon">🚶</span><span>Walk</span></button>
      <button class="tool-btn" id="toolPlace" title="Place Furniture"><span class="icon">📦</span><span>Place</span></button>
      <button class="tool-btn" id="toolPick" title="Pick Up"><span class="icon">✋</span><span>Pick</span></button>
      <button class="tool-btn" id="toolRotate" title="Rotate (R)"><span class="icon">🔄</span><span>Rotate</span></button>
      <button class="tool-btn" id="toolDance" title="Dance (D)"><span class="icon">💃</span><span>Dance</span></button>
      <button class="tool-btn" id="toolWave" title="Wave (W)"><span class="icon">👋</span><span>Wave</span></button>
      <button class="tool-btn" id="toolMinimap" title="Toggle Map (M)"><span class="icon">🗺️</span><span>Map</span></button>
    </div>
    <div id="notificationArea"></div>
  </div>
<script>

// ============================================================
// STARLIGHT INN - ISOMETRIC VIRTUAL WORLD ENGINE
// ============================================================

const TILE_W = 64;
const TILE_H = 32;
const WALL_H = 48;
const AVATAR_H = 52;

function isoToScreen(ix, iy) {
  return { x: (ix - iy) * (TILE_W / 2), y: (ix + iy) * (TILE_H / 2) };
}

function screenToIso(sx, sy) {
  return {
    x: (sx / (TILE_W / 2) + sy / (TILE_H / 2)) / 2,
    y: (sy / (TILE_H / 2) - sx / (TILE_W / 2)) / 2
  };
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(a, b) { return Math.abs(a.x - b.x) + Math.abs(a.y - b.y); }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- Asset Cache ---
const Assets = { avatars: {}, furniture: {}, tiles: {} };

function createAvatarCanvas(skinColor, hairColor, hairStyle, shirtColor, pantsColor, shoeColor) {
  const c = document.createElement('canvas');
  c.width = 44; c.height = 64;
  const ctx = c.getContext('2d');
  const cx = 22, cy = 20;

  // Legs
  ctx.strokeStyle = pantsColor; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 4, 42); ctx.lineTo(cx - 5, 58); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 4, 42); ctx.lineTo(cx + 5, 58); ctx.stroke();

  // Shoes
  ctx.fillStyle = shoeColor || '#333';
  ctx.beginPath(); ctx.ellipse(cx - 5, 59, 4, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 5, 59, 4, 2, 0, 0, Math.PI * 2); ctx.fill();

  // Body
  ctx.fillStyle = shirtColor;
  ctx.beginPath();
  ctx.moveTo(cx - 10, 32); ctx.lineTo(cx + 10, 32);
  ctx.lineTo(cx + 8, 46); ctx.lineTo(cx - 8, 46);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();

  // Arms
  ctx.strokeStyle = skinColor; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cx - 10, 34); ctx.lineTo(cx - 14, 44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 10, 34); ctx.lineTo(cx + 14, 44); ctx.stroke();

  // Head
  ctx.fillStyle = skinColor;
  ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(cx - 5, cy + 1, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 5, cy + 1, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - 4, cy, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 6, cy, 1, 0, Math.PI * 2); ctx.fill();

  // Mouth
  ctx.strokeStyle = '#a04040'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(cx, cy + 7, 4, 0.2, Math.PI - 0.2); ctx.stroke();

  // Hair
  ctx.fillStyle = hairColor;
  if (hairStyle === 'spiky') {
    ctx.beginPath();
    ctx.moveTo(cx - 14, cy - 2); ctx.lineTo(cx - 10, cy - 18); ctx.lineTo(cx - 4, cy - 10);
    ctx.lineTo(cx, cy - 20); ctx.lineTo(cx + 4, cy - 10); ctx.lineTo(cx + 10, cy - 18);
    ctx.lineTo(cx + 14, cy - 2); ctx.lineTo(cx + 12, cy + 4); ctx.lineTo(cx - 12, cy + 4);
    ctx.closePath(); ctx.fill();
  } else if (hairStyle === 'long') {
    ctx.beginPath(); ctx.arc(cx, cy - 2, 17, Math.PI, 0);
    ctx.lineTo(cx + 17, cy + 14); ctx.lineTo(cx - 17, cy + 14); ctx.closePath(); ctx.fill();
  } else if (hairStyle === 'mohawk') {
    ctx.beginPath();
    ctx.moveTo(cx - 3, cy - 14); ctx.lineTo(cx - 2, cy - 26);
    ctx.lineTo(cx, cy - 28); ctx.lineTo(cx + 2, cy - 26); ctx.lineTo(cx + 3, cy - 14); ctx.closePath(); ctx.fill();
    ctx.fillStyle = skinColor;
    ctx.beginPath(); ctx.arc(cx - 12, cy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 12, cy, 4, 0, Math.PI * 2); ctx.fill();
  } else if (hairStyle === 'bald') {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(cx - 4, cy - 8, 4, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.arc(cx, cy - 4, 16, Math.PI, 0);
    ctx.lineTo(cx + 16, cy + 2); ctx.lineTo(cx - 16, cy + 2); ctx.closePath(); ctx.fill();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.stroke();
  return c;
}

function createFurnitureCanvas(type) {
  const c = document.createElement('canvas');
  c.width = 80; c.height = 80;
  const ctx = c.getContext('2d');

  if (type === 'chair') {
    ctx.fillStyle = '#8B4513';
    ctx.beginPath(); ctx.moveTo(20, 40); ctx.lineTo(40, 30); ctx.lineTo(60, 40); ctx.lineTo(40, 50); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#5D3A1A'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = '#A0522D';
    ctx.beginPath(); ctx.moveTo(20, 40); ctx.lineTo(20, 18); ctx.lineTo(40, 8); ctx.lineTo(40, 30); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#5D3A1A'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(20, 50); ctx.lineTo(20, 64); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(40, 55); ctx.lineTo(40, 68); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(60, 50); ctx.lineTo(60, 64); ctx.stroke();
  } else if (type === 'table') {
    ctx.fillStyle = '#CD853F';
    ctx.beginPath(); ctx.moveTo(8, 34); ctx.lineTo(40, 18); ctx.lineTo(72, 34); ctx.lineTo(40, 50); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 2; ctx.stroke();
    ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(18, 42); ctx.lineTo(18, 66); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(40, 50); ctx.lineTo(40, 72); ctx.stroke();

function getTilePattern(type) {
  if (Assets.tiles[type]) return Assets.tiles[type];
  const c = document.createElement('canvas');
  c.width = TILE_W + 2; c.height = TILE_H + 2;
  const ctx = c.getContext('2d');
  const colors = {
    wood: { top: '#C19A6B' }, tile: { top: '#ECF0F1' }, carpet: { top: '#A93226' },
    grass: { top: '#58D68D' }, sand: { top: '#F9E79F' }, stone: { top: '#AAB7B8' },
    water: { top: '#5DADE2' }, marble: { top: '#F4F6F7' },
    darkwood: { top: '#5D4037' }, checkered: { top: '#E74C3C' }
  };
  const p = colors[type] || colors.wood;
  ctx.fillStyle = p.top;
  ctx.beginPath();
  ctx.moveTo(1, TILE_H / 2 + 1);
  ctx.lineTo(TILE_W / 2 + 1, 1);
  ctx.lineTo(TILE_W + 1, TILE_H / 2 + 1);
  ctx.lineTo(TILE_W / 2 + 1, TILE_H + 1);
  ctx.closePath(); ctx.fill();

  if (type === 'wood') {
    ctx.strokeStyle = 'rgba(139,105,20,0.25)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(TILE_W / 2, 4); ctx.lineTo(TILE_W / 2, TILE_H - 2); ctx.stroke();
  } else if (type === 'tile') {
    ctx.strokeStyle = 'rgba(149,165,166,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(TILE_W / 4, TILE_H / 4); ctx.lineTo(TILE_W * 3 / 4, TILE_H * 3 / 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(TILE_W * 3 / 4, TILE_H / 4); ctx.lineTo(TILE_W / 4, TILE_H * 3 / 4); ctx.stroke();
  } else if (type === 'checkered') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.moveTo(TILE_W / 2 + 1, 1); ctx.lineTo(TILE_W * 3 / 4, TILE_H / 4);
    ctx.lineTo(TILE_W / 2 + 1, TILE_H / 2); ctx.lineTo(TILE_W / 4, TILE_H / 4); ctx.closePath(); ctx.fill();
  } else if (type === 'marble') {
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(TILE_W / 3, TILE_H / 3); ctx.lineTo(TILE_W * 2 / 3, TILE_H / 3); ctx.stroke();
  }
  Assets.tiles[type] = c;
  return c;
}

function getWallPattern(color) {
  const key = 'wall_' + color;
  if (Assets.tiles[key]) return Assets.tiles[key];
  const c = document.createElement('canvas');
  c.width = TILE_W / 2 + 2; c.height = WALL_H + TILE_H / 2 + 2;
  const ctx = c.getContext('2d');
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(1, WALL_H + 1); ctx.lineTo(1, 1);
  ctx.lineTo(TILE_W / 2 + 1, TILE_H / 2 + 1);
  ctx.lineTo(TILE_W / 2 + 1, WALL_H + TILE_H / 2 + 1);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(1, 1); ctx.lineTo(TILE_W / 2 + 1, TILE_H / 2 + 1); ctx.stroke();
  Assets.tiles[key] = c;
  return c;
}

function getFurnitureAsset(type) {
  if (!Assets.furniture[type]) Assets.furniture[type] = createFurnitureCanvas(type);
  return Assets.furniture[type];
}

function getAvatarAsset(key) {
  if (!Assets.avatars[key]) {
    const parts = key.split('|');
    Assets.avatars[key] = createAvatarCanvas(parts[0], parts[1], parts[2], parts[3], parts[4], parts[5]);
  }
  return Assets.avatars[key];
}
