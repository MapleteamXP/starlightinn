<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Starlight Inn</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0d0d1a;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Full-screen title background */
    .title-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: url('assets/title-bg.png') center center / cover no-repeat;
      z-index: 1;
    }

    /* Button panel at bottom */
    .landing-panel {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-play {
      font-size: 1.4rem;
      font-weight: 800;
      padding: 16px 56px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      color: #1a1a2e;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(255,215,0,0.5);
      transition: all 0.2s ease;
      min-width: 240px;
      font-family: 'Nunito', sans-serif;
    }
    .btn-play:hover { transform: scale(1.06); box-shadow: 0 6px 36px rgba(255,215,0,0.7); }
    .btn-play:active { transform: scale(0.97); }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    .btn-secondary {
      padding: 10px 22px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); transform: translateY(-1px); }

    .btn-settings {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
    .btn-settings:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    .version-row {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      margin-top: 8px;
    }
    .version-row span { margin: 0 6px; }

    /* Mute button */
    .mute-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 10;
      font-family: 'Nunito', sans-serif;
    }
    .mute-btn:hover { background: rgba(0,0,0,0.6); color: #fff; }

    /* About link */
    .about-link {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: rgba(255,255,255,0.35);
      font-size: 0.8rem;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
      font-family: 'Nunito', sans-serif;
    }
    .about-link:hover { color: rgba(255,255,255,0.65); }

    /* ===== AUTH MODALS ===== */
    .auth-modal {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .auth-modal.hidden { display: none !important; }

    .auth-box {
      background: #1a1a2e;
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 18px;
      padding: 36px;
      width: 340px;
      max-width: 90vw;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .auth-box h2 {
      color: #FFD700;
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.4rem;
    }
    .auth-box input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }
    .auth-box input:focus {
      outline: none;
      border-color: #FFD700;
    }
    .auth-box input::placeholder { color: rgba(255,255,255,0.3); }
    .auth-box button[type="submit"] {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      margin-top: 10px;
      font-family: 'Nunito', sans-serif;
    }
    .auth-box button[type="submit"]:hover { transform: translateY(-1px); }
    .auth-link {
      display: block;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      margin-top: 16px;
      cursor: pointer;
    }
    .auth-link:hover { color: #FFD700; }
    .auth-error {
      color: #ff6b6b;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 10px;
      min-height: 20px;
    }
    .auth-box .close-btn {
      position: absolute;
      top: 14px; right: 18px;
      color: rgba(255,255,255,0.4);
      font-size: 1.3rem;
      cursor: pointer;
      background: none;
      border: none;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-family: 'Nunito', sans-serif;
    }
    .auth-box .close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

    /* ===== GAME SCREENS ===== */
    .screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
    }
    .screen.active { display: block; }

    /* Character select screen */
    #screen-charselect {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0d0d1a 100%);
    }
    .charselect-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    .charselect-title {
      font-size: 2rem;
      color: #FFD700;
      text-shadow: 0 2px 10px rgba(255,215,0,0.3);
    }
    .charselect-preview {
      width: 200px;
      height: 300px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .charselect-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }
    .charselect-controls button {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }
    .charselect-controls button:hover { border-color: #FFD700; color: #FFD700; }

    /* Game screen */
    #screen-game {
      background: #1a1a2e;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }

    /* Settings panel */
    .settings-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px;
      width: 400px;
      max-width: 90vw;
      z-index: 100;
      display: none;
    }
    .settings-panel.active { display: block; }
    .settings-panel h2 { color: #FFD700; margin-bottom: 20px; }
    .settings-panel label {
      display: block;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .settings-panel input[type="range"] {
      width: 100%;
      margin-bottom: 16px;
    }
    .settings-panel .panel-close {
      position: absolute;
      top: 12px; right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- ==================== LANDING SCREEN ==================== -->
  <div id="screen-landing" class="screen active">
    <div class="title-bg"></div>
    <div class="landing-panel">
      <button id="btn-play" class="btn-play">Enter World</button>
      <div class="btn-row">
        <button id="btn-guest" class="btn-secondary">Play as Guest</button>
        <button id="btn-register" class="btn-secondary">Register</button>
        <button id="btn-login" class="btn-secondary">Login</button>
        <button id="btn-settings" class="btn-settings">Settings</button>
      </div>
      <div class="version-row">
        <span>v8.2.0</span>
        <span>|</span>
        <span id="online-count">0 stars online</span>
        <span>|</span>
        <span>Ready</span>
      </div>
    </div>
    <button id="btn-mute" class="mute-btn">Sound On</button>
    <button id="btn-about" class="about-link">About</button>
  </div>

  <!-- ==================== CHARACTER SELECT ==================== -->
  <div id="screen-charselect" class="screen">
    <div class="charselect-container">
      <h2 class="charselect-title">Create Your Character</h2>
      <div class="charselect-preview">🧑</div>
      <div class="charselect-controls">
        <button onclick="randomizeChar()">Randomize</button>
        <button onclick="prevHair()">Prev Hair</button>
        <button onclick="nextHair()">Next Hair</button>
        <button onclick="changeColor()">Change Color</button>
        <button onclick="enterGame()" style="background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; border: none; font-weight: 700;">Enter World!</button>
        <button onclick="goBack()">Back</button>
      </div>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- ==================== SETTINGS PANEL ==================== -->
  <div id="settings-panel" class="settings-panel">
    <button class="panel-close" onclick="closeSettings()">x</button>
    <h2>Settings</h2>
    <label>Music Volume</label>
    <input type="range" id="music-volume" min="0" max="100" value="50">
    <label>SFX Volume</label>
    <input type="range" id="sfx-volume" min="0" max="100" value="70">
    <label>Master Volume</label>
    <input type="range" id="master-volume" min="0" max="100" value="80">
  </div>

  <!-- ==================== AUTH MODALS ==================== -->
  <div id="register-modal" class="auth-modal hidden">
    <div class="auth-box">
      <button class="close-btn" onclick="closeAuthModal()">x</button>
      <h2>Create Account</h2>
      <div class="auth-error" id="register-error"></div>
      <input type="text" id="reg-username" placeholder="Username (3-20 chars)" maxlength="20" autocomplete="off">
      <input type="password" id="reg-password" placeholder="Password (6+ chars)">
      <input type="password" id="reg-confirm" placeholder="Confirm Password">
      <button type="submit" id="btn-submit-register">Create Account</button>
      <span class="auth-link" onclick="showLogin()">Already have an account? Login</span>
    </div>
  </div>

  <div id="login-modal" class="auth-modal hidden">
    <div class="auth-box">
      <button class="close-btn" onclick="closeAuthModal()">x</button>
      <h2>Welcome Back</h2>
      <div class="auth-error" id="login-error"></div>
      <input type="text" id="login-username" placeholder="Username" autocomplete="off">
      <input type="password" id="login-password" placeholder="Password">
      <button type="submit" id="btn-submit-login">Login</button>
      <span class="auth-link" onclick="showRegister()">No account? Register</span>
    </div>
  </div>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script>
    // ===== SCREEN MANAGEMENT =====
    function setScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('screen-' + screenId);
      if (target) target.classList.add('active');
    }

    // ===== LANDING BUTTONS =====
    document.getElementById('btn-play').addEventListener('click', () => {
      setScreen('charselect');
    });
    document.getElementById('btn-guest').addEventListener('click', () => {
      setScreen('charselect');
    });
    document.getElementById('btn-register').addEventListener('click', () => {
      document.getElementById('register-modal').classList.remove('hidden');
      document.getElementById('login-modal').classList.add('hidden');
    });
    document.getElementById('btn-login').addEventListener('click', () => {
      document.getElementById('login-modal').classList.remove('hidden');
      document.getElementById('register-modal').classList.add('hidden');
    });
    document.getElementById('btn-settings').addEventListener('click', () => {
      document.getElementById('settings-panel').classList.add('active');
    });
    document.getElementById('btn-about').addEventListener('click', () => {
      alert('Starlight Inn v8.2.0\nA cozy isometric social world.\nGather, explore, and play together under the stars!');
    });

    // ===== AUTH =====
    window.closeAuthModal = () => {
      document.getElementById('register-modal').classList.add('hidden');
      document.getElementById('login-modal').classList.add('hidden');
    };
    window.showRegister = () => {
      document.getElementById('register-modal').classList.remove('hidden');
      document.getElementById('login-modal').classList.add('hidden');
    };
    window.showLogin = () => {
      document.getElementById('login-modal').classList.remove('hidden');
      document.getElementById('register-modal').classList.add('hidden');
    };

    // Simple account storage
    const accounts = JSON.parse(localStorage.getItem('starlight_accounts_v2') || '{}');
    function saveAccounts() {
      localStorage.setItem('starlight_accounts_v2', JSON.stringify(accounts));
    }

    document.getElementById('btn-submit-register').addEventListener('click', (e) => {
      e.preventDefault();
      const user = document.getElementById('reg-username').value.trim();
      const pass = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const err = document.getElementById('register-error');
      if (!user || user.length < 3) { err.textContent = 'Username must be 3+ chars'; return; }
      if (!/^[a-zA-Z0-9_]+$/.test(user)) { err.textContent = 'Letters, numbers, _ only'; return; }
      if (!pass || pass.length < 6) { err.textContent = 'Password must be 6+ chars'; return; }
      if (pass !== confirm) { err.textContent = 'Passwords do not match'; return; }
      if (accounts[user.toLowerCase()]) { err.textContent = 'Username taken'; return; }
      accounts[user.toLowerCase()] = { username: user, password: pass, created: Date.now() };
      saveAccounts();
      localStorage.setItem('starlight_current_user', user);
      closeAuthModal();
      setScreen('charselect');
    });

    document.getElementById('btn-submit-login').addEventListener('click', (e) => {
      e.preventDefault();
      const user = document.getElementById('login-username').value.trim();
      const pass = document.getElementById('login-password').value;
      const err = document.getElementById('login-error');
      const acc = accounts[user.toLowerCase()];
      if (!acc) { err.textContent = 'Username not found'; return; }
      if (acc.password !== pass) { err.textContent = 'Wrong password'; return; }
      localStorage.setItem('starlight_current_user', user);
      closeAuthModal();
      setScreen('charselect');
    });

    // Auto-login
    const currentUser = localStorage.getItem('starlight_current_user');
    if (currentUser && accounts[currentUser.toLowerCase()]) {
      console.log('[Auth] Welcome back, ' + currentUser);
    }

    // ===== CHARACTER SELECT =====
    window.randomizeChar = () => {
      const hairs = ['spiky', 'long', 'short', 'curly', 'buzz', 'mohawk', 'afro'];
      const colors = ['#FFCC80', '#8D5524', '#C68642', '#E0AC69', '#F1C27D'];
      const preview = document.querySelector('.charselect-preview');
      preview.textContent = ['🧑','👨','👩','🧒'][Math.floor(Math.random()*4)];
    };
    window.prevHair = () => { randomizeChar(); };
    window.nextHair = () => { randomizeChar(); };
    window.changeColor = () => { randomizeChar(); };
    window.enterGame = () => { setScreen('game'); };
    window.goBack = () => { setScreen('landing'); };
    window.closeSettings = () => { document.getElementById('settings-panel').classList.remove('active'); };

    // ===== HARRY POTTER JINGLE =====
    const jingleCtx = new (window.AudioContext || window.webkitAudioContext)();
    let jingleMuted = false;
    let jingleGain = jingleCtx.createGain();
    jingleGain.connect(jingleCtx.destination);
    jingleGain.gain.value = 0.25;

    const noteFreq = {
      'D4': 293.66, 'F#4': 369.99, 'A4': 440.00, 'B4': 493.88,
      'D5': 587.33, 'E5': 659.25, 'F#5': 739.99, 'A5': 880.00,
      'B5': 987.77, 'D6': 1174.66
    };

    function playNote(note, start, duration, vol) {
      const osc = jingleCtx.createOscillator();
      const g = jingleCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = noteFreq[note] || 440;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(vol, start + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, start + duration);
      osc.connect(g);
      g.connect(jingleGain);
      osc.start(start);
      osc.stop(start + duration + 0.1);
    }

    function playJingle() {
      if (jingleMuted) return;
      const now = jingleCtx.currentTime;
      // Opening magical phrase (Hedwig's theme inspired)
      playNote('D5', now, 1.5, 0.3);
      playNote('F#5', now + 0.4, 0.6, 0.25);
      playNote('E5', now + 0.8, 0.5, 0.2);
      playNote('D5', now + 1.2, 1.0, 0.25);
      // Sparkle cascade
      for (let i = 0; i < 8; i++) {
        const notes = ['D6', 'B5', 'A5', 'F#5'];
        playNote(notes[i % 4], now + 1.5 + i * 0.12, 0.3, 0.15);
      }
      // Resolution chord
      playNote('D4', now + 2.5, 2.0, 0.2);
      playNote('F#4', now + 2.5, 2.0, 0.15);
      playNote('A4', now + 2.5, 2.0, 0.15);
    }

    // Play on first interaction (browsers block audio before user interaction)
    let jingleStarted = false;
    function startJingle() {
      if (jingleStarted) return;
      jingleStarted = true;
      if (jingleCtx.state === 'suspended') jingleCtx.resume();
      playJingle();
      setInterval(() => { if (!jingleMuted) playJingle(); }, 35000);
    }
    document.addEventListener('click', startJingle, { once: true });

    // Mute button
    document.getElementById('btn-mute').addEventListener('click', () => {
      jingleMuted = !jingleMuted;
      jingleGain.gain.value = jingleMuted ? 0 : 0.25;
      document.getElementById('btn-mute').textContent = jingleMuted ? 'Sound Off' : 'Sound On';
    });

    console.log('🌟 Starlight Inn v8.2.0 loaded — click anywhere to hear the magic!');
  </script>
</body>
</html>
