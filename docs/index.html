<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Starlight Inn v18</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0}
  canvas{display:block}

  /* Loading */
  #loadScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;z-index:9999;transition:opacity .5s}
  #loadScreen.done{opacity:0;pointer-events:none}
  .load-title{font-size:36px;color:#FFD700;letter-spacing:4px;text-shadow:0 0 30px rgba(255,215,0,.3);margin-bottom:24px}
  .load-bar{width:320px;height:10px;background:#1a1a2e;border-radius:5px;overflow:hidden;border:1px solid #333}
  .load-fill{width:0%;height:100%;background:linear-gradient(90deg,#FFD700,#FF8C00);transition:width .2s}
  .load-text{margin-top:14px;color:#888;font-size:13px}

  /* Title */
  #titleScreen{position:fixed;inset:0;display:none;z-index:5000}
  #titleScreen.active{display:block}
  .title-bg{position:absolute;inset:0;background:#0a0a1a}
  .title-bg img{width:100%;height:100%;object-fit:cover;image-rendering:pixelated}
  .title-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,26,.3) 0%,rgba(10,10,26,.7) 60%,rgba(10,10,26,.95) 100%)}
  .title-content{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;width:90%;max-width:420px}
  .tbtn{display:block;width:100%;max-width:280px;margin:8px auto;padding:14px 28px;font-size:17px;font-weight:bold;border:none;border-radius:10px;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:1px}
  .tbtn:hover{transform:scale(1.04)}
  .tbtn-gold{background:linear-gradient(135deg,#FFD700,#DAA520);color:#1a1a2e;box-shadow:0 4px 20px rgba(255,215,0,.3)}
  .tbtn-gold:hover{box-shadow:0 6px 30px rgba(255,215,0,.5)}
  .tbtn-row{display:flex;gap:10px;justify-content:center}
  .tbtn-row .tbtn{max-width:140px;font-size:14px;padding:10px 16px}
  .tbtn-blue{background:linear-gradient(135deg,#4169E1,#1E90FF);color:#fff}
  .tbtn-green{background:linear-gradient(135deg,#32CD32,#228B22);color:#fff}
  .tbtn-purple{background:linear-gradient(135deg,#9370DB,#8A2BE2);color:#fff;max-width:200px;font-size:13px;padding:9px}
  .tver{position:fixed;bottom:10px;right:14px;color:#444;font-size:11px}

  /* Char Select */
  #charScreen{position:fixed;inset:0;display:none;z-index:4000;background:#0d0d1a;overflow-y:auto}
  #charScreen.active{display:block}
  .cc-head{text-align:center;padding:24px;border-bottom:1px solid #222;position:sticky;top:0;background:#0d0d1a;z-index:10}
  .cc-head h1{color:#FFD700;font-size:28px;margin-bottom:4px}
  .cc-head p{color:#888;font-size:14px}
  .cc-body{max-width:900px;margin:0 auto;padding:24px}
  .cc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
  .cc-char{cursor:pointer;border:3px solid #333;border-radius:12px;overflow:hidden;background:rgba(255,255,255,.03);transition:all .2s;position:relative}
  .cc-char:hover{border-color:#666;transform:translateY(-4px)}
  .cc-char.active{border-color:#FFD700;background:rgba(255,215,0,.1);box-shadow:0 0 20px rgba(255,215,0,.2)}
  .cc-char img{width:100%;height:auto;display:block;image-rendering:pixelated}
  .cc-char .lbl{position:absolute;bottom:0;left:0;right:0;padding:6px;background:rgba(0,0,0,.7);color:#FFD700;font-size:11px;font-weight:bold;text-align:center}
  .cc-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px}
  .cc-actions button{padding:12px 28px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:15px;transition:all .15s}
  .cc-save{background:linear-gradient(135deg,#FFD700,#DAA520);color:#1a1a2e}
  .cc-random{background:linear-gradient(135deg,#9370DB,#8A2BE2);color:#fff}
  .cc-back{background:#333;color:#fff}

  /* Game */
  #gameScreen{position:fixed;inset:0;display:none;z-index:100}
  #gameScreen.active{display:block}
  #gameCanvas{position:absolute;inset:0}

  /* Top Bar */
  #topBar{position:fixed;top:0;left:0;right:0;height:46px;background:rgba(10,10,20,.92);border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:500;backdrop-filter:blur(6px)}
  .top-group{display:flex;align-items:center;gap:10px}
  .top-btn{padding:7px 16px;border:1px solid #444;border-radius:8px;background:rgba(255,255,255,.05);color:#ccc;font-size:12px;font-weight:bold;cursor:pointer;transition:all .15s}
  .top-btn:hover{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.1)}
  .room-name{color:#FFA500;font-weight:bold;font-size:15px;text-shadow:0 0 8px rgba(255,165,0,.3)}
  .currency{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:bold}
  .cur-gold{color:#FFD700}
  .cur-gem{color:#87CEEB}
  .cur-lvl{color:#9370DB}

  /* Bottom Bar */
  #bottomBar{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(10,10,20,.95);border-top:1px solid #333;display:flex;align-items:center;padding:0 16px;gap:10px;z-index:500}
  #chatInput{flex:1;max-width:380px;padding:10px 18px;border:1px solid #444;border-radius:24px;background:#0a0a1a;color:#fff;font-size:14px;outline:none}
  #chatInput:focus{border-color:#FFD700}
  .bbtn{padding:9px 18px;border:1px solid #444;border-radius:8px;background:rgba(255,255,255,.05);color:#ccc;font-size:12px;cursor:pointer;transition:all .15s}
  .bbtn:hover{border-color:#FFD700;color:#FFD700}

  /* Panels */
  .panel{position:fixed;background:rgba(10,10,20,.96);border:2px solid #FFD700;border-radius:14px;z-index:600;display:none;flex-direction:column;overflow:hidden;backdrop-filter:blur(10px);box-shadow:0 8px 40px rgba(0,0,0,.6)}
  .panel.active{display:flex}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #333;background:rgba(255,215,0,.05)}
  .panel-h h2{color:#FFD700;font-size:17px}
  .panel-close{background:none;border:none;color:#FFD700;font-size:24px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .panel-close:hover{background:rgba(255,215,0,.15)}
  .panel-body{padding:16px;overflow-y:auto;flex:1}

  /* Room List */
  #roomPanel{width:400px;height:520px;top:58px;left:12px}
  .room-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .room-card{background:rgba(255,255,255,.03);border:1px solid #333;border-radius:12px;padding:14px;cursor:pointer;transition:all .15s}
  .room-card:hover{border-color:#FFD700;transform:scale(1.02);background:rgba(255,215,0,.05)}
  .room-card .ricon{font-size:40px;text-align:center;margin-bottom:8px}
  .room-card .rname{color:#FFD700;font-size:14px;font-weight:bold;text-align:center}
  .room-card .rdesc{color:#777;font-size:11px;text-align:center;margin-top:4px}
  .room-visitors{color:#32CD32;font-size:11px;text-align:center;margin-top:6px}

  /* Chat bubbles */
  .chat-bubble{position:absolute;background:rgba(0,0,0,.8);border:1px solid rgba(255,215,0,.4);border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;max-width:220px;word-wrap:break-word;pointer-events:none;z-index:200;transform:translate(-50%,-100%);margin-top:-16px;box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .chat-bubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid rgba(0,0,0,.8)}
  .chat-name{color:#FFD700;font-weight:bold;font-size:11px;margin-bottom:2px}

  /* Modals */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:7000}
  .modal.active{display:flex}
  .modal-box{background:linear-gradient(180deg,#1a1a2e,#0f0f1a);border:2px solid #FFD700;border-radius:16px;padding:32px;min-width:320px;max-width:90vw;box-shadow:0 0 50px rgba(255,215,0,.15)}
  .modal-box h2{text-align:center;color:#FFD700;margin-bottom:20px;font-size:20px}
  .modal-box input{width:100%;padding:14px;margin:10px 0;border:2px solid #333;border-radius:10px;background:#0a0a1a;color:#fff;font-size:16px;outline:none}
  .modal-box input:focus{border-color:#FFD700}
  .modal-err{color:#ff4444;font-size:13px;text-align:center;margin:6px 0;min-height:18px}
  .modal-row{display:flex;gap:12px;margin-top:16px}
  .modal-row button{flex:1;padding:14px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:15px}
  .btn-gold{background:linear-gradient(135deg,#FFD700,#DAA520);color:#1a1a2e}
  .btn-dark{background:#333;color:#fff}

  /* Path preview */
  .path-dot{position:absolute;width:8px;height:8px;background:rgba(255,215,0,.5);border-radius:50%;pointer-events:none;z-index:50;transform:translate(-50%,-50%)}

  /* Avatar selector mini */
  .ava-mini{width:48px;height:48px;border:2px solid #333;border-radius:8px;overflow:hidden;cursor:pointer;image-rendering:pixelated;transition:all .15s}
  .ava-mini:hover{border-color:#FFD700}
  .ava-mini.active{border-color:#FFD700;box-shadow:0 0 10px rgba(255,215,0,.3)}
  .ava-mini img{width:100%;height:100%;object-fit:cover}

  /* Responsive */
  @media(max-width:768px){
    .cc-grid{grid-template-columns:repeat(3,1fr)}
    .room-grid{grid-template-columns:1fr}
    .panel{max-width:95vw;max-height:80vh}
    .tbtn-row{flex-direction:column}
    .tbtn-row .tbtn{max-width:280px}
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadScreen">
  <div class="load-title">STARLIGHT INN</div>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
  <div class="load-text" id="loadText">Connecting to hotel...</div>
</div>

<!-- TITLE -->
<div id="titleScreen">
  <div class="title-bg"><img id="titleBg" src="assets/title-bg-v16.png" alt="Starlight Inn"></div>
  <div class="title-overlay"></div>
  <div class="title-content">
    <button class="tbtn tbtn-gold" onclick="enterHotel()">ENTER THE INN</button>
    <div class="tbtn-row">
      <button class="tbtn tbtn-blue" onclick="openCharSelect()">CHOOSE AVATAR</button>
      <button class="tbtn tbtn-green" onclick="showRoomPanel()">VISIT ROOMS</button>
    </div>
    <button class="tbtn tbtn-purple" onclick="showTrophies()">ACHIEVEMENTS</button>
  </div>
  <div class="tver">v18.0 - Pixel Perfect Edition</div>
</div>

<!-- CHARACTER SELECT -->
<div id="charScreen">
  <div class="cc-head">
    <h1>Choose Your Character</h1>
    <p>Select a Starlight adventurer that matches your style</p>
  </div>
  <div class="cc-body">
    <div class="cc-grid" id="charGrid"></div>
    <div class="cc-actions">
      <button class="cc-save" onclick="saveChar()">CONFIRM</button>
      <button class="cc-back" onclick="backToTitle()">BACK</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen">
  <canvas id="gameCanvas"></canvas>
  <div id="chatLayer" style="position:absolute;inset:0;pointer-events:none;z-index:150"></div>
  <div id="pathLayer" style="position:absolute;inset:0;pointer-events:none;z-index:50"></div>

  <div id="topBar">
    <div class="top-group">
      <button class="top-btn" onclick="togglePanel('roomPanel')">NAVIGATOR</button>
      <span class="room-name" id="roomName">Grand Lobby</span>
    </div>
    <div class="top-group">
      <div class="currency cur-gold">GOLD: <span id="gold">500</span></div>
      <div class="currency cur-gem">GEMS: <span id="gems">50</span></div>
      <div class="currency cur-lvl">LVL: <span id="level">1</span></div>
      <button class="top-btn" onclick="togglePanel('catalogPanel')">CATALOG</button>
      <button class="top-btn" onclick="togglePanel('invPanel')">INVENTORY</button>
      <button class="top-btn" onclick="togglePanel('tradePanel')">TRADE</button>
      <button class="top-btn" onclick="togglePanel('achPanel')">TROPHIES</button>
    </div>
  </div>

  <div id="bottomBar">
    <input type="text" id="chatInput" placeholder="Press Enter to chat..." onkeydown="if(event.key==='Enter'){sendChat(this.value);this.value=''}">
    <button class="bbtn" onclick="togglePanel('roomPanel')">ROOMS</button>
    <button class="bbtn" onclick="openTrade()">TRADE</button>
    <button class="bbtn" onclick="backToTitle()">QUIT</button>
  </div>

  <!-- Room Navigator -->
  <div id="roomPanel" class="panel">
    <div class="panel-h"><h2>Room Navigator</h2><button class="panel-close" onclick="closePanel('roomPanel')">&times;</button></div>
    <div class="panel-body"><div class="room-grid" id="roomGrid"></div></div>
  </div>

  <!-- Catalog -->
  <div id="catalogPanel" class="panel">
    <div class="panel-h"><h2>Catalog</h2><button class="panel-close" onclick="closePanel('catalogPanel')">&times;</button></div>
    <div class="panel-body" style="padding:10px">
      <div style="display:flex;gap:6px;margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:8px">
        <button class="top-btn" style="border-color:#FFD700;color:#FFD700" onclick="setCatalogTab('furniture')">Furniture</button>
        <button class="top-btn" onclick="setCatalogTab('hair')">Hair</button>
        <button class="top-btn" onclick="setCatalogTab('clothes')">Clothes</button>
        <button class="top-btn" onclick="setCatalogTab('rare')">Rare</button>
      </div>
      <div id="catalogGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"></div>
    </div>
  </div>

  <!-- Inventory -->
  <div id="invPanel" class="panel">
    <div class="panel-h"><h2>Inventory</h2><button class="panel-close" onclick="closePanel('invPanel')">&times;</button></div>
    <div class="panel-body"><div id="invGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px"></div></div>
  </div>

  <!-- Trade -->
  <div id="tradePanel" class="panel">
    <div class="panel-h"><h2>Trading Post</h2><button class="panel-close" onclick="closePanel('tradePanel')">&times;</button></div>
    <div class="panel-body" id="tradeBody"></div>
  </div>

  <!-- Achievements -->
  <div id="achPanel" class="panel">
    <div class="panel-h"><h2>Trophies</h2><button class="panel-close" onclick="closePanel('achPanel')">&times;</button></div>
    <div class="panel-body" id="achList"></div>
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-box">
    <h2>Welcome Traveler</h2>
    <input type="text" id="loginName" placeholder="Your name" maxlength="16" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-err" id="loginErr"></div>
    <div class="modal-row">
      <button class="btn-gold" onclick="doLogin()">ENTER INN</button>
    </div>
  </div>
</div>

<script>

// ===== STARLIGHT INN v18 - PUBLIC ROOM HOTEL =====
// Architecture: Background IS the room. Avatars walk on top. No furniture overlay.

const TILE_W = 64;
const TILE_H = 32;
const VERSION = 'v18.0';

// ===== ASSETS =====
const ASSET_URLS = {
  title_bg: 'assets/title-bg-v16.png',
  bg_mainhall: 'assets/sprites/rooms/bg_mainhall.png',
  bg_tavern: 'assets/sprites/rooms/bg_tavern.png',
  bg_garden: 'assets/sprites/rooms/bg_garden.png',
  bg_library: 'assets/sprites/rooms/bg_library.png',
  bg_bedroom: 'assets/sprites/rooms/bg_bedroom.png',
  bg_beach: 'assets/sprites/rooms/bg_beach.png',
  bg_lido: 'assets/sprites/rooms/bg_lido.png',
  bg_rooftop: 'assets/sprites/rooms/bg_rooftop.png',
  bg_arcade: 'assets/sprites/rooms/bg_arcade.png',
  bg_spa: 'assets/sprites/rooms/bg_spa.png',
  bg_market: 'assets/sprites/rooms/bg_market.png',
  bg_event: 'assets/sprites/rooms/bg_event.png',
  bg_winter: 'assets/sprites/rooms/bg_winter.png',

  char_boy_hoodie: 'assets/sprites/avatars/char_boy_hoodie.png',
  char_girl_dress: 'assets/sprites/avatars/char_girl_dress.png',
  char_boy_jacket: 'assets/sprites/avatars/char_boy_jacket.png',
  char_girl_maid: 'assets/sprites/avatars/char_girl_maid.png',
  char_boy_tank: 'assets/sprites/avatars/char_boy_tank.png',
  char_wizard: 'assets/sprites/avatars/char_wizard.png',
  char_knight: 'assets/sprites/avatars/char_knight.png',
  char_catgirl: 'assets/sprites/avatars/char_catgirl.png',
  char_innkeeper: 'assets/sprites/avatars/char_innkeeper.png',
  char_vampire: 'assets/sprites/avatars/char_vampire.png',
};

const AVATARS = [
  { id: 'char_boy_hoodie', name: 'Hoodie Boy', icon: '👦' },
  { id: 'char_girl_dress', name: 'Dress Girl', icon: '👧' },
  { id: 'char_boy_jacket', name: 'Jacket Boy', icon: '🧑' },
  { id: 'char_girl_maid', name: 'Maid Girl', icon: '👩' },
  { id: 'char_boy_tank', name: 'Summer Boy', icon: '🏖️' },
  { id: 'char_wizard', name: 'Wizard', icon: '🔮' },
  { id: 'char_knight', name: 'Knight', icon: '⚔️' },
  { id: 'char_catgirl', name: 'Cat Girl', icon: '🐱' },
  { id: 'char_innkeeper', name: 'Innkeeper', icon: '👨‍🍳' },
  { id: 'char_vampire', name: 'Vampire', icon: '🧛' },
];

// ===== STATE =====
const S = {
  screen: 'loading',
  assets: {},
  loaded: 0,
  total: 0,
  player: { name: '', x: 3, y: 3, tx: 3, ty: 3, path: [], dir: 's', walkTime: 0, avatar: 'char_boy_hoodie', gold: 500, gems: 50, xp: 0, level: 1 },
  room: null,
  otherPlayers: [],
  chat: [],
  catalogTab: 'furniture',
};

// ===== ROOMS (Public Room Style) =====
// Background IS the room. No furniture overlay.
// Walkable tiles are marked subtly. Exits are walkable zones.
const ROOMS = {
  lobby: {
    name: 'Grand Lobby', desc: 'The main entrance hall', bg: 'bg_mainhall',
    width: 10, height: 8,
    exits: [
      { to: 'tavern', x: 0, y: 3, label: 'Tavern' },
      { to: 'garden', x: 9, y: 3, label: 'Garden' },
      { to: 'library', x: 4, y: 0, label: 'Library' },
      { to: 'bedroom', x: 5, y: 7, label: 'Bedroom' },
    ],
    // Walkable floor area (tiles that are floor, not walls)
    floorTiles: [], // auto-generated from dimensions
  },
  tavern: {
    name: 'Cozy Tavern', desc: 'Warm drinks by the fire', bg: 'bg_tavern',
    width: 9, height: 7,
    exits: [{ to: 'lobby', x: 8, y: 3, label: 'Lobby' }],
  },
  garden: {
    name: 'Garden Path', desc: 'Flowers and moonlight', bg: 'bg_garden',
    width: 10, height: 8,
    exits: [
      { to: 'lobby', x: 0, y: 3, label: 'Lobby' },
      { to: 'beach', x: 9, y: 6, label: 'Beach' },
    ],
  },
  library: {
    name: 'Library Lounge', desc: 'Books and silence', bg: 'bg_library',
    width: 9, height: 8,
    exits: [{ to: 'lobby', x: 4, y: 7, label: 'Lobby' }],
  },
  bedroom: {
    name: 'Sleepy Bedroom', desc: 'Rest and recharge', bg: 'bg_bedroom',
    width: 8, height: 7,
    exits: [{ to: 'lobby', x: 3, y: 0, label: 'Lobby' }],
  },
  beach: {
    name: 'Sunny Beach', desc: 'Sand and ocean breeze', bg: 'bg_beach',
    width: 10, height: 7,
    exits: [{ to: 'garden', x: 0, y: 3, label: 'Garden' }],
  },
  rooftop: {
    name: 'Rooftop Cafe', desc: 'Coffee with a view', bg: 'bg_rooftop',
    width: 9, height: 7,
    exits: [{ to: 'lobby', x: 3, y: 6, label: 'Lobby' }],
  },
  arcade: {
    name: 'Neon Arcade', desc: 'Games and prizes', bg: 'bg_arcade',
    width: 9, height: 7,
    exits: [{ to: 'lobby', x: 0, y: 3, label: 'Lobby' }],
  },
  spa: {
    name: 'Spa Bay', desc: 'Relaxation and zen', bg: 'bg_spa',
    width: 8, height: 7,
    exits: [{ to: 'lobby', x: 3, y: 0, label: 'Lobby' }],
  },
  market: {
    name: 'Market Hall', desc: 'Trade and treasures', bg: 'bg_market',
    width: 10, height: 7,
    exits: [{ to: 'lobby', x: 0, y: 3, label: 'Lobby' }],
  },
  event: {
    name: 'Event Pavilion', desc: 'Festivals and shows', bg: 'bg_event',
    width: 11, height: 8,
    exits: [{ to: 'lobby', x: 0, y: 3, label: 'Lobby' }],
  },
  winter: {
    name: 'Winter Plaza', desc: 'Snow and starlight', bg: 'bg_winter',
    width: 10, height: 8,
    exits: [{ to: 'lobby', x: 4, y: 7, label: 'Lobby' }],
  },
};

// Generate floor tiles for each room
Object.values(ROOMS).forEach(room => {
  room.floorTiles = [];
  for (let y = 0; y < room.height; y++) {
    for (let x = 0; x < room.width; x++) {
      room.floorTiles.push({ x, y });
    }
  }
});

// ===== ASSET LOADER =====
function assetUrl(path) {
  return path + '?v=' + VERSION;
}

function loadImg(key, url) {
  return new Promise(resolve => {
    const img = new Image();
    // No crossOrigin needed - same domain assets
    img.onload = () => {
      S.assets[key] = img;
      resolve(true);
    };
    img.onerror = () => {
      console.warn('Failed to load:', key, 'from', url);
      S.assets[key] = makePlaceholder(key);
      resolve(false);
    };
    img.src = assetUrl(url);
  });
}

function makePlaceholder(key) {
  const c = document.createElement('canvas');
  const size = key.includes('bg_') ? 400 : 64;
  c.width = size; c.height = size;
  const x = c.getContext('2d');
  if (key.includes('bg_')) {
    const g = x.createLinearGradient(0, 0, 0, size);
    g.addColorStop(0, '#1a1a3e'); g.addColorStop(1, '#0a0a1a');
    x.fillStyle = g; x.fillRect(0, 0, size, size);
  } else {
    x.fillStyle = '#444'; x.fillRect(8, 8, size - 16, size - 16);
    x.fillStyle = '#FFD700'; x.font = (size / 4) + 'px sans-serif';
    x.textAlign = 'center'; x.fillText('?', size / 2, size / 2 + 8);
  }
  const img = new Image(); img.src = c.toDataURL(); return img;
}

async function loadAllAssets() {
  const keys = Object.keys(ASSET_URLS);
  S.total = keys.length;
  S.loaded = 0;

  const batch = 6;
  for (let i = 0; i < keys.length; i += batch) {
    const batchKeys = keys.slice(i, i + batch);
    await Promise.all(batchKeys.map(k => loadImg(k, ASSET_URLS[k])));
    S.loaded += batchKeys.length;
    const pct = Math.round((S.loaded / S.total) * 100);
    document.getElementById('loadFill').style.width = pct + '%';
    document.getElementById('loadText').textContent = 'Loading hotel... ' + pct + '%';
  }

  // Small delay for smooth transition
  await new Promise(r => setTimeout(r, 400));
  document.getElementById('loadScreen').classList.add('done');
  showScreen('title');
}

// ===== SCREEN MANAGEMENT =====
function showScreen(name) {
  S.screen = name;
  document.querySelectorAll('#loadScreen, #titleScreen, #charScreen, #gameScreen').forEach(el => {
    el.classList.remove('active');
  });
  if (name === 'title') document.getElementById('titleScreen').classList.add('active');
  if (name === 'char') {
    document.getElementById('charScreen').classList.add('active');
    renderCharSelect();
  }
  if (name === 'game') {
    document.getElementById('gameScreen').classList.add('active');
    resizeCanvas();
    enterRoom('lobby');
    requestAnimationFrame(gameLoop);
  }
}

// ===== ROOM SYSTEM (Public Room) =====
function enterRoom(id) {
  if (!ROOMS[id]) return;
  const room = ROOMS[id];
  S.room = { ...room, id };
  S.player.x = Math.floor(room.width / 2);
  S.player.y = Math.floor(room.height / 2);
  S.player.tx = S.player.x;
  S.player.ty = S.player.y;
  S.player.path = [];
  document.getElementById('roomName').textContent = room.name;
  clearPathDots();
  clearChat();
}

function isoToScreen(tx, ty) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 + 40; // offset for UI bars
  return {
    x: cx + (tx - ty) * (TILE_W / 2),
    y: cy + (tx + ty) * (TILE_H / 2)
  };
}

function screenToIso(sx, sy) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 + 40;
  const x = (sx - cx) / (TILE_W / 2);
  const y = (sy - cy) / (TILE_H / 2);
  return {
    x: Math.round((x + y) / 2),
    y: Math.round((y - x) / 2)
  };
}

// ===== PATHFINDING =====
function findPath(sx, sy, ex, ey) {
  if (sx === ex && sy === ey) return [];
  const w = S.room.width;
  const h = S.room.height;
  if (ex < 0 || ey < 0 || ex >= w || ey >= h) return [];

  const open = [{ x: sx, y: sy, g: 0, h: Math.abs(ex - sx) + Math.abs(ey - sy), parent: null }];
  const closed = new Set();

  while (open.length > 0) {
    open.sort((a, b) => (a.g + a.h) - (b.g + b.h));
    const cur = open.shift();
    const key = cur.x + ',' + cur.y;
    if (closed.has(key)) continue;
    closed.add(key);

    if (cur.x === ex && cur.y === ey) {
      const path = [];
      let n = cur;
      while (n.parent) { path.unshift({ x: n.x, y: n.y }); n = n.parent; }
      return path;
    }

    for (const [dx, dy] of [[0, 1], [1, 0], [0, -1], [-1, 0]]) {
      const nx = cur.x + dx, ny = cur.y + dy;
      if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
      const nkey = nx + ',' + ny;
      if (closed.has(nkey)) continue;
      const g = cur.g + 1;
      const hh = Math.abs(ex - nx) + Math.abs(ey - ny);
      const existing = open.find(o => o.x === nx && o.y === ny);
      if (!existing || g < existing.g) {
        if (existing) { existing.g = g; existing.parent = cur; }
        else open.push({ x: nx, y: ny, g, h: hh, parent: cur });
      }
    }
  }
  return [];
}

// ===== RENDERING =====
let lastT = 0;

function resizeCanvas() {
  const c = document.getElementById('gameCanvas');
  if (!c) return;
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
window.addEventListener('resize', () => { if (S.screen === 'game') resizeCanvas(); });

function gameLoop(t) {
  if (S.screen !== 'game') return;
  const dt = t - lastT;
  lastT = t;
  updatePlayer(dt);
  renderRoom();
  updateChatBubbles(dt);
  requestAnimationFrame(gameLoop);
}

function updatePlayer(dt) {
  if (S.player.path.length > 0) {
    S.player.walkTime += dt;
    const next = S.player.path[0];
    const dx = next.x - S.player.x;
    const dy = next.y - S.player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = dt * 0.0045; // comfortable walking speed

    if (dist < speed) {
      S.player.x = next.x;
      S.player.y = next.y;
      S.player.path.shift();
      if (S.player.path.length === 0) {
        checkExit();
        S.player.walkTime = 0;
        clearPathDots();
      }
    } else {
      S.player.x += (dx / dist) * speed;
      S.player.y += (dy / dist) * speed;
      // Direction
      if (Math.abs(dx) > Math.abs(dy)) S.player.dir = dx > 0 ? 'e' : 'w';
      else S.player.dir = dy > 0 ? 's' : 'n';
    }
    updatePathDots();
  } else {
    S.player.walkTime = 0;
  }
}

function checkExit() {
  if (!S.room || !S.room.exits) return;
  const px = Math.round(S.player.x);
  const py = Math.round(S.player.y);
  for (const exit of S.room.exits) {
    if (exit.x === px && exit.y === py) {
      enterRoom(exit.to);
      return;
    }
  }
}

function renderRoom() {
  const c = document.getElementById('gameCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  if (!S.room) return;

  // Draw background image (the room itself)
  const bg = S.assets[S.room.bg];
  if (bg) {
    // Draw background centered and covering
    const scale = Math.max(c.width / bg.width, c.height / bg.height);
    const bw = bg.width * scale;
    const bh = bg.height * scale;
    ctx.drawImage(bg, (c.width - bw) / 2, (c.height - bh) / 2, bw, bh);
  } else {
    ctx.fillStyle = S.room.color || '#0a0a1a';
    ctx.fillRect(0, 0, c.width, c.height);
  }

  const cx = c.width / 2;
  const cy = c.height / 2 + 40;
  const w = S.room.width;
  const h = S.room.height;

  // Draw subtle floor tile grid (very faint, just for visual reference)
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const pos = isoToScreen(x, y);
      ctx.fillStyle = ((x + y) % 2 === 0) ? 'rgba(255,215,0,0.04)' : 'rgba(255,215,0,0.02)';
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - TILE_H / 2);
      ctx.lineTo(pos.x + TILE_W / 2, pos.y);
      ctx.lineTo(pos.x, pos.y + TILE_H / 2);
      ctx.lineTo(pos.x - TILE_W / 2, pos.y);
      ctx.closePath();
      ctx.fill();

      // Subtle outline
      ctx.strokeStyle = 'rgba(255,215,0,0.06)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Draw exit zones (glowing golden tiles)
  if (S.room.exits) {
    S.room.exits.forEach(exit => {
      const pos = isoToScreen(exit.x, exit.y);
      // Glow effect
      ctx.fillStyle = 'rgba(255,215,0,0.2)';
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - TILE_H / 2);
      ctx.lineTo(pos.x + TILE_W / 2, pos.y);
      ctx.lineTo(pos.x, pos.y + TILE_H / 2);
      ctx.lineTo(pos.x - TILE_W / 2, pos.y);
      ctx.closePath();
      ctx.fill();

      // Pulsing border
      const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.5;
      ctx.strokeStyle = `rgba(255,215,0,${pulse * 0.6})`;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(exit.label || 'EXIT', pos.x, pos.y + 2);
    });
  }

  // Sort and render all entities by depth (y then x)
  const entities = [];

  // Other players (simulated)
  S.otherPlayers.forEach(p => {
    const pos = isoToScreen(p.x, p.y);
    entities.push({ type: 'player', z: p.y * w + p.x + 0.1, x: pos.x, y: pos.y, player: p });
  });

  // Self
  const selfPos = isoToScreen(S.player.x, S.player.y);
  entities.push({ type: 'self', z: S.player.y * w + S.player.x + 0.2, x: selfPos.x, y: selfPos.y });

  entities.sort((a, b) => a.z - b.z);

  // Render each entity
  entities.forEach(ent => {
    if (ent.type === 'self') {
      renderAvatarSprite(ctx, S.player, ent.x, ent.y, true);
    } else {
      renderAvatarSprite(ctx, ent.player, ent.x, ent.y, false);
    }
  });

  // Draw hovered tile highlight
  if (S.hoverTile) {
    const pos = isoToScreen(S.hoverTile.x, S.hoverTile.y);
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y - TILE_H / 2);
    ctx.lineTo(pos.x + TILE_W / 2, pos.y);
    ctx.lineTo(pos.x, pos.y + TILE_H / 2);
    ctx.lineTo(pos.x - TILE_W / 2, pos.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function renderAvatarSprite(ctx, player, x, y, isSelf) {
  const img = S.assets[player.avatar || S.player.avatar];
  if (!img || !img.width || !img.height) return;

  // Avatar dimensions
  const avaW = 56;
  const avaH = 84;

  // Bobbing animation while walking
  const bob = player.path && player.path.length > 0 ? Math.sin((player.walkTime || 0) * 0.012) * 3 : 0;

  ctx.save();
  ctx.translate(x, y - TILE_H / 2 + bob);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, avaH / 2 - 2, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Draw avatar centered
  const drawW = avaW;
  const drawH = avaH;
  ctx.drawImage(img, 0, 0, img.width, img.height, -avaW / 2, -avaH + 8, avaW, avaH);

  // Name tag
  ctx.font = isSelf ? 'bold 11px sans-serif' : '10px sans-serif';
  const name = player.name || 'Guest';
  const tw = ctx.measureText(name).width;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.moveTo(-tw / 2 - 6, -drawH + 2);
  ctx.lineTo(tw / 2 + 6, -drawH + 2);
  ctx.lineTo(tw / 2 + 6, -drawH + 18);
  ctx.lineTo(-tw / 2 - 6, -drawH + 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = isSelf ? '#FFD700' : '#ccc';
  ctx.textAlign = 'center';
  ctx.fillText(name, 0, -drawH + 14);

  ctx.restore();
}

// ===== PATH VISUALIZATION =====
function clearPathDots() {
  document.getElementById('pathLayer').innerHTML = '';
}

function updatePathDots() {
  const layer = document.getElementById('pathLayer');
  if (!layer) return;

  // Only show dots for remaining path
  const dots = layer.querySelectorAll('.path-dot');
  dots.forEach(d => d.remove());

  S.player.path.forEach((pt, i) => {
    const pos = isoToScreen(pt.x, pt.y);
    const dot = document.createElement('div');
    dot.className = 'path-dot';
    dot.style.left = pos.x + 'px';
    dot.style.top = pos.y + 'px';
    dot.style.opacity = Math.max(0.2, 1 - i * 0.15);
    dot.style.width = (6 - Math.min(i, 3)) + 'px';
    dot.style.height = (6 - Math.min(i, 3)) + 'px';
    layer.appendChild(dot);
  });
}

// ===== INPUT =====
document.getElementById('gameCanvas').addEventListener('mousemove', e => {
  if (S.screen !== 'game' || !S.room) return;
  const rect = document.getElementById('gameCanvas').getBoundingClientRect();
  const iso = screenToIso(e.clientX - rect.left, e.clientY - rect.top);
  if (iso.x >= 0 && iso.y >= 0 && iso.x < S.room.width && iso.y < S.room.height) {
    S.hoverTile = iso;
  } else {
    S.hoverTile = null;
  }
});

document.getElementById('gameCanvas').addEventListener('mouseleave', () => {
  S.hoverTile = null;
});

document.getElementById('gameCanvas').addEventListener('click', e => {
  if (S.screen !== 'game' || !S.room) return;
  const rect = document.getElementById('gameCanvas').getBoundingClientRect();
  const iso = screenToIso(e.clientX - rect.left, e.clientY - rect.top);
  if (iso.x >= 0 && iso.y >= 0 && iso.x < S.room.width && iso.y < S.room.height) {
    const path = findPath(Math.round(S.player.x), Math.round(S.player.y), iso.x, iso.y);
    if (path.length > 0) {
      S.player.path = path;
      updatePathDots();
    }
  }
});

// ===== CHAT =====
function sendChat(text) {
  if (!text.trim()) return;
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  bubble.innerHTML = '<div class="chat-name">' + (S.player.name || 'You') + '</div>' + escapeHtml(text.trim());
  document.getElementById('chatLayer').appendChild(bubble);
  S.chat.push({ el: bubble, x: S.player.x, y: S.player.y, life: 5000 });
  positionChatBubble(bubble, S.player.x, S.player.y);
}

function positionChatBubble(el, x, y) {
  const pos = isoToScreen(x, y);
  el.style.left = pos.x + 'px';
  el.style.top = (pos.y - 70) + 'px';
}

function updateChatBubbles(dt) {
  S.chat = S.chat.filter(c => {
    c.life -= dt;
    positionChatBubble(c.el, S.player.x, S.player.y);
    if (c.life <= 0) {
      c.el.remove();
      return false;
    }
    // Fade out in last second
    if (c.life < 1000) {
      c.el.style.opacity = c.life / 1000;
    }
    return true;
  });
}

function clearChat() {
  document.getElementById('chatLayer').innerHTML = '';
  S.chat = [];
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function togglePanel(id) {
  const p = document.getElementById(id);
  if (!p) return;
  const active = p.classList.contains('active');
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  if (!active) {
    p.classList.add('active');
    if (id === 'roomPanel') renderRoomList();
    if (id === 'catalogPanel') renderCatalog();
    if (id === 'invPanel') renderInventory();
    if (id === 'tradePanel') renderTrade();
    if (id === 'achPanel') renderAch();
  }
}

function closePanel(id) {
  const p = document.getElementById(id);
  if (p) p.classList.remove('active');
}

    }

    const rarityColors = { common: '#888', uncommon: '#32CD32', rare: '#4169E1', epic: '#9370DB', legendary: '#FFD700' };
    div.innerHTML += '<div style="font-size:10px;color:#aaa;text-align:center;margin-top:4px">' + item.name + '</div>';
    div.innerHTML += '<div style="font-size:11px;color:' + rarityColors[item.rarity] + ';font-weight:bold">' + item.price + 'g</div>';

    const tag = document.createElement('div');
    tag.style.cssText = 'position:absolute;top:3px;right:3px;font-size:8px;padding:2px 4px;border-radius:3px;font-weight:bold;background:' + rarityColors[item.rarity] + ';color:' + (item.rarity === 'legendary' ? '#1a1a2e' : '#fff') + '';
    tag.textContent = item.rarity[0].toUpperCase();
    div.appendChild(tag);

    div.onclick = () => buyItem(item);
    grid.appendChild(div);
  });
}

function buyItem(item) {
  if (S.player.gold < item.price) {
    alert('Not enough gold!');
    return;
  }
  S.player.gold -= item.price;
  updateCurrency();
  saveData();
  // Could add to inventory here
}

function renderInventory() {
  const grid = document.getElementById('invGrid');
  if (!grid) return;
  grid.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const div = document.createElement('div');
    div.style.cssText = 'aspect-ratio:1;background:rgba(255,255,255,.03);border:2px solid #333;border-radius:8px;display:flex;align-items:center;justify-content:center';
    if (i < 3) {
      // Starter items
      const icons = ['🪑', '🛋️', '🪴'];
      div.textContent = icons[i];
      div.style.fontSize = '24px';
    }
    grid.appendChild(div);
  }
}

function renderTrade() {
  const body = document.getElementById('tradeBody');
  if (!body) return;
  body.innerHTML = '<div style="text-align:center;color:#888;padding:20px">Trading is available! Find another player to trade with.</div>';
}

function openTrade() {
  togglePanel('tradePanel');
}

// ===== ACHIEVEMENTS =====
const ACHS = [
  { id: 'enter', name: 'First Steps', desc: 'Enter the Starlight Inn', icon: '👣', reward: 10 },
  { id: 'explorer', name: 'Explorer', desc: 'Visit all 12 rooms', icon: '🗺️', reward: 100 },
  { id: 'chat', name: 'Socialite', desc: 'Send 10 chat messages', icon: '💬', reward: 30 },
  { id: 'rich', name: 'Wealthy', desc: 'Have 1000 gold', icon: '💰', reward: 40 },
  { id: 'level', name: 'Rising Star', desc: 'Reach level 5', icon: '⭐', reward: 60 },
];

function renderAch() {
  const list = document.getElementById('achList');
  if (!list) return;
  list.innerHTML = '';
  ACHS.forEach(ach => {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid #333;margin-bottom:8px';
    div.innerHTML = '<div style="font-size:32px">' + ach.icon + '</div><div style="flex:1"><div style="font-weight:bold;font-size:14px;color:#FFD700">' + ach.name + '</div><div style="font-size:12px;color:#888">' + ach.desc + '</div><div style="font-size:11px;color:#32CD32">+' + ach.reward + ' XP</div></div>';
    list.appendChild(div);
  });
}

function showTrophies() {
  togglePanel('achPanel');
}

// ===== CURRENCY =====
function updateCurrency() {
  const g = document.getElementById('gold');
  const m = document.getElementById('gems');
  const l = document.getElementById('level');
  if (g) g.textContent = S.player.gold;
  if (m) m.textContent = S.player.gems;
  if (l) l.textContent = S.player.level;
}

// ===== MODALS =====
function openModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.add('active');
}

function closeModal(id) {
  const m = document.getElementById(id);
  if (m) m.classList.remove('active');
  const err = m?.querySelector('.modal-err');
  if (err) err.textContent = '';
}

function backToTitle() {
  showScreen('title');
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded', () => {
  // Check saved name
  try {
    const raw = localStorage.getItem('si_v18');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.name) S.player.name = d.name;
      if (d.avatar) S.player.avatar = d.avatar;
    }
  } catch(e) {}

  loadAllAssets();
  updateCurrency();

  // Escape to close panels
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.panel, .modal').forEach(el => el.classList.remove('active'));
    }
  });
});
</script>
</body>
</html>
