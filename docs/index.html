<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Starlight Inn - Isometric Virtual World</title>
<style>
/* ================================================================
   STARLIGHT INN v12.0.0 — Complete CSS
   ================================================================ */
:root {
  --bg: #0a0a1a;
  --panel: rgba(15, 15, 30, 0.95);
  --gold: #FFD700;
  --gold-dim: #B8860B;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: 2px solid var(--gold);
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden; width: 100vw; height: 100vh;
}
canvas { image-rendering: pixelated; display: block; }

/* ---- Loading Screen ---- */
#loadingScreen {
  position: fixed; inset: 0; z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #0a0a1a 0%, #1a1020 50%, #0d0d1a 100%);
  transition: opacity 0.5s;
}
.loading-box {
  text-align: center; padding: 40px;
  background: rgba(15,15,30,0.9);
  border: var(--border); border-radius: var(--radius);
  min-width: 300px;
}
.loading-box h2 {
  color: var(--gold); font-size: 28px;
  text-shadow: 0 0 20px rgba(255,215,0,0.4);
  letter-spacing: 0.1em; margin-bottom: 20px;
}
.loading-bar {
  width: 100%; height: 12px;
  background: #222; border-radius: 6px;
  overflow: hidden; margin-bottom: 12px;
}
.loading-fill {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.3s; border-radius: 6px;
}
#loadText { color: var(--text-dim); font-size: 13px; }

/* ---- Title Screen ---- */
#titleScreen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  background: linear-gradient(180deg, #0a0a1a 0%, #1a1020 50%, #0d0d1a 100%);
}
.title-bg {
  position: absolute; inset: 0;
}
.title-bg img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; opacity: 0.5;
  image-rendering: pixelated;
}
.title-bg .stars {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(2px 2px at 20px 30px, #fff, transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 90px 40px, #fff, transparent),
    radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 160px 120px, #fff, transparent),
    radial-gradient(1px 1px at 200px 50px, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 230px 90px, #fff, transparent),
    radial-gradient(1px 1px at 280px 30px, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 300px 100px, #fff, transparent),
    radial-gradient(1px 1px at 350px 60px, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 400px 130px, #fff, transparent),
    radial-gradient(1px 1px at 450px 40px, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 500px 80px, #fff, transparent),
    radial-gradient(1px 1px at 550px 110px, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 600px 50px, #fff, transparent),
    radial-gradient(1px 1px at 650px 90px, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 700px 30px, #fff, transparent),
    radial-gradient(1px 1px at 750px 70px, rgba(255,255,255,0.8), transparent),
    radial-gradient(2px 2px at 800px 120px, #fff, transparent),
    radial-gradient(1px 1px at 850px 60px, rgba(255,255,255,0.6), transparent),
    radial-gradient(2px 2px at 50px 150px, #fff, transparent),
    radial-gradient(1px 1px at 100px 200px, rgba(255,255,255,0.7), transparent),
    radial-gradient(2px 2px at 150px 170px, #fff, transparent),
    radial-gradient(1px 1px at 250px 220px, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 350px 180px, #fff, transparent);
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.5; }
  100% { opacity: 1; }
}
.title-content {
  position: relative; z-index: 10;
  text-align: center; padding: 20px;
}
.title-text {
  font-size: clamp(36px, 8vw, 72px);
  color: #FFD700;
  text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 4px 8px rgba(0,0,0,0.8);
  letter-spacing: 0.1em; margin-bottom: 10px;
  animation: titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 4px 8px rgba(0,0,0,0.8); }
  50% { text-shadow: 0 0 60px rgba(255,215,0,0.8), 0 0 100px rgba(255,215,0,0.3), 0 4px 8px rgba(0,0,0,0.8); }
}
.title-sub {
  font-size: clamp(14px, 3vw, 20px);
  color: #aaa; margin-bottom: 30px;
  letter-spacing: 0.05em;
}
.title-buttons { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.version {
  position: absolute; bottom: 15px; right: 20px;
  color: var(--text-dim); font-size: 12px; z-index: 10;
}

/* ---- Buttons ---- */
.btn {
  padding: 12px 32px; font-size: 15px; font-weight: bold;
  border: 2px solid transparent; border-radius: var(--radius);
  cursor: pointer; letter-spacing: 0.05em;
  transition: all 0.2s; min-width: 220px;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn-gold {
  background: linear-gradient(135deg, #FFD700, #B8860B);
  color: #1a1200; border-color: #FFD700;
}
.btn-gold:hover { box-shadow: 0 0 20px rgba(255,215,0,0.4); }
.btn-blue {
  background: linear-gradient(135deg, #4a90d9, #2a5a9a);
  color: #fff; border-color: #4a90d9;
}
.btn-blue:hover { box-shadow: 0 0 20px rgba(74,144,217,0.4); }
.btn-green {
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  color: #fff; border-color: #4caf50;
}
.btn-green:hover { box-shadow: 0 0 20px rgba(76,175,80,0.4); }
.btn-red {
  background: linear-gradient(135deg, #e74c3c, #922b21);
  color: #fff; border-color: #e74c3c;
}
.btn-red:hover { box-shadow: 0 0 20px rgba(231,76,60,0.4); }
.btn-small {
  padding: 6px 14px; font-size: 12px; min-width: auto;
}

/* ---- Game Screen ---- */
#gameScreen {
  position: fixed; inset: 0;
  display: none;
}
#gameCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* ---- UI Overlays ---- */
.ui-panel {
  position: absolute;
  background: var(--panel);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius);
  backdrop-filter: blur(10px);
  z-index: 100;
}

/* ---- Room Label ---- */
#roomLabel {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(15,15,30,0.9); color: var(--gold);
  padding: 6px 20px; border-radius: var(--radius);
  font-size: 14px; font-weight: bold;
  border: 1px solid rgba(255,215,0,0.4); z-index: 50;
  pointer-events: none;
}

/* ---- Chat Bar ---- */
#chatBar {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 50;
  background: rgba(15,15,30,0.9);
  padding: 6px; border-radius: var(--radius);
  border: 1px solid rgba(255,215,0,0.3);
}
#chatInput {
  background: rgba(30,30,50,0.9);
  border: 1px solid rgba(255,215,0,0.3);
  color: var(--text); padding: 8px 12px;
  border-radius: 6px; font-size: 13px;
  width: 280px; outline: none;
}
#chatInput:focus { border-color: var(--gold); }
#chatInput::placeholder { color: var(--text-dim); }

/* ---- Chat Log ---- */
#chatLog {
  position: absolute; bottom: 55px; left: 10px;
  width: 320px; max-height: 180px; overflow-y: auto;
  background: rgba(15,15,30,0.85);
  border-radius: var(--radius); padding: 8px;
  border: 1px solid rgba(255,215,0,0.2);
  font-size: 12px; z-index: 50;
}
#chatLog .msg-system { color: #4fc3f7; font-style: italic; }
#chatLog .msg-player { color: #FFD700; }
#chatLog .msg-chat { color: var(--text); }
#chatLog > div { margin-bottom: 3px; word-break: break-word; }

/* ---- Chat Bubble (Canvas overlay via DOM) ---- */
.chat-bubble {
  position: absolute;
  background: rgba(15,15,30,0.95);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 10px; padding: 6px 12px;
  font-size: 12px; color: var(--text);
  pointer-events: none; z-index: 60;
  max-width: 180px; word-break: break-word;
  text-align: center;
  transform: translate(-50%, -100%);
  margin-top: -60px;
  animation: bubblePop 0.2s ease-out;
}
.chat-bubble::after {
  content: ''; position: absolute;
  bottom: -6px; left: 50%; transform: translateX(-50%);
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid rgba(255,215,0,0.4);
}
@keyframes bubblePop {
  0% { transform: translate(-50%, -100%) scale(0.5); opacity: 0; }
  100% { transform: translate(-50%, -100%) scale(1); opacity: 1; }
}

/* ---- Side Panel (Inventory/Friends/Settings) ---- */
#sidePanel {
  position: absolute; right: 10px; top: 50px;
  width: 220px; max-height: calc(100vh - 70px);
  overflow-y: auto; z-index: 50;
  display: none;
}
.panel-header {
  background: rgba(255,215,0,0.15);
  color: var(--gold); padding: 10px;
  font-weight: bold; font-size: 14px;
  border-bottom: 1px solid rgba(255,215,0,0.3);
  display: flex; justify-content: space-between; align-items: center;
  border-radius: var(--radius) var(--radius) 0 0;
}
.panel-close {
  background: none; border: none; color: var(--gold);
  cursor: pointer; font-size: 18px; padding: 0 4px;
}
.panel-body { padding: 10px; }

/* ---- Inventory Grid ---- */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
.inv-slot {
  aspect-ratio: 1;
  background: rgba(30,30,50,0.8);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
  overflow: hidden;
}
.inv-slot:hover { border-color: var(--gold); transform: scale(1.05); }
.inv-slot.equipped {
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.1);
}
.inv-slot img {
  max-width: 80%; max-height: 80%;
  object-fit: contain; pointer-events: none;
}
.inv-slot .equip-badge {
  position: absolute; bottom: 2px; right: 2px;
  font-size: 10px; color: var(--gold);
}

/* ---- Trade Panel ---- */
#tradePanel {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 420px; z-index: 150;
  display: none;
  background: var(--panel);
  border: var(--border); border-radius: var(--radius);
  box-shadow: 0 0 30px rgba(0,0,0,0.7);
}
.trade-section {
  padding: 10px;
  border-bottom: 1px solid rgba(255,215,0,0.2);
}
.trade-section:last-child { border-bottom: none; }
.trade-offers {
  display: flex; gap: 15px;
  min-height: 80px;
}
.trade-col {
  flex: 1;
  background: rgba(30,30,50,0.6);
  border-radius: 6px; padding: 8px;
  border: 1px solid rgba(255,215,0,0.2);
}
.trade-col h4 {
  color: var(--gold); font-size: 12px;
  margin-bottom: 6px; text-align: center;
}
.trade-status {
  text-align: center; padding: 8px;
  color: var(--text-dim); font-size: 12px;
}
.trade-status.confirmed { color: #4caf50; }
.offer-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 4px;
}
.offer-item {
  aspect-ratio: 1;
  background: rgba(40,40,60,0.8);
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 4px; display: flex;
  align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-dim);
  cursor: pointer;
}
.offer-item img { max-width: 80%; max-height: 80%; object-fit: contain; }
.offer-item:hover { border-color: var(--gold); }
.trade-actions {
  display: flex; gap: 8px; justify-content: center;
  padding: 10px;
}

/* ---- Character Creator ---- */
#charScreen {
  position: fixed; inset: 0; z-index: 900;
  display: none; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #0a0a1a 0%, #1a1020 50%, #0d0d1a 100%);
}
.char-container {
  display: flex; gap: 30px;
  background: var(--panel);
  border: var(--border); border-radius: var(--radius);
  padding: 30px; max-width: 800px; width: 90%;
}
.char-preview {
  flex: 0 0 200px;
  display: flex; flex-direction: column;
  align-items: center; gap: 15px;
}
.char-preview-box {
  width: 180px; height: 240px;
  background: rgba(30,30,50,0.8);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.char-preview-box img {
  max-width: 70%; max-height: 80%;
  object-fit: contain;
}
.char-name-input {
  width: 100%; padding: 10px;
  background: rgba(30,30,50,0.9);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 6px; color: var(--text);
  font-size: 14px; text-align: center; outline: none;
}
.char-name-input:focus { border-color: var(--gold); }
.char-options { flex: 1; }
.char-section { margin-bottom: 20px; }
.char-section h3 {
  color: var(--gold); font-size: 14px;
  margin-bottom: 8px;
}
.char-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.char-opt {
  aspect-ratio: 1;
  background: rgba(30,30,50,0.8);
  border: 2px solid rgba(255,215,0,0.2);
  border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; overflow: hidden;
}
.char-opt:hover { border-color: var(--gold-dim); transform: scale(1.05); }
.char-opt.selected {
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(255,215,0,0.4);
  background: rgba(255,215,0,0.1);
}
.char-opt img { max-width: 70%; max-height: 70%; object-fit: contain; }
.char-opt.label {
  font-size: 10px; color: var(--text-dim);
  text-align: center; padding: 4px;
}
.char-actions {
  display: flex; gap: 10px; margin-top: 15px;
}
.char-actions .btn { min-width: auto; flex: 1; }

/* ---- Modal ---- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 1100;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--panel);
  border: var(--border); border-radius: var(--radius);
  padding: 25px; min-width: 300px;
  max-width: 90vw;
}
.modal-box h3 {
  color: var(--gold); margin-bottom: 15px;
  font-size: 18px;
}
.modal-box input {
  width: 100%; padding: 10px; margin-bottom: 10px;
  background: rgba(30,30,50,0.9);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 6px; color: var(--text); font-size: 14px;
  outline: none;
}
.modal-box input:focus { border-color: var(--gold); }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px;
}

/* ---- Friends Panel ---- */
.friends-list { list-style: none; }
.friends-list li {
  display: flex; align-items: center; gap: 8px;
  padding: 6px; border-radius: 6px;
  cursor: pointer; transition: background 0.15s;
}
.friends-list li:hover { background: rgba(255,215,0,0.1); }
.friend-status {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.friend-status.online { background: #4caf50; }
.friend-status.offline { background: #666; }
.friend-name { font-size: 13px; }
.friend-action {
  margin-left: auto; font-size: 11px;
  color: var(--gold); cursor: pointer;
}

/* ---- Settings Panel ---- */
.settings-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(255,215,0,0.1);
}
.settings-row:last-child { border-bottom: none; }
.toggle-switch {
  width: 40px; height: 20px;
  background: #333; border-radius: 10px;
  cursor: pointer; position: relative;
  transition: background 0.2s;
}
.toggle-switch.active { background: var(--gold-dim); }
.toggle-switch::after {
  content: ''; position: absolute;
  width: 16px; height: 16px;
  background: #fff; border-radius: 50%;
  top: 2px; left: 2px;
  transition: left 0.2s;
}
.toggle-switch.active::after { left: 22px; }

/* ---- Toolbar ---- */
#toolbar {
  position: absolute; right: 10px; bottom: 10px;
  display: flex; gap: 6px; z-index: 50;
}
.tool-btn {
  width: 42px; height: 42px;
  background: rgba(15,15,30,0.9);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius); color: var(--gold);
  cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tool-btn:hover {
  border-color: var(--gold);
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
  transform: scale(1.1);
}

/* ---- Zoom Controls ---- */
#zoomControls {
  position: absolute; left: 10px; top: 50px;
  display: flex; flex-direction: column; gap: 4px;
  z-index: 50;
}
.zoom-btn {
  width: 36px; height: 36px;
  background: rgba(15,15,30,0.9);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 6px; color: var(--gold);
  cursor: pointer; font-size: 18px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
}
.zoom-btn:hover { border-color: var(--gold); }

/* ---- Mobile D-Pad ---- */
#dpad {
  position: absolute; left: 15px; bottom: 80px;
  width: 150px; height: 150px;
  display: none; z-index: 70;
}
.dpad-btn {
  position: absolute; width: 46px; height: 46px;
  background: rgba(15,15,30,0.85);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 10px; color: var(--gold);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-user-select: none;
  touch-action: none;
}
.dpad-btn:active { background: rgba(255,215,0,0.2); }
.dpad-up { top: 0; left: 52px; }
.dpad-down { bottom: 0; left: 52px; }
.dpad-left { top: 52px; left: 0; }
.dpad-right { top: 52px; right: 0; }

/* ---- Player List ---- */
#playerList {
  position: absolute; left: 10px; top: 50px;
  width: 140px; z-index: 50;
  display: none;
}
.player-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; cursor: pointer;
  border-radius: 4px; font-size: 12px;
}
.player-list-item:hover { background: rgba(255,215,0,0.1); }
.player-list-item .pl-name { color: var(--text); }

/* ---- Notification Toast ---- */
#toastArea {
  position: absolute; top: 50px; right: 240px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 120; pointer-events: none;
}
.toast {
  background: rgba(15,15,30,0.95);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 8px; padding: 10px 16px;
  color: var(--gold); font-size: 13px;
  animation: toastSlide 0.3s ease-out;
  pointer-events: none; max-width: 250px;
}
@keyframes toastSlide {
  0% { transform: translateX(50px); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.5); }

/* ---- Responsive ---- */
@media (max-width: 768px) {
  #dpad { display: block; }
  #chatLog { width: 200px; font-size: 11px; }
  #chatInput { width: 180px; }
  #sidePanel { width: 180px; right: 5px; }
  #toolbar { gap: 4px; }
  .tool-btn { width: 38px; height: 38px; font-size: 16px; }
  #roomLabel { font-size: 12px; padding: 4px 12px; }
  .char-container { flex-direction: column; align-items: center; }
  .char-preview { flex: none; }
  .char-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ---- Hidden utility ---- */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ================================================================ -->
<!-- LOADING SCREEN                                                   -->
<!-- ================================================================ -->
<div id="loadingScreen">
  <div class="loading-box">
    <h2>STARLIGHT INN</h2>
    <div class="loading-bar"><div class="loading-fill" id="loadFill"></div></div>
    <p id="loadText">Loading assets... 0%</p>
  </div>
</div>

<!-- ================================================================ -->
<!-- TITLE SCREEN                                                     -->
<!-- ================================================================ -->
<div id="titleScreen">
  <div class="title-bg">

// ===================================================================
// ISOMETRIC MATH
// ===================================================================
function tileToScreen(tx, ty, camX, camY, z) {
  const cx = (canvas.width / 2) / z + camX;
  const cy = (canvas.height / 3) / z + camY;
  return {
    x: cx + (tx - ty) * (TILE_W / 2),
    y: cy + (tx + ty) * (TILE_H / 2)
  };
}

function screenToTile(sx, sy, camX, camY, z) {
  const cx = (canvas.width / 2) / z + camX;
  const cy = (canvas.height / 3) / z + camY;
  const dx = sx / z - cx;
  const dy = sy / z - cy;
  const tx = (dx / (TILE_W/2) + dy / (TILE_H/2)) / 2;
  const ty = (dy / (TILE_H/2) - dx / (TILE_W/2)) / 2;
  return { x: Math.floor(tx), y: Math.floor(ty) };
}

function getAssetPath(key) {
  return ASSETS[key] || '';
}

// ===================================================================
// ASSET LOADING
// ===================================================================
function loadAssets() {
  const entries = Object.entries(ASSETS);
  totalAssets = entries.length;

  if (totalAssets === 0) {
    onAllLoaded();
    return;
  }

  entries.forEach(([key, path]) => {
    const img = new Image();
    img.onload = () => {
      IMAGES[key] = img;
      loadedAssets++;
      updateLoadingProgress();
      if (loadedAssets >= totalAssets) onAllLoaded();
    };
    img.onerror = () => {
      IMAGES[key] = null;
      loadedAssets++;
      updateLoadingProgress();
      if (loadedAssets >= totalAssets) onAllLoaded();
    };
    img.src = path;
  });
}

function updateLoadingProgress() {
  const pct = Math.floor((loadedAssets / totalAssets) * 100);
  document.getElementById('loadFill').style.width = pct + '%';
  document.getElementById('loadText').textContent = 'Loading assets... ' + pct + '%';
}

function onAllLoaded() {
  setTimeout(() => {
    document.getElementById('loadingScreen').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
      showScreen('title');
      playTitleJingle();
    }, 500);
  }, 800);
}

// ===================================================================

// ===================================================================
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, vol) {
  if (!settings.sfx) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol || 0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playSfx(name) {
  if (!settings.sfx) return;
  switch(name) {
    case 'step':
      playTone(200 + Math.random() * 100, 0.06, 'triangle', 0.04);
      break;
    case 'door':
      playTone(300, 0.15, 'square', 0.06);
      setTimeout(() => playTone(450, 0.2, 'square', 0.05), 100);
      break;
    case 'chat':
      playTone(800, 0.08, 'sine', 0.05);
      break;
    case 'blip':
      playTone(1200, 0.05, 'sine', 0.04);
      break;
    case 'trade':
      playTone(523, 0.1, 'sine', 0.06);
      setTimeout(() => playTone(659, 0.1, 'sine', 0.06), 100);
      setTimeout(() => playTone(784, 0.15, 'sine', 0.06), 200);
      break;
    case 'confirm':
      playTone(784, 0.12, 'sine', 0.07);
      setTimeout(() => playTone(1047, 0.2, 'sine', 0.07), 120);
      break;
    case 'error':
      playTone(200, 0.2, 'sawtooth', 0.05);
      break;
  }
}

function playTitleJingle() {
  if (!settings.music) return;
  const notes = [523, 587, 659, 784, 659, 784];
  const delays = [0, 150, 300, 600, 900, 1200];
  notes.forEach((freq, i) => {
    setTimeout(() => playTone(freq, 0.25, 'sine', 0.05), delays[i]);
  });
}

function playRoomAmbient() {
  // Occasional ambient sounds
  if (!settings.sfx || Math.random() > 0.01) return;
  const room = ROOMS[currentRoom];
  if (!room) return;
  switch(currentRoom) {
    case 'garden':
      playTone(300 + Math.random() * 400, 0.5, 'sine', 0.015);

    case 'library':
      playTone(150 + Math.random() * 200, 0.8, 'sine', 0.01);
      break;
    case 'tavern':

  player.outfit = charSelections.outfit;
  player.accessory = charSelections.accessory;

  // Sync inventory
  inventory.items.forEach(it => {
    it.equipped = false;
  });
  if (player.outfit) {
    const outfitItem = inventory.items.find(i => i.id === player.outfit);
    if (outfitItem) outfitItem.equipped = true;
  }
  if (player.hair) {
    const hairItem = inventory.items.find(i => i.id === player.hair);
    if (hairItem) hairItem.equipped = true;
  }
  if (player.accessory) {
    const accItem = inventory.items.find(i => i.id === player.accessory);
    if (accItem) accItem.equipped = true;

  addSystemMsg('Use arrow keys, WASD, or click tiles to move.');

function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!user || !pass) { playSfx('error'); return; }
  const saved = localStorage.getItem('si_user_' + user);
  if (!saved) { alert('User not found'); playSfx('error'); return; }
  let data;
  try { data = JSON.parse(saved); } catch(e) { alert('Error loading account'); return; }
  if (data.password !== pass) { alert('Wrong password'); playSfx('error'); return; }
  player.name = data.displayName || user;
  document.getElementById('charNameInput').value = player.name;
  hideModal('login');
  showScreen('character');
}

function doRegister() {
  const user = document.getElementById('regUser').value.trim();
  const display = document.getElementById('regDisplay').value.trim() || user;
  const pass = document.getElementById('regPass').value;
  if (!user || !pass) { alert('Fill all fields'); playSfx('error'); return; }
  if (localStorage.getItem('si_user_' + user)) { alert('Username taken'); playSfx('error'); return; }
  localStorage.setItem('si_user_' + user, JSON.stringify({ displayName: display, password: pass }));
  player.name = display;
  document.getElementById('charNameInput').value = player.name;
  hideModal('register');
  showScreen('character');
  addSystemMsg('Account created! Welcome, ' + display + '.');
}

function spawnRoomPlayers(roomId) {
  roomPlayers = [];
  const room = ROOMS[roomId];
  if (!room) return;

  const names = AI_NAMES.filter(n => n !== player.name);
  const count = Math.min(4, names.length);

  for (let i = 0; i < count; i++) {
    let tx, ty;
    let attempts = 0;
    do {
      tx = Math.floor(Math.random() * room.w);
      ty = Math.floor(Math.random() * room.h);
      attempts++;
    } while (attempts < 20 && (tx === player.tx && ty === player.ty));

    roomPlayers.push({
      name: names[i],
      tx: tx, ty: ty,
      x: tx, y: ty,
      facing: ['n','s','e','w'][Math.floor(Math.random() * 4)],
      moving: false,
      walkFrame: 0,
      walkTimer: 0,
      targetTx: null, targetTy: null,
      moveTimer: Math.random() * 3000,
      chatTimer: Math.random() * 15000 + 10000,
      sprite: 'avatar/idle_s'
    });
  }
}

function updateAIPlayers(dt) {
  const room = ROOMS[currentRoom];
  if (!room) return;

  roomPlayers.forEach(p => {
    // Random movement
    p.moveTimer -= dt;
    if (p.moveTimer <= 0 && !p.moving) {
      p.moveTimer = Math.random() * 4000 + 2000;
      const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
      const dir = dirs[Math.floor(Math.random() * dirs.length)];
      const nx = p.tx + dir[0];
      const ny = p.ty + dir[1];
      if (nx >= 0 && nx < room.w && ny >= 0 && ny < room.h) {
        p.targetTx = nx;
        p.targetTy = ny;
        p.moving = true;
        if (dir[1] > 0) p.facing = 's';
        else if (dir[1] < 0) p.facing = 'n';
        else if (dir[0] > 0) p.facing = 'e';
        else p.facing = 'w';
      }
    }

    // Move toward target
    if (p.moving && p.targetTx !== null && p.targetTy !== null) {
      const dx = p.targetTx - p.x;
      const dy = p.targetTy - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 2.5 * dt / 16;
      if (dist < speed) {
        p.x = p.targetTx;
        p.y = p.targetTy;
        p.tx = Math.round(p.x);
        p.ty = Math.round(p.y);
        p.moving = false;
        p.targetTx = null;
        p.targetTy = null;
        p.sprite = 'avatar/idle_' + p.facing;
      } else {
        p.x += (dx / dist) * speed;
        p.y += (dy / dist) * speed;
        p.walkTimer += dt;
        p.sprite = 'avatar/walk' + (Math.floor(p.walkTimer / WALK_FRAME_TIME) % 2 + 1) + '_s';
      }
    }

    // Random chat
    p.chatTimer -= dt;
    if (p.chatTimer <= 0) {
      p.chatTimer = Math.random() * 15000 + 12000;
      const msg = AI_CHAT[Math.floor(Math.random() * AI_CHAT.length)];
      addChatBubble(p, msg);
    }
  });
}

// ===================================================================
// CHAT SYSTEM
// ===================================================================
function handleChatKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendChat();
  }
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Slash commands
  if (text.startsWith('/')) {
    handleCommand(text);
    return;
  }

  addChatLog(player.name, text, 'msg-player');
  addChatBubble(player, text);
  playSfx('chat');
}

function handleCommand(cmd) {
  const parts = cmd.split(' ');
  switch(parts[0]) {
    case '/help':
      addSystemMsg('Commands: /help, /clear, /whisper <name> <msg>, /dance, /wave');
      break;
    case '/clear':
      chatMessages = [];
      document.getElementById('chatLog').innerHTML = '';
      break;
    case '/whisper':
      if (parts.length >= 3) {
        const target = parts[1];
        const msg = parts.slice(2).join(' ');
        addSystemMsg('To ' + target + ': ' + msg);
      } else {
        addSystemMsg('Usage: /whisper <name> <message>');
      }
      break;
    case '/dance':
      addSystemMsg(player.name + ' starts dancing!');
      break;
    case '/wave':
      addSystemMsg(player.name + ' waves!');
      break;
    default:
      addSystemMsg('Unknown command: ' + parts[0]);
  }
}

function addChatLog(name, text, cls) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = `<strong>${name}:</strong> ${text}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  // Limit history
  while (log.children.length > 50) log.removeChild(log.firstChild);
}

function addSystemMsg(text) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  while (log.children.length > 50) log.removeChild(log.firstChild);
}

function addChatBubble(who, text) {
  if (!settings.chatBubbles) return;
  const bubble = {
    who: who,
    text: text,
    timer: 4000,
    id: Date.now() + Math.random()
  };
  chatBubbles.push(bubble);
}

function updateChatBubbles(dt) {
  for (let i = chatBubbles.length - 1; i >= 0; i--) {
    chatBubbles[i].timer -= dt;
    if (chatBubbles[i].timer <= 0) {
      chatBubbles.splice(i, 1);
    }
  }
}

// ===================================================================
// RENDERING
// ===================================================================
function drawFloorTile(ctx, tx, ty, floorType, room, z) {
  const pos = tileToScreen(tx, ty, camera.x, camera.y, z);
  const img = IMAGES['tiles/' + floorType];

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y - TILE_H/2 * z);
  ctx.lineTo(pos.x + TILE_W/2 * z, pos.y);
  ctx.lineTo(pos.x, pos.y + TILE_H/2 * z);
  ctx.lineTo(pos.x - TILE_W/2 * z, pos.y);
  ctx.closePath();
  ctx.clip();

  if (img) {
    ctx.drawImage(img, pos.x - TILE_W/2 * z, pos.y - TILE_H/2 * z, TILE_W * z, TILE_H * z);
  } else {
    ctx.fillStyle = '#5a4a3a';
    ctx.fill();
  }
  ctx.restore();

  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

function drawWallSegment(ctx, img, x, y, z, facing) {
  const w = TILE_W * z;
  const h = TILE_H * 2 * z;
  if (img) {
    ctx.drawImage(img, x - w/2, y - h, w, h);
  } else {
    ctx.fillStyle = '#3a3028';
    ctx.fillRect(x - w/2, y - h, w, h);
  }
}

function drawWalls(ctx, room, z) {
  for (let x = 0; x < room.w; x++) {
    for (let y = 0; y < room.h; y++) {
      const pos = tileToScreen(x, y, camera.x, camera.y, z);
      const wallImg = IMAGES['tiles/' + room.wall];

      if (y === 0) {
        drawWallSegment(ctx, wallImg, pos.x, pos.y - TILE_H/2 * z, z, 'n');
      }
      if (x === 0) {
        drawWallSegment(ctx, wallImg, pos.x - TILE_W/2 * z, pos.y, z, 'w');
      }
    }
  }
}

function drawFurniture(ctx, furn, screenX, screenY, z) {
  const img = IMAGES['furniture/' + furn.type];
  if (!img) return;

  const baseW = TILE_W * 1.5 * z * FURN_SCALE;
  const baseH = TILE_H * 2.5 * z * FURN_SCALE;
  const x = screenX - baseW/2 + (furn.offX || 0) * z;
  const y = screenY - baseH + TILE_H * z + (furn.offY || 0) * z;

  ctx.drawImage(img, x, y, baseW, baseH);
}

function drawAvatar(ctx, who, screenX, screenY, z) {
  const spriteKey = who.sprite || 'avatar/idle_s';
  const img = IMAGES[spriteKey];
  if (!img) return;

  const w = AVATAR_W * z;
  const h = AVATAR_H * z;
  const x = screenX - w/2;
  const y = screenY + AVATAR_OFFSET_Y * z;

  ctx.drawImage(img, x, y, w, h);

  // Name tag
  if (settings.showNames) {
    ctx.font = `bold ${Math.round(11 * z)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = who.isLocal ? '#FFD700' : '#aaa';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeText(who.name, screenX, y - 5 * z);
    ctx.fillText(who.name, screenX, y - 5 * z);
  }
}

function drawExits(ctx, room, z) {
  const exitPositions = [];
  if (room.exits.east)  exitPositions.push({x: room.w-1, y: Math.floor(room.h/2), label: '\u2192 ' + ROOMS[room.exits.east.room].name});
  if (room.exits.west)  exitPositions.push({x: 0, y: Math.floor(room.h/2), label: '\u2190 ' + ROOMS[room.exits.west.room].name});
  if (room.exits.north) exitPositions.push({x: Math.floor(room.w/2), y: 0, label: '\u2191 ' + ROOMS[room.exits.north.room].name});
  if (room.exits.south) exitPositions.push({x: Math.floor(room.w/2), y: room.h-1, label: '\u2193 ' + ROOMS[room.exits.south.room].name});

  for (const ep of exitPositions) {
    const pos = tileToScreen(ep.x, ep.y, camera.x, camera.y, z);
    ctx.font = `bold ${Math.round(10 * z)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeText(ep.label, pos.x, pos.y + TILE_H * z);
    ctx.fillText(ep.label, pos.x, pos.y + TILE_H * z);

    // Exit glow
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y - TILE_H/2 * z);
    ctx.lineTo(pos.x + TILE_W/2 * z, pos.y);
    ctx.lineTo(pos.x, pos.y + TILE_H/2 * z);
    ctx.lineTo(pos.x - TILE_W/2 * z, pos.y);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255, 215, 0, 0.12)';
    ctx.fill();
  }
}

function drawChatBubblesDOM(z) {
  // Remove old bubbles
  const oldBubbles = document.querySelectorAll('.chat-bubble');
  oldBubbles.forEach(b => b.remove());

  if (!settings.chatBubbles) return;

  const room = ROOMS[currentRoom];
  if (!room) return;

  chatBubbles.forEach(b => {
    const who = b.who;
    if (!who) return;
    const pos = tileToScreen(who.x, who.y, camera.x, camera.y, z);
    const el = document.createElement('div');
    el.className = 'chat-bubble';
    el.textContent = b.text;
    el.style.left = pos.x + 'px';
    el.style.top = pos.y + 'px';
    const gameScreen = document.getElementById('gameScreen');
    if (gameScreen) gameScreen.appendChild(el);
  });
}

// ===================================================================
// MAIN RENDER
// ===================================================================
function render() {
  const room = ROOMS[currentRoom];
  if (!room) return;

  // Background
  ctx.fillStyle = room.bg || '#1a1520';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Zoom transform
  ctx.save();
  ctx.scale(zoom, zoom);

  // Walls (behind floor)
  drawWalls(ctx, room, 1.0);

  // Sort everything by depth (painter's algorithm)
  const renderList = [];

  // Floor tiles
  for (let x = 0; x < room.w; x++) {
    for (let y = 0; y < room.h; y++) {
      renderList.push({ type: 'floor', x, y, depth: x + y });
    }
  }

  // Furniture
  room.furniture.forEach(f => {
    renderList.push({ type: 'furniture', furn: f, depth: f.x + f.y });
  });

  // Player
  renderList.push({ type: 'player', who: player, depth: player.x + player.y + 0.5 });

  // AI players
  roomPlayers.forEach(p => {
    renderList.push({ type: 'ai', who: p, depth: p.x + p.y + 0.5 });
  });

  // Exits
  if (room.exits) {
    const exitList = [];
    if (room.exits.east) exitList.push({x: room.w-1, y: Math.floor(room.h/2), depth: room.w + Math.floor(room.h/2)});
    if (room.exits.west) exitList.push({x: 0, y: Math.floor(room.h/2), depth: Math.floor(room.h/2)});
    if (room.exits.north) exitList.push({x: Math.floor(room.w/2), y: 0, depth: Math.floor(room.w/2)});
    if (room.exits.south) exitList.push({x: Math.floor(room.w/2), y: room.h-1, depth: Math.floor(room.w/2) + room.h - 1});
    exitList.forEach(e => {
      renderList.push({ type: 'exit', x: e.x, y: e.y, depth: e.depth + 0.3 });
    });
  }

  // Sort by depth
  renderList.sort((a, b) => a.depth - b.depth);

  // Render
  renderList.forEach(item => {
    switch(item.type) {
      case 'floor':
        drawFloorTile(ctx, item.x, item.y, room.floor, room, 1.0);
        break;
      case 'furniture': {
        const fpos = tileToScreen(item.furn.x, item.furn.y, camera.x, camera.y, 1.0);
        drawFurniture(ctx, item.furn, fpos.x, fpos.y, 1.0);
        break;
      }
      case 'player': {
        const ppos = tileToScreen(player.x, player.y, camera.x, camera.y, 1.0);
        drawAvatar(ctx, player, ppos.x, ppos.y, 1.0);
        break;
      }
      case 'ai': {
        const apos = tileToScreen(item.who.x, item.who.y, camera.x, camera.y, 1.0);
        drawAvatar(ctx, item.who, apos.x, apos.y, 1.0);
        break;
      }
      case 'exit': {
        const epos = tileToScreen(item.x, item.y, camera.x, camera.y, 1.0);
        break;
      }
    }
  });

  ctx.restore();

  // Draw exit labels (on top, in screen space)
  drawExits(ctx, room, zoom);

  // Update chat bubbles
  drawChatBubblesDOM(zoom);
}

// ===================================================================
// PLAYER MOVEMENT
// ===================================================================
function movePlayer(dx, dy) {
  if (player.moving) return;
  const room = ROOMS[currentRoom];
  if (!room) return;

  const nx = player.tx + dx;
  const ny = player.ty + dy;

  // Bounds check
  if (nx < 0 || nx >= room.w || ny < 0 || ny >= room.h) {
    // Check for exits
    checkRoomTransition(player, room);
    return;
  }

  // Set target
  player.targetTx = nx;
  player.targetTy = ny;
  player.moving = true;

  // Set facing
  if (dy > 0) player.facing = 's';
  else if (dy < 0) player.facing = 'n';
  else if (dx > 0) player.facing = 'e';
  else if (dx < 0) player.facing = 'w';
}

function updatePlayerMovement(dt) {
  if (!player.moving || player.targetTx === null || player.targetTy === null) return;

  const dx = player.targetTx - player.x;
  const dy = player.targetTy - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const speed = 3.5 * dt / 16;

  if (dist < speed) {
    player.x = player.targetTx;
    player.y = player.targetTy;
    player.tx = Math.round(player.x);
    player.ty = Math.round(player.y);
    player.moving = false;
    player.targetTx = null;
    player.targetTy = null;
    player.sprite = 'avatar/idle_' + player.facing;

    // Check for exit after arriving
    checkRoomTransition(player, ROOMS[currentRoom]);
  } else {
    player.x += (dx / dist) * speed;
    player.y += (dy / dist) * speed;
    player.walkTimer += dt;
    const frame = Math.floor(player.walkTimer / WALK_FRAME_TIME) % 2 + 1;
    player.sprite = 'avatar/walk' + frame + '_s';
  }
}

// ===================================================================
// ROOM TRANSITIONS (MUST NOT FREEZE)
// ===================================================================
function checkRoomTransition(who, room) {
  if (!room || !room.exits) return;

  for (const [dir, exit] of Object.entries(room.exits)) {
    let onExit = false;
    if (dir === 'east'  && who.tx >= room.w - 1) onExit = true;
    if (dir === 'west'  && who.tx <= 0) onExit = true;
    if (dir === 'north' && who.ty <= 0) onExit = true;
    if (dir === 'south' && who.ty >= room.h - 1) onExit = true;

    if (onExit) {
      transitionToRoom(exit.room, exit.x, exit.y);
      return;
    }
  }
}

function transitionToRoom(roomId, startX, startY) {
  currentRoom = roomId;
  player.tx = startX;
  player.ty = startY;
  player.x = startX;
  player.y = startY;
  player.moving = false;
  player.targetTx = null;
  player.targetTy = null;
  player.sprite = 'avatar/idle_' + player.facing;

  spawnRoomPlayers(roomId);

  const room = ROOMS[roomId];
  document.getElementById('roomLabel').textContent = room ? room.name : roomId;
  addSystemMsg('Entered ' + (room ? room.name : roomId));
  playSfx('door');
  centerCameraOnPlayer();
}

// ===================================================================
// CAMERA
// ===================================================================
function centerCameraOnPlayer() {
  const room = ROOMS[currentRoom];
  if (!room) return;
  const pos = tileToScreen(player.x, player.y, 0, 0, 1.0);
  camera.x = player.x - room.w / 2;
  camera.y = player.y - room.h / 2;
}

function updateCamera(dt) {
  // Smooth follow
  const targetX = player.x - ROOMS[currentRoom].w / 2;
  const targetY = player.y - ROOMS[currentRoom].h / 2;
  camera.x += (targetX - camera.x) * 0.03;
  camera.y += (targetY - camera.y) * 0.03;
}

function adjustZoom(delta) {
  zoom = Math.max(0.5, Math.min(2.5, zoom + delta));
}

function resetZoom() {
  zoom = 1.0;
}

// ===================================================================
// INPUT HANDLING
// ===================================================================
document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;

  if (currentScreen !== 'game') return;
  if (document.activeElement === document.getElementById('chatInput')) return;

  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': movePlayer(0, -1); break;
    case 'ArrowDown':  case 's': case 'S': movePlayer(0, 1); break;
    case 'ArrowLeft':  case 'a': case 'A': movePlayer(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
    case 'Enter':
      document.getElementById('chatInput').focus();
      break;
    case 'Escape':
      closeSidePanel();
      hideTradePanel();
      break;
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

// Mouse wheel zoom
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  adjustZoom(delta);
}, { passive: false });

// Mouse drag pan + click to move
let mouseDown = false;
let mouseStartX = 0, mouseStartY = 0;

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  mouseStartX = e.clientX;
  mouseStartY = e.clientY;
  dragCamStart = { x: camera.x, y: camera.y };
});

canvas.addEventListener('mousemove', (e) => {
  if (mouseDown) {
    const dx = e.clientX - mouseStartX;
    const dy = e.clientY - mouseStartY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      isDragging = true;
    }
    if (isDragging) {
      camera.x = dragCamStart.x - dx / (TILE_W * zoom);
      camera.y = dragCamStart.y - dy / (TILE_H * zoom);
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!isDragging && currentScreen === 'game') {
    // Click to move
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const tile = screenToTile(mx, my, camera.x, camera.y, zoom);
    const room = ROOMS[currentRoom];
    if (room && tile.x >= 0 && tile.x < room.w && tile.y >= 0 && tile.y < room.h) {
      // Simple click-to-move: set target and walk toward it
      const dx = tile.x - player.tx;
      const dy = tile.y - player.ty;
      if (Math.abs(dx) + Math.abs(dy) === 1) {
        movePlayer(dx, dy);
      }
    }
  }
  mouseDown = false;
  isDragging = false;
});

// Touch support
let touchStart = { x: 0, y: 0 };
let lastTouchDist = 0;

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStart.x = e.touches[0].clientX;
    touchStart.y = e.touches[0].clientY;
    dragCamStart = { x: camera.x, y: camera.y };
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    camera.x = dragCamStart.x - dx / (TILE_W * zoom);
    camera.y = dragCamStart.y - dy / (TILE_H * zoom);
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastTouchDist > 0) {
      const delta = (dist - lastTouchDist) * 0.003;
      adjustZoom(delta);
    }
    lastTouchDist = dist;
  }
}, { passive: false });

// D-Pad touch support
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const handlePress = (e) => {
    e.preventDefault();
    const dir = btn.dataset.dir;
    switch(dir) {
      case 'n': movePlayer(0, -1); break;
      case 's': movePlayer(0, 1); break;
      case 'w': movePlayer(-1, 0); break;
      case 'e': movePlayer(1, 0); break;
    }
  };
  btn.addEventListener('mousedown', handlePress);
  btn.addEventListener('touchstart', handlePress, { passive: false });
});

// ===================================================================
// CANVAS RESIZE
// ===================================================================
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

// ===================================================================
// GAME LOOP
// ===================================================================
let lastTime = 0;
function gameLoop(timestamp) {
  if (currentScreen !== 'game') return;

  const dt = timestamp - lastTime;
  lastTime = timestamp;

  // Cap delta time to prevent huge jumps
  const safeDt = Math.min(dt, 100);

  // Update
  updatePlayerMovement(safeDt);
  updateAIPlayers(safeDt);
  updateCamera(safeDt);
  updateChatBubbles(safeDt);
  playRoomAmbient();

  // Render
  render();

  requestAnimationFrame(gameLoop);
}

// ===================================================================
// TOAST NOTIFICATIONS
// ===================================================================
function showToast(text) {
  const area = document.getElementById('toastArea');
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = text;
  area.appendChild(div);
  setTimeout(() => div.remove(), 3000);
}

// ===================================================================
// INIT
// ===================================================================
function init() {
  resizeCanvas();
  loadAssets();
}

// Start
init();
</script>
