<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Starlight Inn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#fff;overflow:hidden}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#loading .logo{font-size:42px;font-weight:900;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.4);margin-bottom:30px;letter-spacing:4px}
#loading .bar{width:300px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
#loading .fill{height:100%;background:#9370db;width:0%;transition:width .3s}
#loading .txt{color:#aaa;margin-top:15px;font-size:13px}

/* ===== TITLE SCREEN ===== */
#title{position:fixed;inset:0;background:url(assets/title-bg-v20.png) center/cover no-repeat;display:none;flex-direction:column;align-items:center;z-index:100}
#title .overlay{position:absolute;inset:0;background:rgba(10,10,30,0.25)}
#title .content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%}
#title h1{font-size:72px;font-weight:900;color:#ffd700;text-shadow:0 4px 0 #8b6914,0 0 40px rgba(255,215,0,0.3);letter-spacing:6px;margin-top:-120px;font-family:Georgia,serif}
#title h2{font-size:16px;color:#c0c0c0;letter-spacing:8px;text-transform:uppercase;margin-top:10px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
#title .btn-enter{background:#daa520;border:none;padding:16px 60px;font-size:20px;font-weight:700;color:#1a0a00;border-radius:8px;cursor:pointer;margin-top:50px;box-shadow:0 4px 0 #8b6914,0 8px 20px rgba(0,0,0,0.4);transition:all .15s}
#title .btn-enter:hover{transform:translateY(-2px);box-shadow:0 6px 0 #8b6914,0 12px 30px rgba(0,0,0,0.5)}
#title .btn-enter:active{transform:translateY(2px);box-shadow:0 2px 0 #8b6914}
#title .row{display:flex;gap:15px;margin-top:25px}
#title .btn-sm{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);padding:10px 28px;font-size:14px;color:#fff;border-radius:6px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
#title .btn-sm:hover{background:rgba(147,112,219,0.4);border-color:#9370db}
#title .ver{position:absolute;bottom:15px;right:20px;color:rgba(255,255,255,0.3);font-size:11px}
#title .welcome{position:absolute;top:20px;right:20px;color:#32cd32;font-size:13px;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;display:none}

/* ===== AUTH ===== */
#auth{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:200}
#auth .box{background:#1a1a2e;border:1px solid rgba(147,112,219,0.3);border-radius:12px;padding:40px;width:340px}
#auth h3{color:#ffd700;font-size:22px;margin-bottom:25px;text-align:center}
#auth input{width:100%;padding:12px 16px;margin-bottom:15px;background:#0f0f1a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-size:14px}
#auth input:focus{outline:none;border-color:#9370db}
#auth .btn{width:100%;padding:14px;background:#9370db;border:none;border-radius:6px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:10px}
#auth .btn:hover{background:#a855f7}
#auth .swap{text-align:center;margin-top:18px;color:#aaa;font-size:13px}
#auth .swap span{color:#9370db;cursor:pointer}
#auth .swap span:hover{text-decoration:underline}
#auth .err{color:#ff6b6b;font-size:12px;margin-top:-10px;margin-bottom:10px;text-align:center}
#auth .close{position:absolute;top:20px;right:25px;color:#fff;font-size:24px;cursor:pointer;opacity:.5}
#auth .close:hover{opacity:1}

/* ===== CHARACTER CREATOR ===== */
#char{position:fixed;inset:0;background:#0a0a1a;display:none;z-index:150;flex-direction:column;align-items:center;padding-top:40px}
#char h2{color:#ffd700;font-size:28px;margin-bottom:10px}
#char .sub{color:#aaa;font-size:14px;margin-bottom:30px}
#char .gend{display:flex;gap:10px;margin-bottom:25px}
#char .gend button{padding:10px 30px;border:2px solid rgba(255,255,255,0.1);background:transparent;color:#fff;border-radius:8px;cursor:pointer;font-size:14px}
#char .gend button.on{border-color:#9370db;background:rgba(147,112,219,0.2);color:#9370db;font-weight:700}
#char .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;width:400px;margin-bottom:30px}
#char .cell{border:2px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px;cursor:pointer;text-align:center;transition:all .2s;background:rgba(255,255,255,0.03)}
#char .cell:hover{border-color:rgba(147,112,219,0.5);background:rgba(147,112,219,0.1)}
#char .cell.on{border-color:#9370db;background:rgba(147,112,219,0.2)}
#char .cell img{width:100%;height:auto;border-radius:6px}
#char .cell .nm{color:#ccc;font-size:12px;margin-top:5px}
#char .preview{width:120px;height:120px;border:2px solid rgba(147,112,219,0.3);border-radius:12px;margin-bottom:25px;display:flex;align-items:center;justify-content:center;background:rgba(147,112,219,0.05)}
#char .preview img{max-width:90%;max-height:90%}
#char .btn-save{padding:14px 50px;background:#32cd32;border:none;border-radius:8px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
#char .btn-save:hover{background:#2eb82e}
#char .back{position:absolute;top:20px;left:20px;color:#aaa;cursor:pointer;font-size:14px}
#char .back:hover{color:#fff}

/* ===== GAME ===== */
#game{position:fixed;inset:0;display:none;z-index:50}
#gc{width:100%;height:100%;display:block;background:#0a0a1a}

/* Top bar */
#topbar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(10,10,26,0.9);border-bottom:1px solid rgba(147,112,219,0.2);display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:60}
#topbar .left{display:flex;align-items:center;gap:12px}
#topbar .room{font-weight:700;color:#ffd700;font-size:15px}
#topbar .nav-btn{padding:6px 14px;background:rgba(147,112,219,0.2);border:1px solid rgba(147,112,219,0.3);color:#9370db;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
#topbar .nav-btn:hover{background:rgba(147,112,219,0.3)}
#topbar .right{display:flex;align-items:center;gap:15px}
#topbar .stat{display:flex;align-items:center;gap:5px;font-size:13px}
#topbar .stat .icon{font-size:14px}
#topbar .stat .val{color:#ffd700;font-weight:700}

/* Chat layer */
#chatlyr{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}
#chatlyr .bubble{position:absolute;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 12px;max-width:200px;pointer-events:none;font-size:13px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
#chatlyr .bubble .name{color:#9370db;font-weight:700;font-size:11px;margin-bottom:3px}
#chatlyr .bubble.me .name{color:#32cd32}

/* Bottom bar */
#btm{position:fixed;bottom:0;left:0;right:0;height:50px;background:rgba(10,10,26,0.9);border-top:1px solid rgba(147,112,219,0.2);display:flex;align-items:center;gap:10px;padding:0 15px;z-index:60}
#btm input{flex:1;padding:10px 16px;background:#0f0f1a;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-size:14px}
#btm input:focus{outline:none;border-color:#9370db}
#btm .send{padding:10px 20px;background:#9370db;border:none;border-radius:6px;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
#btm .send:hover{background:#a855f7}

/* Room Navigator Panel */
#rnav{position:fixed;top:50px;left:15px;width:280px;max-height:400px;background:rgba(20,20,40,0.95);border:1px solid rgba(147,112,219,0.3);border-radius:12px;padding:15px;z-index:70;display:none;overflow-y:auto}
#rnav.on{display:block}
#rnav h4{color:#ffd700;font-size:16px;margin-bottom:12px}
#rnav .rcard{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;cursor:pointer;margin-bottom:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)}
#rnav .rcard:hover{background:rgba(147,112,219,0.15);border-color:rgba(147,112,219,0.3)}
#rnav .rcard .icon{font-size:22px}
#rnav .rcard .nm{font-weight:600;color:#fff;font-size:14px}
#rnav .rcard .ds{color:#aaa;font-size:11px}
#rnav .close{color:#aaa;cursor:pointer;font-size:16px;text-align:right;margin-bottom:10px}
#rnav .close:hover{color:#fff}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo">STARLIGHT INN</div>
  <div class="bar"><div class="fill" id="lfill"></div></div>
  <div class="txt" id="ltxt">Loading assets... 0%</div>
</div>

<!-- Title Screen -->
<div id="title">
  <div class="overlay"></div>
  <div class="content">
    <h1>STARLIGHT INN</h1>
    <h2>A COZY VIRTUAL WORLD</h2>
    <button class="btn-enter" onclick="goPlay()">Enter World</button>
    <div class="row">
      <button class="btn-sm" onclick="goPlay()">Play as Guest</button>
      <button class="btn-sm" onclick="showAuth('register')">Register</button>
      <button class="btn-sm" onclick="showAuth('login')">Login</button>
    </div>
  </div>
  <div class="welcome" id="welcome"></div>
  <div class="ver">v20.2</div>
</div>

<!-- Auth Modal -->
<div id="auth">
  <div class="box">
    <div class="close" onclick="hide('auth');show('title')">&times;</div>
    <h3 id="atitle">Welcome Back</h3>
    <input type="text" id="auser" placeholder="Username" maxlength="16">
    <input type="password" id="apass" placeholder="Password" maxlength="20">
    <div class="err" id="aerr"></div>
    <button class="btn" id="abtn" onclick="doAuth()">LOG IN</button>
    <div class="swap" id="aswap"><span onclick="swapAuth()">No account? Register</span></div>
  </div>
</div>

<!-- Character Creator -->
<div id="char">
  <div class="back" onclick="backTitle()">&larr; Back</div>
  <h2>Choose Your Character</h2>
  <div class="sub">Pick your look for the Starlight Inn</div>
  <div class="gend">
    <button class="on" data-g="boy" onclick="pickGender('boy')">BOY</button>
    <button data-g="girl" onclick="pickGender('girl')">GIRL</button>
  </div>
  <div class="preview"><img id="pimg" src=""></div>
  <div class="grid" id="cgrid"></div>
  <button class="btn-save" onclick="saveChar()">SAVE & PLAY</button>
</div>

<!-- Game -->
<div id="game">
  <canvas id="gc"></canvas>
  <div id="topbar">
    <div class="left">
      <span class="room" id="rnm">Grand Lobby</span>
      <button class="nav-btn" onclick="togglePan('rnav')">Navigator</button>
    </div>
    <div class="right">
      <div class="stat"><span class="icon">👥</span><span id="pop">1</span></div>
      <div class="stat"><span class="icon">🪙</span><span class="val" id="gold">500</span></div>
      <div class="stat"><span class="icon">💎</span><span class="val" id="gems">50</span></div>
    </div>
  </div>
  <div id="chatlyr"></div>
  <div id="btm">
    <input type="text" id="chat" placeholder="Press Enter to chat..." maxlength="100">
    <button class="send" onclick="sendChat()">Send</button>
  </div>
  <div id="rnav">
    <div class="close" onclick="closePan('rnav')">Close</div>
    <h4>Room Navigator</h4>
    <div id="rlist"></div>
  </div>
</div>

<script>

// ============ CONFIG ============
const VER = '20.2';
const GH = 'https://mapleteamxp.github.io/starlightinn';
const ASSET = (p) => GH+'/'+p+'?v='+VER;

const ROOMS = [
  {id:'lobby',name:'Grand Lobby',icon:'🏛️',desc:'Main gathering hall',tiles:[6,6],spawn:[3,3]},
  {id:'tavern',name:'Moonlight Tavern',icon:'🍺',desc:'Cozy drinks and food',tiles:[6,5],spawn:[3,2]},
  {id:'garden',name:'Starlight Garden',icon:'🌸',desc:'Enchanted courtyard',tiles:[7,7],spawn:[3,3]}
];

const CHARS = [
  {id:'boy',name:'Hoodie Boy',g:'boy',src:'assets/sprites/avatars/v20/char_boy.png'},
  {id:'girl',name:'Dress Girl',g:'girl',src:'assets/sprites/avatars/v20/char_girl.png'},
  {id:'wizard',name:'Wizard',g:'boy',src:'assets/sprites/avatars/v20/char_wizard.png'},
  {id:'knight',name:'Knight',g:'boy',src:'assets/sprites/avatars/v20/char_knight.png'},
  {id:'cat',name:'Cat Person',g:'boy',src:'assets/sprites/avatars/v20/char_cat.png'},
  {id:'innkeeper',name:'Innkeeper',g:'boy',src:'assets/sprites/avatars/v20/char_innkeeper.png'}
];

// ============ GAME STATE ============
let ST = {
  screen:'loading', room:null, me:null, users:[], chats:[],
  gold:500, gems:50,
  cam:{x:0,y:0}, mx:0, my:0,
  assets:{}, loaded:0, total:0,
  account:null, char:null, gender:'boy', selectedChar:0,
  panels:{}, tick:0
};

let CV, CX, W, H, LOOP;
const TILE_W = 64;
const TILE_H = 32;

// ============ STORAGE ============
function saveAcc(a){ localStorage.setItem('si_accounts', JSON.stringify(a||[])) }
function loadAcc(){ try{return JSON.parse(localStorage.getItem('si_accounts')||'[]')}catch(e){return[]} }
function saveSession(u,p){ localStorage.setItem('si_session', JSON.stringify({u,p,t:Date.now()})) }
function loadSession(){ try{return JSON.parse(localStorage.getItem('si_session')||'null')}catch(e){return null} }
function saveCharData(c){ localStorage.setItem('si_char', JSON.stringify(c)) }
function loadCharData(){ try{return JSON.parse(localStorage.getItem('si_char')||'null')}catch(e){return null} }

// ============ ASSET LOADER ============
function preload(){
  const imgs = [];
  imgs.push(['titlebg', ASSET('assets/title-bg-v20.png')]);
  ROOMS.forEach(r => imgs.push(['room_'+r.id, ASSET('assets/sprites/rooms/v20/bg_'+r.id+'.png')]));
  CHARS.forEach(c => imgs.push(['char_'+c.id, ASSET(c.src)]));

  ST.total = imgs.length;
  let done = 0;

  imgs.forEach(([k,url]) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = img.onerror = () => {
      done++;
      ST.assets[k] = img;
      updateLoad(done, ST.total);
      if(done >= ST.total) setTimeout(initGame, 200);
    };
    img.src = url;
  });

  setTimeout(() => {
    if(ST.screen === 'loading') initGame();
  }, 10000);
}

function updateLoad(done,total){
  const pct = Math.round((done/total)*100);
  const f = document.getElementById('lfill');
  const t = document.getElementById('ltxt');
  if(f) f.style.width = pct+'%';
  if(t) t.textContent = 'Loading assets... '+pct+'%';
}

// ============ CHARACTER CREATOR ============
function pickGender(g){
  ST.gender = g;
  document.querySelectorAll('#char .gend button').forEach(b=>b.classList.toggle('on', b.dataset.g===g));
  renderCharGrid();
}

function renderCharGrid(){
  const grid = document.getElementById('cgrid');
  if(!grid) return;
  const filtered = CHARS.filter(c => c.g === ST.gender);
  grid.innerHTML = '';
  filtered.forEach((c, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (idx===ST.selectedChar?' on':'');
    cell.onclick = () => selectChar(idx);
    const img = document.createElement('img');
    img.src = ASSET(c.src);
    img.alt = c.name;
    cell.appendChild(img);
    const nm = document.createElement('div');
    nm.className = 'nm';
    nm.textContent = c.name;
    cell.appendChild(nm);
    grid.appendChild(cell);
  });
}

function selectChar(idx){
  ST.selectedChar = idx;
  renderCharGrid();
  updatePreview();
}

function updatePreview(){
  const filtered = CHARS.filter(c => c.g === ST.gender);
  const ch = filtered[ST.selectedChar];
  if(!ch) return;
  const img = document.getElementById('pimg');
  if(img) img.src = ASSET(ch.src);
}

function saveChar(){
  const filtered = CHARS.filter(c => c.g === ST.gender);
  const ch = filtered[ST.selectedChar];
  if(!ch){ alert('Pick a character'); return; }
  ST.char = ch;
  saveCharData(ch);
  enterGame();
}

// ============ AUTH SYSTEM ============
let authMode = 'login';

function showAuth(mode){
  authMode = mode;
  const title = document.getElementById('atitle');
  const btn = document.getElementById('abtn');
  const swap = document.getElementById('aswap');
  const err = document.getElementById('aerr');
  if(err) err.textContent = '';
  if(mode==='login'){
    if(title) title.textContent = 'Welcome Back';
    if(btn) btn.textContent = 'LOG IN';
    if(swap) swap.innerHTML = '<span onclick="swapAuth()">No account? Register</span>';
  } else {
    if(title) title.textContent = 'Join Starlight Inn';
    if(btn) btn.textContent = 'REGISTER';
    if(swap) swap.innerHTML = '<span onclick="swapAuth()">Have an account? Log In</span>';
  }
  hide('title');
  show('auth');
}

function swapAuth(){ showAuth(authMode==='login'?'register':'login'); }

function doAuth(){
  const user = document.getElementById('auser').value.trim();
  const pass = document.getElementById('apass').value;
  const err = document.getElementById('aerr');
  if(!user||!pass){ if(err) err.textContent='Fill all fields'; return; }
  if(user.length<3){ if(err) err.textContent='Username min 3 chars'; return; }
  if(pass.length<4){ if(err) err.textContent='Password min 4 chars'; return; }

  let accs = loadAcc();
  if(authMode==='register'){
    if(accs.find(a=>a.u===user)){ if(err) err.textContent='Username taken'; return; }
    accs.push({u:user,p:pass});
    saveAcc(accs);
    ST.account = {u:user};
    saveSession(user, pass);
    hide('auth');
    show('char');
    ST.screen = 'char';
    renderCharGrid();
    updatePreview();
  } else {
    const a = accs.find(a=>a.u===user&&a.p===pass);
    if(!a){ if(err) err.textContent='Wrong username or password'; return; }
    ST.account = {u:user};
    saveSession(user, pass);
    const ch = loadCharData();
    if(ch){ ST.char = ch; enterGame(); }
    else { hide('auth'); show('char'); ST.screen='char'; renderCharGrid(); updatePreview(); }
  }
}

function goPlay(){
  const sess = loadSession();
  if(sess && sess.t && Date.now()-sess.t < 7*24*60*60*1000){
    const accs = loadAcc();
    const a = accs.find(x=>x.u===sess.u&&x.p===sess.p);
    if(a){
      ST.account = {u:sess.u};
      const ch = loadCharData();
      if(ch){ ST.char = ch; enterGame(); return; }
      else { show('char'); ST.screen='char'; renderCharGrid(); updatePreview(); return; }
    }
  }
  hide('title'); hide('auth'); show('char'); ST.screen='char';
  renderCharGrid(); updatePreview();
}

function backTitle(){
  hide('auth'); hide('char'); show('title'); ST.screen='title';
}

// ============ INIT GAME ============
function initGame(){
  ST.screen = 'title';
  hide('loading'); show('title');

  const sess = loadSession();
  if(sess && sess.u){
    const welcome = document.getElementById('welcome');
    if(welcome){ welcome.textContent = 'Welcome back, '+sess.u; welcome.style.display='block'; }
  }

  setupCanvas();
  setupInput();
  buildRoomList();
}

function setupCanvas(){
  CV = document.getElementById('gc');
  if(!CV) return;
  W = window.innerWidth;
  H = window.innerHeight;
  CV.width = W;
  CV.height = H;
  CX = CV.getContext('2d');
  CX.imageSmoothingEnabled = false;
}

function setupInput(){
  if(!CV) return;
  CV.addEventListener('mousedown', onClick);
  CV.addEventListener('touchstart', onTouch, {passive:false});
  window.addEventListener('keydown', onKey);
  window.addEventListener('resize', ()=>{
    W = window.innerWidth; H = window.innerHeight;
    if(CV){ CV.width=W; CV.height=H; }
  });

  const chatInput = document.getElementById('chat');
  if(chatInput){
    chatInput.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); sendChat(); }
    });
  }
}

function buildRoomList(){
  const list = document.getElementById('rlist');
  if(!list) return;
  list.innerHTML = '';
  ROOMS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'rcard';
    card.innerHTML = '<div class="icon">'+r.icon+'</div><div><div class="nm">'+r.name+'</div><div class="ds">'+r.desc+'</div></div>';
    card.onclick = () => { closePan('rnav'); enterRoom(r.id); };
    list.appendChild(card);
  });
}

// ============ ISOMETRIC ROOM SYSTEM ============
function enterRoom(rid){
  const room = ROOMS.find(r=>r.id===rid);
  if(!room) return;
  ST.room = room;
  ST.chats = [];
  document.getElementById('chatlyr').innerHTML = '';

  if(!ST.me){
    ST.me = {
      gx: room.spawn[0], gy: room.spawn[1],
      tx: room.spawn[0], ty: room.spawn[1],
      speed: 0.12, walking: false,
      name: ST.account ? ST.account.u : 'Guest',
      char: ST.char || CHARS[0]
    };
  } else {
    ST.me.gx = room.spawn[0]; ST.me.gy = room.spawn[1];
    ST.me.tx = room.spawn[0]; ST.me.ty = room.spawn[1];
    ST.me.walking = false;
  }

  // Generate NPCs
  ST.users = [];
  const npcNames = ['Luna','Orion','Stella','Cosmo','Aurora','Nova'];
  const npcChars = CHARS.slice(0, 6);
  for(let i=0; i<5; i++){
    const ngx = Math.floor(Math.random()*room.tiles[0]);
    const ngy = Math.floor(Math.random()*room.tiles[1]);
    if(Math.abs(ngx-room.spawn[0])+Math.abs(ngy-room.spawn[1]) < 2) continue;
    ST.users.push({
      gx:ngx, gy:ngy, tx:ngx, ty:ngy, speed:0.04+Math.random()*0.04,
      walking:false, name:npcNames[i%npcNames.length],
      char:npcChars[i%npcChars.length],
      timer:Math.random()*200, targetX:ngx, targetY:ngy
    });
  }

  ST.screen = 'game';
  hide('loading'); hide('title'); hide('char'); hide('auth');
  show('game');
  document.getElementById('rnm').textContent = room.name;
  document.getElementById('pop').textContent = (ST.users.length + 1);

  startLoop();
}

function enterGame(){
  enterRoom('lobby');
}

// ============ ISOMETRIC MATH ============
function isoToScreen(gx, gy, cx, cy){
  // Isometric projection: diamond tiles
  const sx = cx + (gx - gy) * (TILE_W / 2);
  const sy = cy + (gx + gy) * (TILE_H / 2);
  return {x:sx, y:sy};
}

function screenToIso(sx, sy, cx, cy){
  const dx = sx - cx;
  const dy = sy - cy;
  const gx = (dx / (TILE_W/2) + dy / (TILE_H/2)) / 2;
  const gy = (dy / (TILE_H/2) - dx / (TILE_W/2)) / 2;
  return {x:Math.round(gx), y:Math.round(gy)};
}

// ============ GAME LOOP ============
function startLoop(){
  if(LOOP) cancelAnimationFrame(LOOP);
  LOOP = requestAnimationFrame(gameLoop);
}

function gameLoop(){
  if(ST.screen !== 'game') return;
  ST.tick++;
  update();
  render();
  LOOP = requestAnimationFrame(gameLoop);
}

function update(){
  // Update me
  updateEntity(ST.me, true);

  // Update NPCs
  ST.users.forEach(u => {
    u.timer++;
    if(!u.walking && u.timer > 180 + Math.random()*250){
      u.timer = 0;
      const r = ST.room;
      u.targetX = Math.floor(Math.random()*r.tiles[0]);
      u.targetY = Math.floor(Math.random()*r.tiles[1]);
      u.tx = u.targetX; u.ty = u.targetY;
      u.walking = true;
    }
    updateEntity(u, false);
  });

  // Update chat bubbles
  updateChats();
}

function updateEntity(e, isMe){
  if(!e || !e.walking) return;
  const dx = e.tx - e.gx;
  const dy = e.ty - e.gy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < e.speed){
    e.gx = e.tx; e.gy = e.ty;
    e.walking = false;
  } else {
    e.gx += (dx/dist) * e.speed;
    e.gy += (dy/dist) * e.speed;
  }
}

// Clamp to room bounds
function clampGrid(gx, gy){
  if(!ST.room) return {x:gx,y:gy};
  return {
    x: Math.max(0, Math.min(ST.room.tiles[0]-1, gx)),
    y: Math.max(0, Math.min(ST.room.tiles[1]-1, gy))
  };
}

// ============ RENDERING ============
function render(){
  if(!CX) return;
  CX.fillStyle = '#0a0a1a';
  CX.fillRect(0, 0, W, H);

  if(!ST.room) return;

  const bgKey = 'room_'+ST.room.id;
  const bg = ST.assets[bgKey];

  // Room center point - align with isometric origin
  let roomCX = W/2;
  let roomCY = H/2;

  if(bg && bg.width > 0){
    // Scale background to fill screen while maintaining aspect ratio
    const scale = Math.max(W / bg.width, H / bg.height) * 1.1;
    const dw = bg.width * scale;
    const dh = bg.height * scale;
    const bx = (W - dw) / 2;
    const by = (H - dh) / 2;
    CX.drawImage(bg, bx, by, dw, dh);
    roomCX = W/2;
    roomCY = H/2 + 30;
  } else {
    // Fallback gradient
    const grd = CX.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
    grd.addColorStop(0, '#1a1a3e');
    grd.addColorStop(1, '#0a0a1a');
    CX.fillStyle = grd;
    CX.fillRect(0, 0, W, H);
  }

  // Collect entities for z-sort (back to front: smaller gx+gy first)
  const entities = [];
  if(ST.me) entities.push({...ST.me, isMe:true});
  ST.users.forEach(u => entities.push({...u, isMe:false}));
  entities.sort((a,b) => (a.gx + a.gy) - (b.gx + b.gy));

  // Draw entities
  entities.forEach(e => drawAvatar(e, roomCX, roomCY));

  // Draw click indicator
  if(ST.target){
    const age = Date.now() - ST.target.t;
    if(age < 800){
      const alpha = 1 - age/800;
      const pos = isoToScreen(ST.target.gx, ST.target.gy, roomCX, roomCY);
      CX.beginPath();
      CX.arc(pos.x, pos.y, 10 + age/40, 0, Math.PI*2);
      CX.strokeStyle = 'rgba(255,215,0,'+alpha+')';
      CX.lineWidth = 2;
      CX.stroke();
    } else {
      ST.target = null;
    }
  }

  // Debug: draw tile grid (subtle)
  // drawGrid(roomCX, roomCY);
}

function drawAvatar(e, cx, cy){
  const charKey = 'char_'+e.char.id;
  const sprite = ST.assets[charKey];
  const pos = isoToScreen(e.gx, e.gy, cx, cy);

  // Walking bob
  let bobY = 0;
  if(e.walking){
    bobY = Math.sin(ST.tick * 0.25) * 3;
  }

  const ax = pos.x;
  const ay = pos.y - 20 + bobY; // lift slightly above floor

  // Shadow (diamond shaped, on the floor)
  CX.fillStyle = 'rgba(0,0,0,0.25)';
  CX.beginPath();
  CX.ellipse(ax, pos.y + 5, 18, 8, 0, 0, Math.PI*2);
  CX.fill();

  if(sprite && sprite.width > 0){
    // Draw sprite centered
    const scale = 0.07;
    const dw = sprite.width * scale;
    const dh = sprite.height * scale;
    CX.save();
    // Flip if facing left
    if(e.walking && e.tx < e.gx){
      CX.translate(ax, 0);
      CX.scale(-1, 1);
      CX.drawImage(sprite, -dw/2, ay - dh + 20, dw, dh);
    } else {
      CX.drawImage(sprite, ax - dw/2, ay - dh + 20, dw, dh);
    }
    CX.restore();
  } else {
    // Fallback: simple chibi
    CX.fillStyle = e.isMe ? '#32CD32' : '#9370DB';
    CX.beginPath();
    CX.arc(ax, ay - 10, 14, 0, Math.PI*2);
    CX.fill();
    CX.fillStyle = '#fff';
    CX.beginPath();
    CX.arc(ax-4, ay-14, 3, 0, Math.PI*2);
    CX.arc(ax+4, ay-14, 3, 0, Math.PI*2);
    CX.fill();
  }

  // Name tag
  const nm = e.isMe ? e.name + ' (You)' : e.name;
  CX.font = 'bold 11px sans-serif';
  CX.textAlign = 'center';
  const tw = CX.measureText(nm).width;
  const nx = ax - tw/2 - 4;
  const ny = ay - 50;
  CX.fillStyle = 'rgba(0,0,0,0.6)';
  CX.beginPath();
  CX.rect(nx, ny, tw+8, 18);
  CX.fill();
  CX.fillStyle = e.isMe ? '#32CD32' : '#ccc';
  CX.fillText(nm, ax, ny + 13);
}

function drawGrid(cx, cy){
  if(!ST.room) return;
  CX.strokeStyle = 'rgba(147,112,219,0.15)';
  CX.lineWidth = 1;
  for(let gx=0; gx<ST.room.tiles[0]; gx++){
    for(let gy=0; gy<ST.room.tiles[1]; gy++){
      const p = isoToScreen(gx, gy, cx, cy);
      // Draw diamond tile
      CX.beginPath();
      CX.moveTo(p.x, p.y - TILE_H/2);
      CX.lineTo(p.x + TILE_W/2, p.y);
      CX.lineTo(p.x, p.y + TILE_H/2);
      CX.lineTo(p.x - TILE_W/2, p.y);
      CX.closePath();
      CX.stroke();
    }
  }
}

// ============ INPUT ============
function onClick(ev){
  if(ST.screen !== 'game' || !ST.room) return;
  const rect = CV.getBoundingClientRect();
  const sx = ev.clientX - rect.left;
  const sy = ev.clientY - rect.top;

  const roomCX = W/2;
  const roomCY = H/2 + 20;
  const tile = screenToIso(sx, sy, roomCX, roomCY);
  const clamped = clampGrid(tile.x, tile.y);

  ST.target = {gx:clamped.x, gy:clamped.y, t:Date.now()};
  ST.me.tx = clamped.x;
  ST.me.ty = clamped.y;
  ST.me.walking = true;

  // Check NPC click
  ST.users.forEach(u => {
    const up = isoToScreen(u.gx, u.gy, roomCX, roomCY);
    const dx = sx - up.x; const dy = sy - up.y;
    if(Math.sqrt(dx*dx+dy*dy) < 40){
      const msgs = ['Hello!','Nice night!','Welcome to the inn!','Hey there!','✨'];
      addChat(u.name, msgs[Math.floor(Math.random()*msgs.length)], false);
    }
  });
}

function onTouch(ev){
  ev.preventDefault();
  if(ev.touches.length > 0){
    const t = ev.touches[0];
    const rect = CV.getBoundingClientRect();
    onClick({clientX:t.clientX, clientY:t.clientY});
  }
}

function onKey(ev){
  if(ST.screen === 'game' && ev.key === 'Escape'){
    closeAllPanels();
  }
  if(ST.screen !== 'game' || !ST.room) return;

  // Arrow keys for isometric movement
  let dx = 0, dy = 0;
  if(ev.key==='ArrowUp' || ev.key==='w'){ dx=1; dy=-1; }
  if(ev.key==='ArrowDown' || ev.key==='s'){ dx=-1; dy=1; }
  if(ev.key==='ArrowLeft' || ev.key==='a'){ dx=-1; dy=-1; }
  if(ev.key==='ArrowRight' || ev.key==='d'){ dx=1; dy=1; }
  if(dx!==0 || dy!==0){
    ev.preventDefault();
    const ng = clampGrid(ST.me.gx + dx, ST.me.gy + dy);
    ST.me.tx = ng.x; ST.me.ty = ng.y;
    ST.me.walking = true;
  }
}

// ============ CHAT ============
function sendChat(){
  const inp = document.getElementById('chat');
  const txt = inp.value.trim();
  if(!txt || ST.screen !== 'game') return;
  addChat(ST.me.name, txt, true);
  inp.value = '';
  inp.blur();

  // NPC response
  if(Math.random() > 0.5){
    setTimeout(() => {
      const u = ST.users[Math.floor(Math.random()*ST.users.length)];
      if(u){
        const responses = ['Nice!','Haha','Cool','I agree','Interesting!','👍','Wow!'];
        addChat(u.name, responses[Math.floor(Math.random()*responses.length)], false);
      }
    }, 500 + Math.random()*1500);
  }
}

function addChat(name, text, isMe){
  const chatlyr = document.getElementById('chatlyr');
  if(!chatlyr) return;

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isMe?' me':'');
  bubble.innerHTML = '<div class="name">'+name+'</div>'+escapeHtml(text);
  chatlyr.appendChild(bubble);

  const chat = {el:bubble, t:Date.now(), life:6000, name:name};
  ST.chats.push(chat);
  updateChatPos(chat);
}

function updateChatPos(chat){
  let target = null;
  if(ST.me && ST.me.name === chat.name) target = ST.me;
  if(!target) target = ST.users.find(u => u.name === chat.name);
  if(!target || !ST.room) return;

  const roomCX = W/2;
  const roomCY = H/2 + 20;
  const pos = isoToScreen(target.gx, target.gy, roomCX, roomCY);

  chat.el.style.left = pos.x + 'px';
  chat.el.style.top = (pos.y - 55) + 'px';
  chat.el.style.transform = 'translate(-50%,-100%)';
}

function updateChats(){
  const now = Date.now();
  for(let i = ST.chats.length-1; i>=0; i--){
    const c = ST.chats[i];
    updateChatPos(c);
    const age = now - c.t;
    if(age > c.life - 1000){
      c.el.style.opacity = (c.life - age) / 1000;
    }
    if(age > c.life){
      c.el.remove();
      ST.chats.splice(i, 1);
    }
  }
}

function escapeHtml(t){
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ============ UI PANELS ============
function togglePan(id){
  const pan = document.getElementById(id);
  if(!pan) return;
  pan.classList.toggle('on');
}

function closePan(id){
  const pan = document.getElementById(id);
  if(pan) pan.classList.remove('on');
}

function closeAllPanels(){
  document.querySelectorAll('#rnav').forEach(p => p.classList.remove('on'));
}

function hide(id){ const e=document.getElementById(id); if(e) e.style.display='none'; }
function show(id){ const e=document.getElementById(id); if(e) e.style.display='block'; }
if(document.getElementById('title')) document.getElementById('title').style.display='none';
if(document.getElementById('auth')) document.getElementById('auth').style.display='none';
if(document.getElementById('char')) document.getElementById('char').style.display='none';
if(document.getElementById('game')) document.getElementById('game').style.display='none';

// ============ BOOT ============
function boot(){
  preload();
}

document.addEventListener('DOMContentLoaded', boot);
if(document.readyState === 'complete' || document.readyState === 'interactive'){
  setTimeout(boot, 1);
}
