<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Starlight Inn</title>
<style>
/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #0a0a1a;
  color: #e0dcc8;
  font-family: 'Georgia', 'Times New Roman', serif;
  -webkit-font-smoothing: antialiased;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

/* ============================================
   CANVAS
   ============================================ */
#gameCanvas {
  display: block;
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: grab;
}
#gameCanvas:active { cursor: grabbing; }

/* ============================================
   SCREENS (LOADING / TITLE / CHAR CREATE / GAME)
   ============================================ */
.screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
.screen.active { display: flex; }

/* Loading */
#loadingScreen {
  background: #0a0a1a;
  z-index: 9999;
}
#loadingBarWrap {
  width: 320px; height: 24px;
  border: 2px solid #FFD700;
  border-radius: 12px;
  overflow: hidden;
  margin-top: 20px;
  background: rgba(255,215,0,0.08);
}
#loadingBar {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #FFD700, #FFA500);
  transition: width 0.2s ease;
}
#loadingText {
  color: #FFD700;
  font-size: 1.1rem;
  margin-bottom: 12px;
  letter-spacing: 2px;
}
#loadingPercent { color: #c8b888; font-size: 0.9rem; margin-top: 8px; }

/* Title */
#titleScreen {
  background: #0a0a1a;
  z-index: 500;
}
#titleArt {
  width: 320px; height: 200px;
  background: #1a1a2e;
  border: 2px solid #FFD700;
  border-radius: 8px;
  margin-bottom: 20px;
  image-rendering: pixelated;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
#titleArt canvas { image-rendering: pixelated; width: 100%; height: 100%; }
@keyframes titleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
#titleText {
  font-size: 3rem;
  color: #FFD700;
  text-shadow: 0 2px 12px rgba(255,215,0,0.4), 0 0 40px rgba(255,215,0,0.15);
  margin-bottom: 8px;
  animation: titleFloat 3s ease-in-out infinite;
  letter-spacing: 6px;
  font-weight: bold;
}
#subtitleText { color: #a09878; font-size: 1rem; margin-bottom: 30px; font-style: italic; }

.titleBtn {
  width: 220px; padding: 12px 24px;
  margin: 6px 0;
  background: rgba(255,215,0,0.1);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #FFD700;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.titleBtn:hover {
  background: rgba(255,215,0,0.25);
  transform: scale(1.04);
  box-shadow: 0 0 20px rgba(255,215,0,0.15);
}

/* Character Creator */
#charScreen {
  background: #0a0a1a;
  flex-direction: row;
  z-index: 400;
  padding: 20px;
  gap: 20px;
}
#charPreview {
  width: 200px; height: 260px;
  background: rgba(10,10,26,0.92);
  border: 2px solid #FFD700;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  image-rendering: pixelated;
}
#charPreview canvas { image-rendering: pixelated; }
#charPanel {
  max-width: 420px;
  background: rgba(10,10,26,0.92);
  border: 2px solid #FFD700;
  border-radius: 10px;
  padding: 20px;
  overflow-y: auto;
  max-height: 90vh;
}
#charPanel h2 { color: #FFD700; margin-bottom: 16px; text-align: center; font-size: 1.4rem; }
.charSection { margin-bottom: 18px; }
.charSection h3 { color: #c8b888; font-size: 0.95rem; margin-bottom: 8px; }
.charGrid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.charOpt {
  width: 100%; aspect-ratio: 1;
  background: rgba(255,215,0,0.06);
  border: 2px solid rgba(255,215,0,0.25);
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  color: #e0dcc8;
  transition: all 0.2s;
  padding: 4px;
}
.charOpt:hover { border-color: #FFD700; background: rgba(255,215,0,0.15); }
.charOpt.selected { border-color: #FFD700; background: rgba(255,215,0,0.25); box-shadow: 0 0 10px rgba(255,215,0,0.15); }
.charOpt img { max-width: 100%; max-height: 100%; image-rendering: pixelated; pointer-events: none; }

#charNameInput {
  width: 100%; padding: 10px;
  background: rgba(255,215,0,0.06);
  border: 2px solid rgba(255,215,0,0.3);
  border-radius: 6px;
  color: #FFD700;
  font-family: inherit;
  font-size: 1rem;
  text-align: center;
  margin-bottom: 12px;
  outline: none;
}
#charNameInput:focus { border-color: #FFD700; }
#charNameInput::placeholder { color: rgba(255,215,0,0.35); }

#charStartBtn {
  width: 100%; padding: 12px;
  background: rgba(255,215,0,0.15);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #FFD700;
  font-family: inherit;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
#charStartBtn:hover { background: rgba(255,215,0,0.3); }

/* ============================================
   GAME UI OVERLAY
   ============================================ */
#gameUI {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 50;
  display: none;
}
#gameUI.active { display: block; }
#gameUI > * { pointer-events: auto; }

/* Top Bar */
#topBar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(10,10,26,0.92);
  border-bottom: 2px solid #FFD700;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 8px;
}
#roomName { color: #FFD700; font-size: 1rem; margin-right: auto; letter-spacing: 1px; }

.uiBtn {
  padding: 6px 12px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 6px;
  color: #e0dcc8;
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.uiBtn:hover { background: rgba(255,215,0,0.2); border-color: #FFD700; }

#zoomControls {
  display: flex; gap: 4px;
}
.zoomBtn {
  width: 36px; height: 36px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 6px;
  color: #FFD700;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.zoomBtn:hover { background: rgba(255,215,0,0.25); border-color: #FFD700; }

/* Side Panel */
#sidePanel {
  position: absolute; top: 56px; right: 8px; width: 180px;
  background: rgba(10,10,26,0.92);
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 8px;
  padding: 10px;
  display: none;
}
#sidePanel.visible { display: block; }
#sidePanel h3 { color: #FFD700; font-size: 0.85rem; margin-bottom: 8px; text-align: center; }
#playerList { list-style: none; }
#playerList li { color: #c8b888; font-size: 0.78rem; padding: 4px 0; border-bottom: 1px solid rgba(255,215,0,0.1); }
#playerList li:last-child { border-bottom: none; }

/* Chat */
#chatWrap {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  display: flex; gap: 6px; align-items: center;
}
#chatInput {
  flex: 1; max-width: 500px;
  padding: 8px 12px;
  background: rgba(10,10,26,0.92);
  border: 2px solid rgba(255,215,0,0.4);
  border-radius: 8px;
  color: #e0dcc8;
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
}
#chatInput:focus { border-color: #FFD700; }
#chatBtn {
  padding: 8px 16px;
  background: rgba(255,215,0,0.15);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #FFD700;
  font-family: inherit;
  cursor: pointer;
  font-size: 0.85rem;
}
#chatBtn:hover { background: rgba(255,215,0,0.3); }

/* ============================================
   VIRTUAL D-PAD (MOBILE)
   ============================================ */
#dpad {
  position: absolute; bottom: 80px; left: 20px;
  width: 140px; height: 140px;
  display: none;
  z-index: 60;
}
#dpad.show { display: block; }
.dpadBtn {
  position: absolute;
  width: 46px; height: 46px;
  background: rgba(255,215,0,0.15);
  border: 2px solid rgba(255,215,0,0.5);
  border-radius: 50%;
  color: #FFD700;
  font-size: 1.3rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.dpadBtn:active { background: rgba(255,215,0,0.35); }
.dpadUp    { top: 0; left: 47px; }
.dpadDown  { bottom: 0; left: 47px; }
.dpadLeft  { top: 47px; left: 0; }
.dpadRight { top: 47px; right: 0; }

/* ============================================
   AUTH MODAL
   ============================================ */
#authModal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
#authModal.active { display: flex; }
#authBox {
  width: 340px;
  background: rgba(10,10,26,0.95);
  border: 2px solid #FFD700;
  border-radius: 12px;
  padding: 24px;
}
#authBox h2 { color: #FFD700; text-align: center; margin-bottom: 16px; }
.authInput {
  width: 100%; padding: 10px; margin-bottom: 10px;
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 6px;
  color: #FFD700;
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
}
.authInput:focus { border-color: #FFD700; }
.authInput::placeholder { color: rgba(255,215,0,0.3); }
.authBtn {
  width: 100%; padding: 10px; margin-top: 6px;
  background: rgba(255,215,0,0.15);
  border: 2px solid #FFD700;
  border-radius: 8px;
  color: #FFD700;
  font-family: inherit;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.authBtn:hover { background: rgba(255,215,0,0.3); }
.authToggle { color: #a09878; font-size: 0.8rem; text-align: center; margin-top: 10px; cursor: pointer; text-decoration: underline; }
.authToggle:hover { color: #FFD700; }
#authError { color: #ff6b6b; font-size: 0.8rem; text-align: center; margin-top: 6px; min-height: 18px; }

/* ============================================
   CHAT BUBBLES (RENDERED ON CANVAS, STYLED HERE FOR REFERENCE)
   ============================================ */
@keyframes bubblePop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  #titleText { font-size: 2rem; letter-spacing: 3px; }
  #charScreen { flex-direction: column; align-items: center; padding: 10px; }
  #charPanel { max-width: 90vw; padding: 14px; }
  .charGrid { grid-template-columns: repeat(4, 1fr); }
  #sidePanel { width: 140px; right: 4px; top: 52px; }
  .uiBtn { padding: 4px 8px; font-size: 0.7rem; }
  #chatWrap { left: 4px; right: 4px; bottom: 4px; }
  #roomName { font-size: 0.85rem; }
}

@media (max-width: 480px) {
  #topBar { height: 40px; padding: 0 6px; }
  .zoomBtn { width: 30px; height: 30px; font-size: 1rem; }
  .uiBtn { padding: 3px 6px; font-size: 0.65rem; }
}
</style>
</head>
<body>

<!-- ============================================
     LOADING SCREEN
     ============================================ -->
<div id="loadingScreen" class="screen active">
  <div id="loadingText">STARLIGHT INN</div>
  <div id="loadingBarWrap"><div id="loadingBar"></div></div>
  <div id="loadingPercent">0%</div>
</div>

<!-- ============================================
     TITLE SCREEN
     ============================================ -->
<div id="titleScreen" class="screen">
  <div id="titleArt"><canvas id="titleCanvas" width="320" height="200"></canvas></div>
  <div id="titleText">STARLIGHT INN</div>
  <div id="subtitleText">An Isometric Virtual World</div>
  <button class="titleBtn" id="btnLogin">Login</button>
  <button class="titleBtn" id="btnRegister">Register</button>
  <button class="titleBtn" id="btnGuest">Play as Guest</button>
</div>

<!-- ============================================
     AUTH MODAL
     ============================================ -->
<div id="authModal">
  <div id="authBox">
    <h2 id="authTitle">Login</h2>
    <input type="text" id="authUser" class="authInput" placeholder="Username" autocomplete="off">
    <input type="password" id="authPass" class="authInput" placeholder="Password">
    <button class="authBtn" id="authSubmit">Login</button>
    <div id="authError"></div>
    <div class="authToggle" id="authToggle">Need an account? Register</div>
    <div class="authToggle" id="authBack" style="margin-top:6px;font-size:0.75rem;">Back to Title</div>
  </div>
</div>

<!-- ============================================
     CHARACTER CREATOR
     ============================================ -->
<div id="charScreen" class="screen">
  <div id="charPreview"><canvas id="charCanvas" width="200" height="260"></canvas></div>
  <div id="charPanel">
    <h2>Create Your Character</h2>
    <input type="text" id="charNameInput" placeholder="Enter your name..." maxlength="16" autocomplete="off">
    <div class="charSection">
      <h3>Hair Style</h3>
      <div class="charGrid" id="hairGrid">
        <div class="charOpt selected" data-hair="hair_bald" data-label="Bald">Bald</div>
        <div class="charOpt" data-hair="hair_short" data-label="Short">Short</div>
        <div class="charOpt" data-hair="hair_spiky" data-label="Spiky">Spiky</div>
        <div class="charOpt" data-hair="hair_long" data-label="Long">Long</div>
        <div class="charOpt" data-hair="hair_ponytail" data-label="Pony">Pony</div>
        <div class="charOpt" data-hair="hair_afro" data-label="Afro">Afro</div>
      </div>
    </div>
    <div class="charSection">
      <h3>Outfit</h3>
      <div class="charGrid" id="outfitGrid">
        <div class="charOpt selected" data-shirt="shirt_blue" data-label="Blue Shirt">Blue</div>
        <div class="charOpt" data-shirt="shirt_red" data-label="Red Shirt">Red</div>
        <div class="charOpt" data-shirt="shirt_green" data-label="Green Shirt">Green</div>
        <div class="charOpt" data-shirt="dress_pink" data-label="Pink Dress">Pink</div>
      </div>
    </div>
    <div class="charSection">
      <h3>Accessory</h3>
      <div class="charGrid" id="accGrid">
        <div class="charOpt selected" data-acc="none" data-label="None">None</div>
        <div class="charOpt" data-acc="acc_crown" data-label="Crown">Crown</div>
        <div class="charOpt" data-acc="acc_glasses" data-label="Glasses">Glasses</div>
        <div class="charOpt" data-acc="acc_wings" data-label="Wings">Wings</div>
      </div>
    </div>
    <button id="charStartBtn">Enter the Inn</button>
  </div>
</div>

<!-- ============================================
     GAME SCREEN (CANVAS + UI OVERLAY)
     ============================================ -->
<canvas id="gameCanvas"></canvas>
<div id="gameUI">
  <div id="topBar">
    <span id="roomName">Main Hall</span>
    <button class="uiBtn" id="btnFriends">Friends</button>
    <button class="uiBtn" id="btnInventory">Inventory</button>
    <button class="uiBtn" id="btnSettings">Settings</button>
    <div id="zoomControls">
      <button class="zoomBtn" id="btnZoomOut">-</button>
      <button class="zoomBtn" id="btnZoomIn">+</button>
    </div>
    <button class="uiBtn" id="btnLogout">Logout</button>
  </div>
  <div id="sidePanel">
    <h3 id="sideTitle">Friends</h3>
    <ul id="playerList"></ul>
  </div>
  <div id="chatWrap">
    <input type="text" id="chatInput" placeholder="Press Enter to chat..." maxlength="120" autocomplete="off">
    <button id="chatBtn">Send</button>
  </div>
  <div id="dpad">
    <div class="dpadBtn dpadUp" data-dir="n">&#9650;</div>
    <div class="dpadBtn dpadDown" data-dir="s">&#9660;</div>
    <div class="dpadBtn dpadLeft" data-dir="w">&#9664;</div>
    <div class="dpadBtn dpadRight" data-dir="e">&#9654;</div>
  </div>
</div>

<script>
// ##############################################################
//  STARLIGHT INN - COMPLETE ISOMETRIC VIRTUAL WORLD GAME ENGINE
// ##############################################################

// ============================================
// 1. ASSET DEFINITIONS
// ============================================
const ASSETS = {
  // Avatar sprites
  'avatar/idle_s':      'assets/sprites/avatar/idle_s.png',
  'avatar/idle_e':      'assets/sprites/avatar/idle_e.png',
  'avatar/idle_n':      'assets/sprites/avatar/idle_n.png',
  'avatar/idle_w':      'assets/sprites/avatar/idle_w.png',
  'avatar/walk1_s':     'assets/sprites/avatar/walk1_s.png',
  'avatar/walk2_s':     'assets/sprites/avatar/walk2_s.png',
  // Furniture sprites
  'furniture/sofa':     'assets/sprites/furniture/sofa.png',
  'furniture/table':    'assets/sprites/furniture/table.png',
  'furniture/chair':    'assets/sprites/furniture/chair.png',
  'furniture/bed':      'assets/sprites/furniture/bed.png',
  'furniture/bookshelf':'assets/sprites/furniture/bookshelf.png',
  'furniture/plant':    'assets/sprites/furniture/plant.png',
  'furniture/lamp':     'assets/sprites/furniture/lamp.png',
  'furniture/tv':       'assets/sprites/furniture/tv.png',
  'furniture/rug':      'assets/sprites/furniture/rug.png',
  'furniture/trophy':   'assets/sprites/furniture/trophy.png',
  'furniture/piano':    'assets/sprites/furniture/piano.png',
  'furniture/fountain': 'assets/sprites/furniture/fountain.png',
  // Floor tiles
  'tiles/floor_wood':   'assets/sprites/tiles/floor_wood.png',
  'tiles/floor_carpet': 'assets/sprites/tiles/floor_carpet.png',
  'tiles/floor_grass':  'assets/sprites/tiles/floor_grass.png',
  'tiles/floor_stone':  'assets/sprites/tiles/floor_stone.png',
  'tiles/floor_tile':   'assets/sprites/tiles/floor_tile.png',
  'tiles/floor_marble': 'assets/sprites/tiles/floor_marble.png',
  // Wall tiles
  'tiles/wall_wood':    'assets/sprites/tiles/wall_wood.png',
  'tiles/wall_brick':   'assets/sprites/tiles/wall_brick.png',
  'tiles/wall_stone':   'assets/sprites/tiles/wall_stone.png',
  // Hair sprites
  'hair/hair_bald':     'assets/sprites/hair/hair_bald.png',
  'hair/hair_short':    'assets/sprites/hair/hair_short.png',
  'hair/hair_spiky':    'assets/sprites/hair/hair_spiky.png',
  'hair/hair_long':     'assets/sprites/hair/hair_long.png',
  'hair/hair_ponytail': 'assets/sprites/hair/hair_ponytail.png',
  'hair/hair_afro':     'assets/sprites/hair/hair_afro.png',
  // Clothing sprites
  'clothes/shirt_blue': 'assets/sprites/clothes/shirt_blue.png',
  'clothes/shirt_red':  'assets/sprites/clothes/shirt_red.png',
  'clothes/shirt_green':'assets/sprites/clothes/shirt_green.png',
  'clothes/dress_pink': 'assets/sprites/clothes/dress_pink.png',
  // Item/accessory sprites
  'items/acc_crown':    'assets/sprites/items/acc_crown.png',
  'items/acc_glasses':  'assets/sprites/items/acc_glasses.png',
  'items/acc_wings':    'assets/sprites/items/acc_wings.png',
  'items/item_dragon_egg':'assets/sprites/items/item_dragon_egg.png',
  'items/item_star_badge':'assets/sprites/items/item_star_badge.png',
};

// ============================================
// 2. GLOBAL STATE
// ============================================
const IMAGES = {};
let assetsLoaded = 0;
const TOTAL_ASSETS = Object.keys(ASSETS).length;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'loading'; // loading, title, charcreate, game
let currentRoom = null;
let player = null;
let aiPlayers = [];
let chatMessages = [];
let camera = { x: 0, y: 0, zoom: 1.0, minZoom: 0.5, maxZoom: 3.0 };
let keys = {};
let mouse = { x: 0, y: 0, down: false, lastX: 0, lastY: 0 };
let touchState = { active: false, pinchDist: 0, lastPinchDist: 0 };
let isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let lastTime = 0;
let animFrameId = null;
let dpadActive = { n: false, s: false, e: false, w: false };
let sidePanelVisible = false;
let sidePanelMode = 'friends'; // friends, inventory, settings

// Isometric constants
const TILE_W = 64;
const TILE_H = 32;
const AVATAR_W = 64;
const AVATAR_H = 96;

// Character selections
let charSelections = { hair: 'hair_bald', shirt: 'shirt_blue', acc: 'none', name: '' };

// ============================================
// 3. ROOM DATA
// ============================================
const ROOMS = {
  mainhall: {
    name: 'Main Hall',
    width: 10, height: 10,
    floor: 'floor_wood',
    wall: 'wall_wood',
    exits: { east: 'garden', north: 'library', south: 'tavern' },
    furniture: [
      {type:'sofa', x:3, y:3},
      {type:'table', x:5, y:4},
      {type:'chair', x:4, y:4},
      {type:'lamp', x:2, y:2},
      {type:'plant', x:7, y:6},

// ============================================
// 4. ASSET PRELOADER
// ============================================
function loadAssets() {
  const entries = Object.entries(ASSETS);
  let loaded = 0;

  function updateProgress() {
    loaded++;
    const pct = Math.round((loaded / TOTAL_ASSETS) * 100);
    document.getElementById('loadingBar').style.width = pct + '%';
    document.getElementById('loadingPercent').textContent = pct + '%';
    if (loaded >= TOTAL_ASSETS) {
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.remove('active');
        document.getElementById('titleScreen').classList.add('active');
        gameState = 'title';
        startTitleAnimation();
        playTitleJingle();
      }, 400);
    }
  }

  for (const [key, src] of entries) {
    const img = new Image();
    img.onload = updateProgress;
    img.onerror = () => { console.warn('Failed to load:', src); updateProgress(); };
    img.src = src;
    IMAGES[key] = img;
  }
}

// ============================================
// 5. ISOMETRIC MATH
// ============================================
function toIso(x, y) {
  const cx = canvas.width / 2 + camera.x;
  const cy = canvas.height / 3 + camera.y;
  return {
    x: cx + (x - y) * (TILE_W / 2),
    y: cy + (x + y) * (TILE_H / 2)
  };
}

function toGrid(screenX, screenY) {
  const cx = canvas.width / 2 + camera.x;
  const cy = canvas.height / 3 + camera.y;
  const sx = (screenX - cx) / camera.zoom;
  const sy = (screenY - cy) / camera.zoom;
  const x = (sx / (TILE_W / 2) + sy / (TILE_H / 2)) / 2;
  const y = (sy / (TILE_H / 2) - sx / (TILE_W / 2)) / 2;
  return { x: Math.floor(x), y: Math.floor(y) };
}

// ============================================
// 6. AUDIO SYSTEM (Web Audio API procedural)
// ============================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTitleJingle() {
  try {
    const ctx = ensureAudio();
    const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50, 1174.66, 1046.50];
    const times = [0, 0.15, 0.30, 0.45, 0.60, 0.75, 0.90, 1.10];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.08, ctx.currentTime + times[i]);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + times[i] + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + times[i]);
      osc.stop(ctx.currentTime + times[i] + 0.4);
    });
  } catch (e) { /* audio not available */ }
}

function playFootstep() {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 200 + Math.random() * 100;
    gain.gain.setValueAtTime(0.04, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  } catch (e) { /* audio not available */ }
}

function playChatSound() {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  } catch (e) { /* audio not available */ }
}

function playRoomAmbience() {
  // Simple ambient drone - called once per room entry
  try {
    const ctx = ensureAudio();
    const freqs = [110, 164.81, 196];
    freqs.forEach(f => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.025, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 3);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 3);
    });
  } catch (e) { /* audio not available */ }
}

// ============================================
// 7. TITLE SCREEN ANIMATION
// ============================================
let titleStars = [];
let titleAnimId = null;
function startTitleAnimation() {
  const tCanvas = document.getElementById('titleCanvas');
  const tCtx = tCanvas.getContext('2d');
  titleStars = [];
  for (let i = 0; i < 60; i++) {
    titleStars.push({
      x: Math.random() * 320,
      y: Math.random() * 200,
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.01
    });
  }
  function drawTitle() {
    tCtx.fillStyle = '#0f0f23';
    tCtx.fillRect(0, 0, 320, 200);
    // Stars
    titleStars.forEach(s => {
      s.twinkle += s.speed;
      const alpha = 0.4 + Math.sin(s.twinkle) * 0.35;
      tCtx.fillStyle = `rgba(255,220,150,${alpha})`;
      tCtx.fillRect(Math.floor(s.x), Math.floor(s.y), s.r < 1 ? 1 : 2, s.r < 1 ? 1 : 2);
    });
    // Inn building silhouette
    tCtx.fillStyle = '#1a1528';
    tCtx.fillRect(110, 90, 100, 80);
    tCtx.fillRect(100, 100, 120, 70);
    // Roof
    tCtx.fillStyle = '#2a2038';
    tCtx.beginPath();
    tCtx.moveTo(90, 100);
    tCtx.lineTo(160, 50);
    tCtx.lineTo(230, 100);
    tCtx.closePath();
    tCtx.fill();
    // Roof outline
    tCtx.strokeStyle = 'rgba(255,215,0,0.4)';
    tCtx.lineWidth = 1;
    tCtx.stroke();
    // Door
    tCtx.fillStyle = '#3a3040';
    tCtx.fillRect(148, 125, 24, 45);
    tCtx.fillStyle = 'rgba(255,215,0,0.3)';
    tCtx.fillRect(150, 127, 20, 43);
    // Windows
    tCtx.fillStyle = 'rgba(255,220,120,0.4)';
    tCtx.fillRect(118, 110, 16, 16);
    tCtx.fillRect(186, 110, 16, 16);
    // Ground
    tCtx.fillStyle = '#12121a';
    tCtx.fillRect(0, 170, 320, 30);
    if (gameState === 'title') {
      titleAnimId = requestAnimationFrame(drawTitle);
    }
  }
  drawTitle();
}

function stopTitleAnimation() {
  if (titleAnimId) cancelAnimationFrame(titleAnimId);
}

      cCtx.drawImage(accImg, cx - 32, cy - 96 + bounce, 64, 96);
    }
  }

    requestAnimationFrame(updateCharPreview);
  }
}

// 9. AUTH SYSTEM (localStorage)
// ============================================
function initAuth() {
  const modal = document.getElementById('authModal');
  const titleEl = document.getElementById('authTitle');
  const toggleEl = document.getElementById('authToggle');
  const submitBtn = document.getElementById('authSubmit');
  const errorEl = document.getElementById('authError');
  let isLogin = true;

  document.getElementById('btnLogin').addEventListener('click', () => {
    isLogin = true;
    titleEl.textContent = 'Login';
    submitBtn.textContent = 'Login';
    toggleEl.textContent = 'Need an account? Register';
    modal.classList.add('active');
    errorEl.textContent = '';
    document.getElementById('authUser').value = '';
    document.getElementById('authPass').value = '';
  });
  document.getElementById('btnRegister').addEventListener('click', () => {
    isLogin = false;
    titleEl.textContent = 'Register';
    submitBtn.textContent = 'Register';
    toggleEl.textContent = 'Already have an account? Login';
    modal.classList.add('active');
    errorEl.textContent = '';
    document.getElementById('authUser').value = '';
    document.getElementById('authPass').value = '';
  });
  toggleEl.addEventListener('click', () => {
    isLogin = !isLogin;
    titleEl.textContent = isLogin ? 'Login' : 'Register';
    submitBtn.textContent = isLogin ? 'Login' : 'Register';
    toggleEl.textContent = isLogin ? 'Need an account? Register' : 'Already have an account? Login';
    errorEl.textContent = '';
  });
  document.getElementById('authBack').addEventListener('click', () => {
    modal.classList.remove('active');
  });
  submitBtn.addEventListener('click', () => {
    const user = document.getElementById('authUser').value.trim();
    const pass = document.getElementById('authPass').value;
    if (!user || !pass) { errorEl.textContent = 'Please fill in all fields'; return; }
    if (user.length < 3) { errorEl.textContent = 'Username must be at least 3 characters'; return; }
    if (pass.length < 4) { errorEl.textContent = 'Password must be at least 4 characters'; return; }

    if (isLogin) {
      const stored = localStorage.getItem('si_user_' + user);
      if (!stored) { errorEl.textContent = 'User not found'; return; }
      const data = JSON.parse(stored);
      if (data.password !== pass) { errorEl.textContent = 'Incorrect password'; return; }
      localStorage.setItem('si_current_user', user);
      modal.classList.remove('active');
      enterCharCreate(user);
    } else {
      if (localStorage.getItem('si_user_' + user)) { errorEl.textContent = 'Username already taken'; return; }
      localStorage.setItem('si_user_' + user, JSON.stringify({ password: pass, created: Date.now() }));
      localStorage.setItem('si_current_user', user);
      modal.classList.remove('active');
      enterCharCreate(user);
    }
  });
  document.getElementById('btnGuest').addEventListener('click', () => {
    const guestName = 'Guest' + Math.floor(Math.random() * 9999);
    enterCharCreate(guestName);
  });
}

function enterCharCreate(name) {
  charSelections.name = name;
  document.getElementById('charNameInput').value = name;
  document.getElementById('titleScreen').classList.remove('active');
  document.getElementById('charScreen').classList.add('active');
  stopTitleAnimation();
  gameState = 'charcreate';
  updateCharPreview();
}

function loadRoom(roomId) {
  currentRoom = ROOMS[roomId];

  // Spawn AI players
  aiPlayers = [];
  const aiNames = ['Mira', 'Thorn', 'Luna', 'Finn', 'Aria', 'Zane', 'Ivy', 'Cole', 'Nova', 'Kai'];

  const shirts = ['shirt_blue', 'shirt_red', 'shirt_green', 'dress_pink'];
  const accs = ['none', 'acc_crown', 'acc_glasses', 'acc_wings'];
  const usedNames = [];
  for (let i = 0; i < 5; i++) {
    let n;
    do { n = aiNames[Math.floor(Math.random() * aiNames.length)]; } while (usedNames.includes(n));
    usedNames.push(n);
    aiPlayers.push({
      name: n,
      x: Math.floor(Math.random() * currentRoom.width),
      y: Math.floor(Math.random() * currentRoom.height),
      targetX: null, targetY: null,
      facing: ['s','e','n','w'][Math.floor(Math.random() * 4)],

      animFrame: 0,
      animTimer: 0,
      hair: hairs[Math.floor(Math.random() * hairs.length)],
      shirt: shirts[Math.floor(Math.random() * shirts.length)],
      acc: accs[Math.floor(Math.random() * accs.length)],
      chatText: null,
      chatTimer: 0,
      moveTimer: Math.random() * 3000,

      isLocal: false

  updatePlayerList();

}

// ============================================
// 11. INPUT HANDLING
// ============================================
function initInput() {
  // Keyboard
  window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'Enter' && gameState === 'game') {
      const chatInput = document.getElementById('chatInput');
      if (document.activeElement === chatInput) {
        sendChat();
        chatInput.blur();
      } else {
        chatInput.focus();
      }
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
  });

  // Mouse / touch on canvas
  canvas.addEventListener('mousedown', (e) => {
    mouse.down = true;
    mouse.lastX = e.clientX;
    mouse.lastY = e.clientY;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
  canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (mouse.down && gameState === 'game') {
      const dx = e.clientX - mouse.lastX;
      const dy = e.clientY - mouse.lastY;
      camera.x += dx;
      camera.y += dy;
      mouse.lastX = e.clientX;
      mouse.lastY = e.clientY;
    }
  });
  window.addEventListener('mouseup', () => { mouse.down = false; });

  // Mouse wheel zoom
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (gameState !== 'game') return;
    const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
    const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * zoomFactor));
    camera.zoom = newZoom;
  }, { passive: false });

  // Touch events for mobile
  canvas.addEventListener('touchstart', (e) => {
    if (gameState !== 'game') return;
    if (e.touches.length === 1) {
      mouse.down = true;
      mouse.lastX = e.touches[0].clientX;
      mouse.lastY = e.touches[0].clientY;
      // Tap on floor to move
      const rect = canvas.getBoundingClientRect();
      const tx = e.touches[0].clientX - rect.left;
      const ty = e.touches[0].clientY - rect.top;
      const grid = toGrid(tx, ty);
      if (isValidTile(grid.x, grid.y)) {
        player.targetX = grid.x;
        player.targetY = grid.y;
      }
    } else if (e.touches.length === 2) {
      touchState.pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (gameState !== 'game') return;
    e.preventDefault();
    if (e.touches.length === 1 && mouse.down) {
      const dx = e.touches[0].clientX - mouse.lastX;
      const dy = e.touches[0].clientY - mouse.lastY;
      camera.x += dx;
      camera.y += dy;
      mouse.lastX = e.touches[0].clientX;
      mouse.lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (touchState.pinchDist > 0) {
        const factor = dist / touchState.pinchDist;
        const newZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom * factor));
        camera.zoom = newZoom;
      }
      touchState.pinchDist = dist;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    mouse.down = false;
    touchState.pinchDist = 0;
  });

  // Click on floor to move (desktop)
  canvas.addEventListener('click', (e) => {
    if (gameState !== 'game' || mouse.down) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const grid = toGrid(mx, my);
    if (isValidTile(grid.x, grid.y)) {
      player.targetX = grid.x;
      player.targetY = grid.y;
    }
  });

  // D-pad controls
  document.querySelectorAll('.dpadBtn').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); dpadActive[dir] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); dpadActive[dir] = false; });
    btn.addEventListener('touchcancel', () => { dpadActive[dir] = false; });
    btn.addEventListener('mousedown', () => { dpadActive[dir] = true; });
    btn.addEventListener('mouseup', () => { dpadActive[dir] = false; });
    btn.addEventListener('mouseleave', () => { dpadActive[dir] = false; });
  });

  // Zoom buttons
  document.getElementById('btnZoomIn').addEventListener('click', () => {
    camera.zoom = Math.min(camera.maxZoom, camera.zoom * 1.2);
  });
  document.getElementById('btnZoomOut').addEventListener('click', () => {
    camera.zoom = Math.max(camera.minZoom, camera.zoom * 0.8);
  });

  // UI buttons
  document.getElementById('btnFriends').addEventListener('click', () => {
    sidePanelMode = 'friends';
    sidePanelVisible = !sidePanelVisible;
    updateSidePanel();
  });
  document.getElementById('btnInventory').addEventListener('click', () => {
    sidePanelMode = 'inventory';
    sidePanelVisible = !sidePanelVisible;
    updateSidePanel();
  });
  document.getElementById('btnSettings').addEventListener('click', () => {
    sidePanelMode = 'settings';
    sidePanelVisible = !sidePanelVisible;
    updateSidePanel();
  });
  document.getElementById('btnLogout').addEventListener('click', () => {
    logout();
  });
  document.getElementById('chatBtn').addEventListener('click', sendChat);

  // Character start
  document.getElementById('charStartBtn').addEventListener('click', initGame);

  // Resize
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function isValidTile(x, y) {
  if (!currentRoom) return false;
  return x >= 0 && y >= 0 && x < currentRoom.width && y < currentRoom.height;
}

// ============================================
// 12. CHAT SYSTEM
// ============================================
function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !player) return;
  player.chatText = text;
  player.chatTimer = 4000;
  chatMessages.push({ text: text, from: player.name, time: Date.now(), isSystem: false });
  input.value = '';
  input.blur();
  playChatSound();

  // AI might respond
  if (Math.random() < 0.5) {
    setTimeout(() => {
      if (!currentRoom) return;
      const responder = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
      const replies = ['Interesting!', 'Indeed!', 'Hello there!', 'How are you?', 'Nice to see you!',
        'Tell me more!', 'Fascinating!', 'I agree!', 'Haha!', 'Welcome!'];
      const reply = replies[Math.floor(Math.random() * replies.length)];
      responder.chatText = reply;
      responder.chatTimer = 4000;
      playChatSound();
    }, 1500 + Math.random() * 2000);
  }
}

function updateSidePanel() {
  const panel = document.getElementById('sidePanel');
  const title = document.getElementById('sideTitle');
  const list = document.getElementById('playerList');
  if (!sidePanelVisible) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');

  if (sidePanelMode === 'friends') {
    title.textContent = 'In Room';
    list.innerHTML = '';
    if (player) {
      const li = document.createElement('li');
      li.textContent = player.name + ' (You)';
      li.style.color = '#FFD700';
      list.appendChild(li);
    }
    aiPlayers.forEach(ai => {
      const li = document.createElement('li');
      li.textContent = ai.name;
      list.appendChild(li);
    });
  } else if (sidePanelMode === 'inventory') {
    title.textContent = 'Inventory';
    list.innerHTML = '<li style="color:#a09878;font-style:italic;">Coming soon...</li>';
  } else if (sidePanelMode === 'settings') {
    title.textContent = 'Settings';
    list.innerHTML = '<li style="color:#a09878;">Music: On</li><li style="color:#a09878;">SFX: On</li><li style="color:#a09878;">Tap to move</li>';
  }
}

function updatePlayerList() {
  if (sidePanelVisible && sidePanelMode === 'friends') updateSidePanel();
}

// ============================================
// 13. PLAYER MOVEMENT & AI
// ============================================
function updatePlayer(dt) {
  if (!player || !currentRoom) return;

  // Handle movement input
  let dx = 0, dy = 0;
  if (keys['arrowup'] || keys['w'] || dpadActive['n']) { dy = -1; player.facing = 'n'; }
  if (keys['arrowdown'] || keys['s'] || dpadActive['s']) { dy = 1; player.facing = 's'; }
  if (keys['arrowleft'] || keys['a'] || dpadActive['w']) { dx = -1; player.facing = 'w'; }
  if (keys['arrowright'] || keys['d'] || dpadActive['e']) { dx = 1; player.facing = 'e'; }

  // Target-based movement (click/tap to move)
  if (player.targetX !== null && player.targetY !== null) {
    dx = 0; dy = 0;
    if (player.x < player.targetX) { dx = 1; player.facing = 'e'; }
    else if (player.x > player.targetX) { dx = -1; player.facing = 'w'; }
    else if (player.y < player.targetY) { dy = 1; player.facing = 's'; }
    else if (player.y > player.targetY) { dy = -1; player.facing = 'n'; }
    else { player.targetX = null; player.targetY = null; }
  }

  const moveSpeed = 0.004;
  if (dx !== 0 || dy !== 0) {
    const newX = player.x + dx * moveSpeed * dt;
    const newY = player.y + dy * moveSpeed * dt;
    if (isValidTile(Math.floor(newX), Math.floor(newY))) {
      player.x = newX;
      player.y = newY;
      player.moving = true;
      player.animTimer += dt;
      player.stepTimer += dt;
      if (player.stepTimer > 300) {
        playFootstep();
        player.stepTimer = 0;
      }
      if (player.animTimer > 200) {
        player.animFrame = player.animFrame === 0 ? 1 : 0;
        player.animTimer = 0;
      }
    }
  } else {
    player.moving = false;
    player.animFrame = 0;
  }

  // Check room exits
  const exitDir = getExitAt(player.x, player.y);
  if (exitDir) {
    const nextRoom = currentRoom.exits[exitDir];
    if (nextRoom) {
      loadRoom(nextRoom);
      // Position player at entrance
      if (exitDir === 'north') { player.x = Math.floor(currentRoom.width / 2); player.y = currentRoom.height - 1; }
      else if (exitDir === 'south') { player.x = Math.floor(currentRoom.width / 2); player.y = 0; }
      else if (exitDir === 'east') { player.x = 0; player.y = Math.floor(currentRoom.height / 2); }
      else if (exitDir === 'west') { player.x = currentRoom.width - 1; player.y = Math.floor(currentRoom.height / 2); }
      player.targetX = null;
      player.targetY = null;
      // Show system message
      chatMessages.push({ text: 'Entered ' + currentRoom.name, from: 'System', time: Date.now(), isSystem: true });
    }
  }

  // Update chat timer
  if (player.chatTimer > 0) {
    player.chatTimer -= dt;
    if (player.chatTimer <= 0) player.chatText = null;
  }
}

function getExitAt(x, y) {
  if (!currentRoom || !currentRoom.exits) return null;
  const fx = Math.floor(x), fy = Math.floor(y);
  if (fy < 0 && currentRoom.exits.north) return 'north';
  if (fy >= currentRoom.height && currentRoom.exits.south) return 'south';
  if (fx < 0 && currentRoom.exits.west) return 'west';
  if (fx >= currentRoom.width && currentRoom.exits.east) return 'east';
  // Border tiles count as exits
  if (fy === 0 && currentRoom.exits.north) return 'north';
  if (fy === currentRoom.height - 1 && currentRoom.exits.south) return 'south';
  if (fx === 0 && currentRoom.exits.west) return 'west';
  if (fx === currentRoom.width - 1 && currentRoom.exits.east) return 'east';
  return null;
}

function updateAI(dt) {
  if (!currentRoom) return;
  aiPlayers.forEach(ai => {
    ai.moveTimer -= dt;
    if (ai.moveTimer <= 0) {
      ai.moveTimer = 2000 + Math.random() * 4000;
      if (Math.random() < 0.7) {
        const nx = Math.floor(Math.random() * currentRoom.width);
        const ny = Math.floor(Math.random() * currentRoom.height);
        ai.targetX = nx;
        ai.targetY = ny;
        if (nx > ai.x) ai.facing = 'e';
        else if (nx < ai.x) ai.facing = 'w';
        else if (ny > ai.y) ai.facing = 's';
        else ai.facing = 'n';
      }
    }

    // Move toward target
    if (ai.targetX !== null && ai.targetY !== null) {
      let adx = 0, ady = 0;
      if (ai.x < ai.targetX) adx = 0.003 * dt;
      else if (ai.x > ai.targetX) adx = -0.003 * dt;
      if (ai.y < ai.targetY) ady = 0.003 * dt;
      else if (ai.y > ai.targetY) ady = -0.003 * dt;

      if (Math.abs(adx) < 0.01 && Math.abs(ady) < 0.01) {
        ai.targetX = null; ai.targetY = null; ai.moving = false;
      } else {
        const newX = ai.x + adx;
        const newY = ai.y + ady;
        if (isValidTile(Math.floor(newX), Math.floor(newY))) {
          ai.x = newX; ai.y = newY;
          ai.moving = true;
          ai.animTimer += dt;
          if (ai.animTimer > 200) { ai.animFrame = ai.animFrame === 0 ? 1 : 0; ai.animTimer = 0; }
        }
      }
    } else {
      ai.moving = false;
      ai.animFrame = 0;
    }

    // Chat timer
    if (ai.chatTimer > 0) {
      ai.chatTimer -= dt;
      if (ai.chatTimer <= 0) ai.chatText = null;
    }

    // Random idle chat
    if (!ai.chatText && Math.random() < 0.0003 * dt) {
      const idleChats = ['...', '*looks around*', '*sighs*', 'Nice place!', 'Hello?'];
      ai.chatText = idleChats[Math.floor(Math.random() * idleChats.length)];
      ai.chatTimer = 3000;
    }
  });
}

// ============================================
// 14. RENDERER
// ============================================
function render(timestamp) {
  if (gameState !== 'game' || !currentRoom) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Camera transform
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 3);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(camera.x / camera.zoom, camera.y / camera.zoom);
  // Move back so toIso centering works
  ctx.translate(-canvas.width / 2, -canvas.height / 3);

  const room = currentRoom;
  const rw = room.width;
  const rh = room.height;

  // 1. Floor tiles (back to front for proper depth)
  for (let y = 0; y < rh; y++) {
    for (let x = 0; x < rw; x++) {
      const iso = toIso(x, y);
      const floorImg = IMAGES['tiles/' + room.floor];
      if (floorImg && floorImg.complete) {
        ctx.drawImage(floorImg, iso.x - TILE_W / 2, iso.y - TILE_H / 2, TILE_W, TILE_H);
      }
    }
  }

  // 2. Wall tiles (north and west walls)
  const wallImgN = IMAGES['tiles/' + room.wall];
  const wallH = 48;
  if (wallImgN && wallImgN.complete) {
    // North wall
    for (let x = 0; x < rw; x++) {
      const iso = toIso(x, -0.5);
      ctx.drawImage(wallImgN, iso.x - TILE_W / 2, iso.y - wallH, TILE_W, wallH + TILE_H / 2);
    }
    // West wall
    for (let y = 0; y < rh; y++) {
      const iso = toIso(-0.5, y);
      ctx.drawImage(wallImgN, iso.x - TILE_W / 2, iso.y - wallH, TILE_W, wallH + TILE_H / 2);
    }
  }

  // 3. Collect all renderable objects for Y-sorting
  const renderList = [];

  // Furniture
  room.furniture.forEach(furn => {
    const img = IMAGES['furniture/' + furn.type];
    if (img) {
      renderList.push({ type: 'furniture', x: furn.x, y: furn.y, z: 0, img: img, obj: furn });
    }
  });

  // AI players
  aiPlayers.forEach(ai => {
    renderList.push({ type: 'avatar', x: ai.x, y: ai.y, z: 1, entity: ai });
  });

  // Local player
  if (player) {
    renderList.push({ type: 'avatar', x: player.x, y: player.y, z: 2, entity: player });
  }

  // Y-sort: render from back (low y) to front (high y)
  renderList.sort((a, b) => {
    const ay = a.y + (a.z || 0) * 0.01;
    const by = b.y + (b.z || 0) * 0.01;
    return ay - by;
  });

  // Render sorted objects
  renderList.forEach(item => {
    if (item.type === 'furniture') {
      renderFurniture(item.img, item.x, item.y, item.obj.type);
    } else if (item.type === 'avatar') {
      renderAvatar(item.entity, timestamp);
    }
  });

  // 4. Chat bubbles (render last, on top of everything)
  renderList.forEach(item => {
    if (item.type === 'avatar' && item.entity.chatText) {
      renderChatBubble(item.entity);
    }
  });

  // 5. Exit indicators
  drawExitIndicators();

  ctx.restore();
}

function renderFurniture(img, x, y, type) {
  const iso = toIso(x, y);
  if (!img || !img.complete) return;
  // Furniture sprites are 1:1 but rendered at isometric scale
  const fw = 64, fh = 64;
  let offsetY = 0;
  // Some furniture sits "on" the tile
  if (type === 'rug') offsetY = 0;
  else if (type === 'sofa' || type === 'chair' || type === 'bed') offsetY = -16;
  else if (type === 'table') offsetY = -12;
  else if (type === 'bookshelf') offsetY = -32;
  else if (type === 'lamp') offsetY = -28;
  else if (type === 'plant') offsetY = -8;
  else if (type === 'tv') offsetY = -16;
  else if (type === 'trophy') offsetY = -20;
  else if (type === 'piano') offsetY = -20;
  else if (type === 'fountain') offsetY = -24;

  ctx.drawImage(img, iso.x - fw / 2, iso.y - fh + offsetY, fw, fh);
}

function renderAvatar(entity, timestamp) {
  const iso = toIso(entity.x, entity.y);
  let spriteKey;

  if (entity.moving) {
    spriteKey = 'avatar/walk' + (entity.animFrame + 1) + '_s';
  } else {
    spriteKey = 'avatar/idle_' + entity.facing;
  }

  const sprite = IMAGES[spriteKey];
  const bounce = entity.moving ? 0 : Math.sin(timestamp / 300) * 2;

  if (sprite && sprite.complete) {
    ctx.drawImage(sprite, iso.x - AVATAR_W / 2, iso.y - AVATAR_H + 8 + bounce, AVATAR_W, AVATAR_H);
  }

  // Draw clothing layers
  if (entity.shirt) {
    const shirtImg = IMAGES['clothes/' + entity.shirt];
    if (shirtImg && shirtImg.complete) {
      ctx.drawImage(shirtImg, iso.x - AVATAR_W / 2, iso.y - AVATAR_H + 8 + bounce, AVATAR_W, AVATAR_H);
    }
  }

  // Draw hair
  if (entity.hair) {
    const hairImg = IMAGES['hair/' + entity.hair];
    if (hairImg && hairImg.complete) {
      ctx.drawImage(hairImg, iso.x - AVATAR_W / 2, iso.y - AVATAR_H + 8 + bounce, AVATAR_W, AVATAR_H);
    }
  }

  // Draw accessory
  if (entity.acc && entity.acc !== 'none') {
    const accImg = IMAGES['items/' + entity.acc];
    if (accImg && accImg.complete) {
      ctx.drawImage(accImg, iso.x - AVATAR_W / 2, iso.y - AVATAR_H + 8 + bounce, AVATAR_W, AVATAR_H);
    }
  }
}

function renderChatBubble(entity) {
  const iso = toIso(entity.x, entity.y);
  const text = entity.chatText;
  if (!text) return;

  ctx.save();
  ctx.font = 'bold 12px Georgia, serif';
  const metrics = ctx.measureText(text);
  const padding = 8;
  const bw = metrics.width + padding * 2;
  const bh = 24;
  const bx = iso.x - bw / 2;
  const by = iso.y - AVATAR_H - 12;

  // Bubble background
  ctx.fillStyle = entity.isLocal ? 'rgba(255,250,230,0.95)' : 'rgba(240,240,255,0.95)';
  ctx.strokeStyle = entity.isLocal ? '#FFD700' : '#aaaacc';
  ctx.lineWidth = 1.5;
  roundRect(ctx, bx, by, bw, bh, 8);
  ctx.fill();
  ctx.stroke();

  // Tail
  ctx.beginPath();
  ctx.moveTo(iso.x - 6, by + bh);
  ctx.lineTo(iso.x, by + bh + 6);
  ctx.lineTo(iso.x + 6, by + bh);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Text
  ctx.fillStyle = '#222233';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, iso.x, by + bh / 2 + 1);
  ctx.restore();
}

function drawExitIndicators() {
  if (!currentRoom || !currentRoom.exits) return;
  const exits = currentRoom.exits;
  ctx.save();
  ctx.font = 'bold 11px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (exits.north) {
    for (let x = 0; x < currentRoom.width; x++) {
      const iso = toIso(x, -0.3);
      ctx.fillStyle = 'rgba(255,215,0,0.7)';
      ctx.fillText('EXIT', iso.x, iso.y - 20);
    }
  }
  if (exits.south) {
    for (let x = 0; x < currentRoom.width; x++) {
      const iso = toIso(x, currentRoom.height - 0.7);
      ctx.fillStyle = 'rgba(255,215,0,0.7)';
      ctx.fillText('EXIT', iso.x, iso.y + 8);
    }
  }
  if (exits.east) {
    for (let y = 0; y < currentRoom.height; y++) {
      const iso = toIso(currentRoom.width - 0.7, y);
      ctx.fillStyle = 'rgba(255,215,0,0.7)';
      ctx.fillText('EXIT', iso.x + 10, iso.y);
    }
  }
  if (exits.west) {
    for (let y = 0; y < currentRoom.height; y++) {
      const iso = toIso(-0.3, y);
      ctx.fillStyle = 'rgba(255,215,0,0.7)';
      ctx.fillText('EXIT', iso.x - 10, iso.y);
    }
  }
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// ============================================
// 15. GAME LOOP
// ============================================
function gameLoop(timestamp) {
  if (gameState !== 'game') return;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  updatePlayer(dt);
  updateAI(dt);
  render(timestamp);

  animFrameId = requestAnimationFrame(gameLoop);
}

// ============================================
// 16. LOGOUT / RESET
// ============================================
function logout() {
  gameState = 'title';
  if (animFrameId) cancelAnimationFrame(animFrameId);
  player = null;
  aiPlayers = [];
  currentRoom = null;
  chatMessages = [];
  document.getElementById('gameUI').classList.remove('active');
  document.getElementById('dpad').classList.remove('show');
  document.getElementById('sidePanel').classList.remove('visible');
  document.getElementById('titleScreen').classList.add('active');
  startTitleAnimation();
}

// ============================================
// 17. INITIALIZATION
// ============================================
function init() {
  resizeCanvas();
  initAuth();
  initCharCreator();
  initInput();
  loadAssets();
}

// Start
init();
</script>
