<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Starlight Inn - Virtual World</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
:root {
  --habbo-teal: #0e7c8a;
  --habbo-dark: #073a42;
  --habbo-light: #1a9aaa;
  --habbo-accent: #f4d03f;
  --habbo-bg: #0a3d44;
  --habbo-panel: #0e5a63;
  --habbo-panel-border: #178a99;
  --habbo-text: #ffffff;
  --habbo-text-dim: #a0d8e0;
  --habbo-danger: #e74c3c;
  --habbo-success: #2ecc71;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif; background: var(--habbo-bg); color: var(--habbo-text);
  overflow: hidden; width: 100vw; height: 100vh; user-select: none;
}
#gameCanvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
.ui-overlay { position: absolute; pointer-events: none; top: 0; left: 0; right: 0; bottom: 0; }
.ui-overlay > * { pointer-events: auto; }

#topBar {
  position: absolute; top: 0; left: 0; right: 0; height: 48px;
  background: linear-gradient(180deg, var(--habbo-panel) 0%, var(--habbo-dark) 100%);
  border-bottom: 3px solid var(--habbo-accent); display: flex;
  align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100;
}
#logo { font-size: 20px; font-weight: 800; color: var(--habbo-accent); text-shadow: 2px 2px 0 var(--habbo-dark); letter-spacing: 1px; }
#topBarRight { display: flex; align-items: center; gap: 10px; }
.currency-badge {
  background: var(--habbo-accent); color: var(--habbo-dark); padding: 4px 12px;
  border-radius: 16px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px;
}
.currency-badge::before { content: "\2605"; font-size: 16px; }
.top-btn {
  background: var(--habbo-light); border: 2px solid var(--habbo-panel-border); color: white;
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit;
  font-weight: 600; font-size: 12px; transition: all 0.15s;
}
.top-btn:hover { background: var(--habbo-accent); color: var(--habbo-dark); transform: translateY(-1px); }

#roomInfo { position: absolute; top: 56px; left: 50%; transform: translateX(-50%); background: rgba(14, 92, 101, 0.92); border: 2px solid var(--habbo-accent); border-radius: 8px; padding: 8px 20px; text-align: center; z-index: 90; }
#roomInfo h2 { font-size: 16px; color: var(--habbo-accent); }
#roomInfo p { font-size: 12px; color: var(--habbo-text-dim); }

#toolbar {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 64px;
  background: linear-gradient(0deg, var(--habbo-panel) 0%, var(--habbo-dark) 100%);
  border: 3px solid var(--habbo-panel-border); border-bottom: none;
  border-radius: 16px 16px 0 0; display: flex; align-items: center;
  padding: 0 12px; gap: 6px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
.tool-btn {
  width: 52px; height: 52px; background: var(--habbo-light); border: 2px solid var(--habbo-panel-border);
  border-radius: 10px; color: white; cursor: pointer; font-family: inherit; font-size: 11px;
  font-weight: 700; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; transition: all 0.15s; position: relative;
}
.tool-btn .icon { font-size: 20px; }
.tool-btn:hover { background: var(--habbo-accent); color: var(--habbo-dark); transform: translateY(-4px); }
.tool-btn.active { background: var(--habbo-accent); color: var(--habbo-dark); box-shadow: 0 0 10px rgba(244,208,63,0.5); }

.panel {
  position: absolute; background: var(--habbo-panel); border: 3px solid var(--habbo-panel-border);
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 200;
  display: none; flex-direction: column; overflow: hidden; min-width: 280px;
}
.panel.open { display: flex; }
.panel-header {
  background: linear-gradient(180deg, var(--habbo-light) 0%, var(--habbo-teal) 100%);
  padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid var(--habbo-accent);
}
.panel-title { font-weight: 700; font-size: 15px; }
.panel-close { background: var(--habbo-danger); border: none; color: white; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; line-height: 1; }
.panel-body { padding: 12px; overflow-y: auto; max-height: 60vh; }

#navigatorPanel { top: 60px; left: 12px; width: 320px; }
.room-list { display: flex; flex-direction: column; gap: 6px; }
.room-item { background: rgba(0,0,0,0.2); border: 2px solid transparent; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
.room-item:hover { border-color: var(--habbo-accent); background: rgba(244,208,63,0.1); }
.room-item .room-name { font-weight: 700; font-size: 14px; }
.room-item .room-desc { font-size: 12px; color: var(--habbo-text-dim); margin-top: 2px; }
.room-item .room-meta { font-size: 11px; color: var(--habbo-accent); margin-top: 4px; }

#catalogPanel { top: 60px; right: 12px; width: 360px; }
.catalog-tabs { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; }
.catalog-tab { padding: 5px 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--habbo-panel-border); border-radius: 6px; color: white; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.catalog-tab.active { background: var(--habbo-accent); color: var(--habbo-dark); border-color: var(--habbo-accent); }
.catalog-tab:hover:not(.active) { background: var(--habbo-light); }
.catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.catalog-item { background: rgba(0,0,0,0.2); border: 2px solid var(--habbo-panel-border); border-radius: 8px; padding: 8px; text-align: center; cursor: pointer; transition: all 0.15s; }
.catalog-item:hover { border-color: var(--habbo-accent); transform: scale(1.05); }
.catalog-item .cat-rarity { font-size: 9px; margin-bottom: 2px; letter-spacing: 1px; }
.catalog-item .cat-icon { font-size: 28px; margin-bottom: 4px; }
.catalog-item .cat-name { font-size: 11px; font-weight: 600; }
.catalog-item .cat-price { font-size: 11px; color: var(--habbo-accent); font-weight: 700; }

#inventoryPanel { bottom: 76px; left: 50%; transform: translateX(-50%); width: 520px; }
.inv-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.inv-item { aspect-ratio: 1; background: rgba(0,0,0,0.2); border: 2px solid var(--habbo-panel-border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.15s; position: relative; }
.inv-item:hover { border-color: var(--habbo-accent); background: rgba(244,208,63,0.15); }
.inv-item .inv-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: 700; color: var(--habbo-accent); }

#settingsPanel { top: 60px; right: 50%; transform: translateX(50%); width: 300px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
.setting-row label { font-size: 13px; }
.setting-row input[type="range"] { width: 120px; }
.setting-row select { background: var(--habbo-dark); color: white; border: 1px solid var(--habbo-panel-border); border-radius: 4px; padding: 4px 8px; font-family: inherit; }

#customizePanel { top: 60px; right: 50%; transform: translateX(50%); width: 380px; }
.customize-preview { text-align: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 12px; }
.customize-preview canvas { width: 80px; height: 110px; image-rendering: pixelated; }
.customize-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
.customize-row label { font-size: 12px; font-weight: 600; }
.customize-row input[type="color"] { width: 36px; height: 24px; border: none; border-radius: 4px; cursor: pointer; }
.customize-row select { background: var(--habbo-dark); color: white; border: 1px solid var(--habbo-panel-border); border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px; min-width: 120px; }
.color-presets { display: flex; gap: 4px; }
.color-swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.color-swatch:hover, .color-swatch.active { border-color: var(--habbo-accent); transform: scale(1.15); }
.customize-actions { display: flex; gap: 8px; margin-top: 12px; }
.customize-actions button { flex: 1; padding: 8px; border-radius: 6px; font-family: inherit; font-weight: 700; cursor: pointer; border: none; }
.btn-save { background: var(--habbo-accent); color: var(--habbo-dark); }
.btn-random { background: var(--habbo-light); color: white; border: 1px solid var(--habbo-panel-border); }

#chatBar { position: absolute; bottom: 76px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; z-index: 100; background: linear-gradient(180deg, var(--habbo-panel) 0%, var(--habbo-dark) 100%); padding: 8px 12px; border-radius: 12px; border: 2px solid var(--habbo-panel-border); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
#chatInput { width: 280px; padding: 10px 14px; border: 2px solid var(--habbo-panel-border); border-radius: 8px; background: var(--habbo-dark); color: white; font-family: inherit; font-size: 14px; outline: none; }
#chatInput:focus { border-color: var(--habbo-accent); }
#chatInput::placeholder { color: var(--habbo-text-dim); }
#chatSend { background: var(--habbo-accent); border: none; color: var(--habbo-dark); padding: 10px 16px; border-radius: 8px; font-family: inherit; font-weight: 800; cursor: pointer; font-size: 12px; }
#chatColorBtn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--habbo-panel-border); cursor: pointer; background: #fffde7; transition: transform 0.15s; position: relative; }
#chatColorBtn:hover { transform: scale(1.15); }
.chat-color-popover { position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%) scale(0); background: var(--habbo-panel); border: 2px solid var(--habbo-panel-border); border-radius: 10px; padding: 8px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; z-index: 200; opacity: 0; transition: all 0.15s; pointer-events: none; }
.chat-color-popover.open { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto; }
.chat-color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.1s; }
.chat-color-swatch:hover, .chat-color-swatch.active { border-color: white; transform: scale(1.2); }

#chatPanel { top: 60px; right: 12px; width: 320px; }
.chat-history { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; padding-right: 4px; }
.chat-msg { font-size: 12px; padding: 4px 6px; border-radius: 4px; background: rgba(0,0,0,0.15); }
.chat-msg .msg-name { font-weight: 700; color: var(--habbo-accent); }
.chat-msg .msg-time { font-size: 10px; color: var(--habbo-text-dim); margin-left: 6px; }
.chat-msg .msg-text { color: #fff; }
.chat-msg.whisper { background: rgba(144,202,249,0.15); }
.chat-msg.shout { background: rgba(239,154,154,0.15); }

#typingIndicatorBar { position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--habbo-text-dim); font-style: italic; z-index: 90; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
#typingIndicatorBar.visible { opacity: 1; }

.chat-bubble { position: absolute; background: #fffde7; color: #222; padding: 7px 14px; border-radius: 14px; font-size: 13px; font-weight: 700; max-width: 240px; word-wrap: break-word; box-shadow: 0 3px 10px rgba(0,0,0,0.25); pointer-events: none; z-index: 50; transform: translate(-50%, -100%); margin-top: -16px; animation: bubbleIn 0.18s ease-out; border: 2px solid #e8d44d; line-height: 1.35; }
.chat-bubble::after { content: ""; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: #e8d44d transparent transparent transparent; }
.chat-bubble::before { content: ""; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fffde7 transparent transparent transparent; z-index: 1; }
.chat-bubble.whisper { background: #e3f2fd; border-color: #90caf9; font-size: 12px; font-style: italic; }
.chat-bubble.whisper::after { border-color: #90caf9 transparent transparent transparent; }
.chat-bubble.whisper::before { border-color: #e3f2fd transparent transparent transparent; }
.chat-bubble.shout { background: #ffebee; border-color: #ef9a9a; font-size: 15px; }
.chat-bubble.shout::after { border-color: #ef9a9a transparent transparent transparent; }
.chat-bubble.shout::before { border-color: #ffebee transparent transparent transparent; }
@keyframes bubbleIn { from { opacity: 0; transform: translate(-50%, -85%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -100%) scale(1); } }

#notificationArea { position: absolute; top: 60px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 300; pointer-events: none; }
.notification { background: var(--habbo-panel); border-left: 4px solid var(--habbo-accent); padding: 10px 14px; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); font-size: 13px; font-weight: 600; animation: notifIn 0.3s ease-out; pointer-events: auto; min-width: 200px; }
@keyframes notifIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

#loadingScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--habbo-bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
#loadingScreen.hidden { opacity: 0; pointer-events: none; }
#loadingScreen h1 { font-size: 36px; color: var(--habbo-accent); margin-bottom: 20px; text-shadow: 3px 3px 0 var(--habbo-dark); }
.loader { width: 60px; height: 60px; border: 5px solid var(--habbo-panel-border); border-top-color: var(--habbo-accent); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loadingScreen p { margin-top: 16px; color: var(--habbo-text-dim); font-size: 14px; }

#minimap { position: absolute; top: 60px; right: 12px; width: 140px; height: 140px; background: rgba(7, 58, 66, 0.9); border: 2px solid var(--habbo-panel-border); border-radius: 8px; z-index: 90; display: none; }

/* Friends Panel */
.friend-item { background: rgba(0,0,0,0.15); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
.friend-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.friend-name { font-weight: 700; font-size: 13px; }
.friend-status { font-size: 11px; font-weight: 600; text-transform: uppercase; }
.friend-meta { font-size: 11px; color: var(--habbo-text-dim); margin-bottom: 4px; }
.friend-bar { background: rgba(0,0,0,0.3); border-radius: 2px; height: 4px; }

/* Pet Panel */
.pet-stat { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.pet-stat label { font-size: 11px; width: 70px; color: var(--habbo-text-dim); }
.pet-bar { flex: 1; background: rgba(0,0,0,0.3); border-radius: 4px; height: 8px; overflow: hidden; }
.pet-bar div { height: 100%; border-radius: 4px; transition: width 0.3s; }
.pet-action { flex: 1; padding: 8px; border-radius: 6px; border: none; background: var(--habbo-light); color: white; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.pet-action:hover { background: var(--habbo-accent); color: var(--habbo-dark); }
.pet-adopt-btn { padding: 10px; border-radius: 8px; border: 2px solid var(--habbo-panel-border); background: rgba(0,0,0,0.15); color: white; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; }
.pet-adopt-btn:hover { border-color: var(--habbo-accent); background: rgba(244,208,63,0.1); }

/* Daily Rewards */
.daily-cell { transition: all 0.15s; }
.daily-cell.current { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

/* Room Transition */
#roomTransition { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--habbo-bg); z-index: 500; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }

/* Achievement Unlock Animation */
.achievement-popup { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) scale(0); background: linear-gradient(135deg, var(--habbo-panel), var(--habbo-dark)); border: 3px solid var(--habbo-accent); border-radius: 16px; padding: 16px 28px; z-index: 400; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; animation: achievementPop 0.5s ease-out forwards; }
.achievement-popup .ach-pop-icon { font-size: 36px; margin-bottom: 6px; }
.achievement-popup .ach-pop-title { font-size: 14px; font-weight: 700; color: var(--habbo-accent); }
.achievement-popup .ach-pop-text { font-size: 12px; color: var(--habbo-text-dim); }
@keyframes achievementPop {
  0% { transform: translateX(-50%) scale(0); opacity: 0; }
  60% { transform: translateX(-50%) scale(1.1); opacity: 1; }
  100% { transform: translateX(-50%) scale(1); opacity: 1; }
}

/* Theme List */
.theme-list { display: flex; flex-direction: column; gap: 6px; }

.notif-history { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
.notif-history-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: rgba(0,0,0,0.15); border-radius: 6px; font-size: 12px; }

.gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.lb-tab { padding: 5px 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--habbo-panel-border); border-radius: 6px; color: white; font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer; }
.lb-tab.active { background: var(--habbo-accent); color: var(--habbo-dark); border-color: var(--habbo-accent); }
.gallery-item { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 6px; }

/* NPC Profile */
.npc-profile { position: absolute; background: var(--habbo-panel); border: 2px solid var(--habbo-panel-border); border-radius: 12px; padding: 12px; z-index: 300; box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 180px; animation: popIn 0.2s ease-out; }
.npc-profile-header { display: flex; align-items: center; gap: 10px; }
.npc-profile-close { background: var(--habbo-danger); border: none; color: white; width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-weight: 700; margin-left: auto; }
.npc-action { flex: 1; padding: 6px; border-radius: 6px; border: none; background: var(--habbo-light); color: white; font-family: inherit; font-weight: 700; font-size: 11px; cursor: pointer; }
.npc-action:hover { background: var(--habbo-accent); color: var(--habbo-dark); }
@keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

/* Challenges */
.challenge-item { background: rgba(0,0,0,0.15); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.challenge-item.done { opacity: 0.5; background: rgba(46,204,113,0.1); }
.challenge-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.challenge-name { font-weight: 700; font-size: 13px; }
.challenge-reward { font-size: 12px; color: var(--habbo-accent); font-weight: 700; }
.challenge-desc { font-size: 11px; color: var(--habbo-text-dim); margin-bottom: 6px; }
.challenge-bar { background: rgba(0,0,0,0.3); border-radius: 3px; height: 5px; margin-bottom: 2px; }
.challenge-bar div { height: 100%; background: var(--habbo-accent); border-radius: 3px; transition: width 0.3s; }

/* Shortcuts */
.shortcut-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
.shortcut-key { background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; font-family: monospace; border: 1px solid var(--habbo-panel-border); }
.shortcut-action { color: var(--habbo-text-dim); }

/* Stats */
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 13px; }
.stat-label { color: var(--habbo-text-dim); }
.stat-value { font-weight: 700; color: var(--habbo-accent); }

/* Crafting */
.craft-item { background: rgba(0,0,0,0.15); border-radius: 8px; padding: 10px; margin-bottom: 6px; }
.craft-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.craft-name { font-weight: 700; font-size: 13px; }
.craft-ing { font-size: 11px; color: var(--habbo-text-dim); }
.craft-btn { background: var(--habbo-accent); color: var(--habbo-dark); border: none; padding: 5px 14px; border-radius: 6px; font-weight: 700; font-size: 11px; cursor: pointer; }
.craft-btn:disabled { background: rgba(255,255,255,0.1); color: var(--habbo-text-dim); cursor: not-allowed; }

/* Achievements */
.achieve-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.15); border-radius: 8px; margin-bottom: 6px; opacity: 0.55; }
.achieve-item.unlocked { opacity: 1; background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); }
.achieve-icon { font-size: 24px; width: 32px; text-align: center; }
.achieve-info { flex: 1; }
.achieve-name { font-weight: 700; font-size: 13px; }
.achieve-desc { font-size: 11px; color: var(--habbo-text-dim); margin-bottom: 4px; }
.achieve-bar { background: rgba(0,0,0,0.3); border-radius: 3px; height: 5px; }
.achieve-bar div { height: 100%; background: var(--habbo-accent); border-radius: 3px; transition: width 0.3s; }

  .chat-bubble { font-size: 12px; max-width: 180px; }
  #roomInfo { top: 48px; padding: 6px 14px; }
  #roomInfo h2 { font-size: 14px; }
}

@media (max-width: 480px) {

  .top-btn { padding: 4px 6px; }

  #chatInput { width: 120px; }

                break;
              case "e":
                this.toggleEmoteWheel();
                break;
              case "1":
              case "2":
              case "3":
              case "4":
              case "5":
                this.applyWardrobePreset(parseInt(e.key) - 1);
                break;
              case "escape":
                if (this.photoMode) {
                  this.togglePhotoMode();
                } else {
                  const wheel = document.getElementById("emoteWheel");
                  if (wheel && wheel.style.display === "block") {
                    wheel.style.display = "none";
                    document.getElementById("emoteWheelInner").innerHTML = "";
                  } else {
                    this.uiManager.closeAllPanels();
                  }
                }
                break;
            }
            if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(e.key.toLowerCase())) {
              e.preventDefault();
              this.handleMovementKey(e.key);
            }
          });
          window.addEventListener("keyup", (e) => {
            this.keys[e.key.toLowerCase()] = false;
          });
        }
        handleMovementKey(key) {
          if (!this.player || this.player.isWalking || this.minigame) return;
          let dx = 0, dy = 0;
          const k = key.toLowerCase();
          if (k === "arrowup" || k === "w") {
            dx = 0;
            dy = -1;
          } else if (k === "arrowdown" || k === "s") {
            dx = 0;
            dy = 1;
          } else if (k === "arrowleft" || k === "a") {
            dx = -1;
            dy = 0;
          } else if (k === "arrowright" || k === "d") {
            dx = 1;
            dy = 0;
          }
          if (dx !== 0 || dy !== 0) {
            const tx = Math.round(this.player.x) + dx, ty = Math.round(this.player.y) + dy;
            if (this.room.isWalkable(tx, ty, this.player)) {
              this.player.moveTo(tx, ty, this.room);
              this.statsSystem.inc("stepsWalked");
              this.networkManager.move(this.player.x, this.player.y, this.player.facing);
            }
          }
        }
        handleClick(sx, sy) {
          if (this.minigame) return;
          const now = Date.now();
          const isDoubleClick = this._lastClick && now - this._lastClick.time < 350 && dist(sx, sy, this._lastClick.x, this._lastClick.y) < 15;
          this._lastClick = { time: now, x: sx, y: sy };
          const worldX = sx - this.camera.x, worldY = sy - this.camera.y;
          const iso = screenToIso(worldX, worldY + TILE_H / 2);
          const tx = Math.floor(iso.x), ty = Math.floor(iso.y);
          if (tx < 0 || ty < 0 || tx >= this.room.width || ty >= this.room.height) return;
          if (this.selectedTool === "walk") {
            const treasure = this.treasures.find((t) => Math.floor(t.x) === tx && Math.floor(t.y) === ty);
            if (treasure) {
              this.currencySystem.add(treasure.coins * this.eventSystem.getCoinMultiplier());
              this.spawnParticles(tx, ty, "#f4d03f", 12);
              this.uiManager.showNotification(`Found \u2605${treasure.coins} in a treasure chest!`, "success");
              this.soundManager.play("treasure");
              this.statsSystem.inc("treasureChestsFound");
              this.challengeSystem.track("treasure");
              this.questSystem.track("treasure");
              this.progressionSystem.addXP(25);
              this.treasures = this.treasures.filter((t) => t !== treasure);
              this.achievementSystem.track("walk");
              return;
            }
            const clickedFurniture = this.room.furniture.find((f) => f.occupies(tx, ty));
            if (clickedFurniture && clickedFurniture.type === "jukebox") {
              this.openJukebox();
              return;
            }
            if (clickedFurniture && clickedFurniture.type === "arcade") {
              this.startMinigame(SimonSays);
              return;
            }
            if (clickedFurniture) {
              const interact = this.getFurnitureInteraction(clickedFurniture.type);
              if (interact) {
                this.player.moveTo(tx, ty, this.room);
                setTimeout(() => interact.action(this.player, this), 300);
                return;
              }
            }
            const clickedBot = this.roomBotSystem.getBotAt(tx, ty);
            if (clickedBot) {
              this.uiManager.showBotDialog(clickedBot, this.roomBotSystem.handleDialog(clickedBot));
              return;
            }
            const clickedAvatar = this.room.avatars.find((a) => a !== this.player && Math.round(a.x) === tx && Math.round(a.y) === ty);
            if (clickedAvatar) {
              if (clickedAvatar.isNPC) {
                this.inboxSystem.maybeReceiveRandom();
                this.questSystem.track("talk");
                clickedAvatar.relationship = Math.min(100, clickedAvatar.relationship + 5);
                if (Math.random() < 0.08) {
                  const giftCoins = 10 + Math.floor(Math.random() * 41);
                  this.currencySystem.add(giftCoins);
                  this.uiManager.showNotification(`${clickedAvatar.name} gave you \u2605${giftCoins}!`, "success");
                  this.spawnParticles(tx, ty, "#f4d03f", 8);
                }
                this.uiManager.showNPCProfile(
                  clickedAvatar,
                  () => {
                    this.player.moveTo(tx, ty, this.room);
                    this.achievementSystem.track("walk");
                    this.statsSystem.inc("stepsWalked");
                  },
                  (npc) => this.openNPCTrade(npc)
                );
              } else {
                this.showPlayerProfile(clickedAvatar);
              }
              return;
            }
            if (this.room.isWalkable(tx, ty)) {
              this.player.moveTo(tx, ty, this.room);
              this.networkManager.move(this.player.x, this.player.y, this.player.facing);
              this.achievementSystem.track("walk");
              this.challengeSystem.track("walk");
              this.progressionSystem.addXP(5);
              this.statsSystem.inc("stepsWalked");
              this.spawnParticles(tx, ty, "rgba(244,208,63,0.6)", 5);
              if (isDoubleClick) {
                this.uiManager.showNotification("Double-click walk!", "info");
              }
            }
          } else if (this.selectedTool === "place" && this.selectedInventoryItem) {
            if (this.room.furniture.length >= 30) {
              this.uiManager.showNotification("Room is full! Max 30 furniture items.", "error");
              this.soundManager.play("error");
              return;
            }
            if (this.room.placeFurniture(this.selectedInventoryItem, tx, ty, this.placementRotation)) {
              this.inventorySystem.remove(this.selectedInventoryItem, 1);
              this.spawnParticles(tx, ty, "#2ecc71", 10);
              this.uiManager.showNotification(`Placed ${this.selectedInventoryItem}!`);
              if (this.room.id === "myroom") this.saveMyRoom();
              if (!this.inventorySystem.has(this.selectedInventoryItem)) {
                this.selectedInventoryItem = null;
                this.selectedTool = "walk";
                this.uiManager.updateToolButtons(this.selectedTool);
              }
            } else {
              this.uiManager.showNotification("Cannot place there!", "error");
              this.soundManager.play("error");
            }
          } else if (this.selectedTool === "pick") {
            const removed = this.room.removeFurnitureAt(tx, ty);
            if (removed) {
              this.inventorySystem.add(removed, 1);
              this.spawnParticles(tx, ty, "#e74c3c", 8);
              this.uiManager.showNotification(`Picked up ${removed}`);
              this.soundManager.play("place");
              if (this.room.id === "myroom") this.saveMyRoom();
            }
          }
        }

            { icon: "\u{1F525}", action: () => this.player.say("\u{1F525} Too hot!", this.chatColor, "emote") }
          ];
          inner.innerHTML = "";
          const radius = 65;
          emotes.forEach((emote, i) => {
            const angle = i / emotes.length * Math.PI * 2 - Math.PI / 2;
            const btn = document.createElement("button");
            btn.textContent = emote.icon;
            btn.style.cssText = `position:absolute;width:42px;height:42px;border-radius:50%;border:2px solid var(--habbo-panel-border);background:var(--habbo-panel);color:white;font-size:20px;cursor:pointer;pointer-events:auto;left:50%;top:50%;transform:translate(-50%,-50%) translate(${Math.cos(angle) * radius}px,${Math.sin(angle) * radius}px);transition:transform 0.1s;`;
            btn.addEventListener("mouseenter", () => btn.style.transform = `translate(-50%,-50%) translate(${Math.cos(angle) * radius}px,${Math.sin(angle) * radius}px) scale(1.15)`);
            btn.addEventListener("mouseleave", () => btn.style.transform = `translate(-50%,-50%) translate(${Math.cos(angle) * radius}px,${Math.sin(angle) * radius}px)`);
            btn.addEventListener("click", () => {
              emote.action();
              wheel.style.display = "none";
              inner.innerHTML = "";
            });
            inner.appendChild(btn);
          });
          wheel.style.display = "block";
          setTimeout(() => {
            if (wheel.style.display === "block") {

        renderInventory() {
          this.uiManager.renderInventory(
            this.inventorySystem.getAll(),
            this.selectedInventoryItem,
            (type) => {
              this.selectedInventoryItem = type;
              this.selectedTool = "place";
              this.uiManager.updateToolButtons(this.selectedTool);
              this.renderInventory();
              this.uiManager.showNotification(`Selected ${type} \u2014 click a tile to place`);
            },
            (type) => {
              const item = FURNITURE_CATALOG.find((i) => i.id === type);
              const sellPrice = item ? Math.floor(item.price * 0.5) : 10;
              this.inventorySystem.remove(type, 1);
              this.currencySystem.add(sellPrice);
              this.uiManager.showNotification(`Sold ${type} for \u2605${sellPrice}`, "success");
              this.soundManager.play("buy");
              this.renderInventory();
            },
            () => {
              const items = Object.entries(this.inventorySystem.getAll());
              let total = 0;
              items.forEach(([type, count]) => {
                const item = FURNITURE_CATALOG.find((i) => i.id === type);
                const sellPrice = item ? Math.floor(item.price * 0.5) : 10;
                total += sellPrice * count;
                this.inventorySystem.remove(type, count);
              });
              if (total > 0) {
                this.currencySystem.add(total);
                this.uiManager.showNotification(`Sold everything for \u2605${total}!`, "success");
                this.soundManager.play("buy");
                this.selectedInventoryItem = null;
                this.selectedTool = "walk";
                this.uiManager.updateToolButtons(this.selectedTool);
              }
              this.renderInventory();
            },
            this.favorites,
            (type) => {
              if (this.favorites.has(type)) this.favorites.delete(type);
              else this.favorites.add(type);
              this.saveFavorites();
              this.renderInventory();
            },
            this.inventorySort,
            (sortBy) => {
              this.inventorySort = this.inventorySort === sortBy ? "default" : sortBy;
              this.renderInventory();
            },
            (type) => {
              const item = FURNITURE_CATALOG.find((i) => i.id === type);
              if (!item) return null;
              if (item.price >= 500) return "#f4d03f";
              if (item.price >= 200) return "#e67e22";
              return null;
            }
          );
        }

            const isPlayer = !a.isNPC;
            mmCtx.fillStyle = a.isNPC ? "#e74c3c" : "#2ecc71";
            const radius = isPlayer ? Math.max(scale / 2, 3 + Math.sin(Date.now() / 300) * 1.5) : scale / 3;
            mmCtx.beginPath();
            mmCtx.arc(offX + a.x * scale + scale / 2, offY + a.y * scale + scale / 2, radius, 0, Math.PI * 2);
            mmCtx.fill();
            if (isPlayer) {
              mmCtx.strokeStyle = "#fff";
              mmCtx.lineWidth = 1.5;
              mmCtx.beginPath();
              mmCtx.arc(offX + a.x * scale + scale / 2, offY + a.y * scale + scale / 2, radius + 1, 0, Math.PI * 2);
              mmCtx.stroke();
            }
          });
          if (this.petSystem && this.petSystem.pet && this.player) {
            const petPos = this.petSystem.getPosition(this.player.x, this.player.y);
            mmCtx.fillStyle = "#9b59b6";
            mmCtx.beginPath();
            mmCtx.arc(offX + petPos.x * scale + scale / 2, offY + petPos.y * scale + scale / 2, scale / 3, 0, Math.PI * 2);
            mmCtx.fill();
          }
        }
        startMinigame(MinigameClass) {
          this.uiManager.closeAllPanels();
          this.minigame = new MinigameClass(this);
          this.minigame.start();
          this.achievementSystem.track("minigame");
          this.challengeSystem.track("win");
          this.progressionSystem.addXP(50);
          this.statsSystem.inc("minigamesPlayed");
        }
        endMinigame() {
          if (this.minigame && this.minigame.result === "win") {
            this.achievementSystem.track("win");
            this.questSystem.track("win");
            this.statsSystem.inc("minigamesWon");
          }
          this.minigame = null;
        }
      };
    }
  });
