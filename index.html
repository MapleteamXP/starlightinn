<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Starlight Inn ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #1a1428; --bg-panel: #2a2040; --bg-panel-light: #3a3060;
  --accent-gold: #ffd700; --accent-warm: #ff9f5e; --accent-cozy: #c78d6e;
  --accent-mint: #7dd3c0; --accent-lavender: #b8a9d9;
  --text-main: #f0e6ff; --text-muted: #a090c0;
  --rare: #4fc3f7; --vrare: #ba68c8; --aunique: #ff8a65; --unique: #ffd54f; --ltd: #ff5252;
  --pixel: 'VT323', monospace; --body: 'Nunito', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; image-rendering: pixelated; }
html, body { width:100%; height:100%; background: var(--bg-deep); color: var(--text-main); font-family: var(--body); overflow: hidden; touch-action: none; }

/* LANDING */
#landing { position: fixed; inset:0; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(180deg, #1a1428 0%, #2a1a40 40%, #3a2a50 100%); z-index: 1000;
  transition: opacity 0.8s ease, transform 0.8s ease; }
#landing.hidden { opacity:0; pointer-events:none; transform: scale(1.05); }
.landing-stars { position: absolute; inset:0; overflow: hidden; }
.star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s infinite ease-in-out alternate; }
@keyframes twinkle { 0%{opacity:0.3; transform:scale(1);} 100%{opacity:1; transform:scale(1.5);} }
.landing-logo { font-family: var(--pixel); font-size: clamp(2rem, 6vw, 4rem); color: var(--accent-gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.4), 0 4px 0 #8b6914; letter-spacing: 0.1em; margin-bottom: 0.5rem; z-index: 2; }
.landing-sub { font-size: clamp(0.8rem, 2vw, 1.1rem); color: var(--text-muted); margin-bottom: 2rem; z-index: 2; letter-spacing: 0.05em; }
.landing-card { background: var(--bg-panel); border: 2px solid var(--bg-panel-light); border-radius: 16px;
  padding: 2rem; max-width: 420px; width: 90%; z-index: 2; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.landing-card h2 { font-family: var(--pixel); font-size: 1.5rem; color: var(--accent-warm); margin-bottom: 1rem; text-align: center; }
.landing-input { width: 100%; padding: 0.75rem 1rem; border-radius: 10px; border: 2px solid var(--bg-panel-light);
  background: var(--bg-deep); color: var(--text-main); font-family: var(--body); font-size: 1rem;
  margin-bottom: 1rem; outline: none; transition: border-color 0.2s; }
.landing-input:focus { border-color: var(--accent-gold); }
.btn { display: inline-block; padding: 0.75rem 1.5rem; border-radius: 12px; border: none;
  font-family: var(--body); font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.2s; text-align: center; }
.btn-primary { background: linear-gradient(135deg, var(--accent-gold), var(--accent-warm)); color: #2a1a00;
  width: 100%; box-shadow: 0 4px 15px rgba(255,159,94,0.3); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,159,94,0.4); }
.btn-secondary { background: var(--bg-panel-light); color: var(--text-main); border: 2px solid var(--accent-lavender); }
.btn-secondary:hover { background: var(--accent-lavender); color: var(--bg-deep); }
.landing-footer { margin-top: 2rem; font-size: 0.75rem; color: var(--text-muted); z-index: 2; text-align: center; }

/* GAME */
#game-container { position: fixed; inset:0; display: none; }
#game-container.active { display: block; }
#game-canvas { position: absolute; inset:0; width: 100%; height: 100%; cursor: crosshair; }

.ui-panel { position: absolute; background: rgba(26, 20, 40, 0.92); border: 2px solid var(--bg-panel-light);
  border-radius: 12px; padding: 0.75rem; backdrop-filter: blur(8px); z-index: 100; }
.ui-topbar { top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 1rem; height: 52px; }
.ui-topbar .player-info { display: flex; align-items: center; gap: 0.75rem; }
.ui-topbar .avatar-mini { width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--accent-gold); background: var(--bg-panel); image-rendering: pixelated; }
.ui-topbar .player-name { font-family: var(--pixel); font-size: 1.1rem; color: var(--accent-gold); }
.ui-topbar .player-badges { display: flex; gap: 0.25rem; }
.badge { font-size: 0.7rem; padding: 0.15rem 0.4rem; border-radius: 6px; font-weight: 700; font-family: var(--pixel); }
.badge-rare { background: var(--rare); color: #001; } .badge-vrare { background: var(--vrare); color: #fff; }
.badge-aunique { background: var(--aunique); color: #001; } .badge-unique { background: var(--unique); color: #001; }
.badge-ltd { background: var(--ltd); color: #fff; }
.ui-topbar .actions { display: flex; gap: 0.5rem; }
.ui-btn { width: 38px; height: 38px; border-radius: 10px; border: 2px solid var(--bg-panel-light); background: var(--bg-panel);
  color: var(--text-main); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.ui-btn:hover { border-color: var(--accent-gold); background: var(--bg-panel-light); }
.ui-btn.active { border-color: var(--accent-mint); background: rgba(125,211,192,0.15); }

.ui-dock { bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 0.5rem; padding: 0.5rem; }
.dock-btn { min-width: 64px; padding: 0.4rem 0.6rem; border-radius: 10px; border: 2px solid var(--bg-panel-light);
  background: var(--bg-panel); color: var(--text-main); font-family: var(--pixel); font-size: 0.85rem;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; transition: all 0.2s; }
.dock-btn .icon { font-size: 1.3rem; }
.dock-btn:hover, .dock-btn.active { border-color: var(--accent-gold); background: var(--bg-panel-light); transform: translateY(-3px); }

#chat-panel { bottom: 80px; left: 10px; width: 320px; max-height: 240px; display: flex; flex-direction: column; gap: 0.5rem; }
#chat-messages { flex: 1; overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column; gap: 0.3rem; max-height: 180px; }
.chat-msg { padding: 0.3rem 0.5rem; border-radius: 6px; background: rgba(58,48,96,0.5); }
.chat-msg .chat-name { font-family: var(--pixel); color: var(--accent-warm); font-weight: 700; }
.chat-msg .chat-text { color: var(--text-main); }
.chat-msg.system { background: rgba(255,215,0,0.1); } .chat-msg.system .chat-name { color: var(--accent-gold); }
#chat-input-row { display: flex; gap: 0.4rem; }
#chat-input { flex: 1; padding: 0.4rem 0.6rem; border-radius: 8px; border: 2px solid var(--bg-panel-light);
  background: var(--bg-deep); color: var(--text-main); font-family: var(--body); outline: none; }
#chat-input:focus { border-color: var(--accent-mint); }

#trade-window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 520px;
  max-height: 80vh; display: none; flex-direction: column; z-index: 200; }
#trade-window.active { display: flex; }
.trade-header { display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 0.5rem; border-bottom: 2px solid var(--bg-panel-light); }
.trade-header h3 { font-family: var(--pixel); font-size: 1.2rem; color: var(--accent-gold); }
.trade-columns { display: flex; gap: 1rem; padding: 1rem 0; }
.trade-column { flex: 1; background: var(--bg-deep); border-radius: 10px; padding: 0.75rem; min-height: 200px; }
.trade-column h4 { font-family: var(--pixel); font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.trade-slot { width: 56px; height: 56px; border-radius: 8px; border: 2px dashed var(--bg-panel-light);
  background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 1.5rem; position: relative; transition: all 0.2s; }
.trade-slot:hover { border-color: var(--accent-gold); } .trade-slot.filled { border-style: solid; }
.trade-slot.rare { border-color: var(--rare); box-shadow: 0 0 8px var(--rare); }
.trade-slot.vrare { border-color: var(--vrare); box-shadow: 0 0 8px var(--vrare); }
.trade-slot.aunique { border-color: var(--aunique); box-shadow: 0 0 10px var(--aunique); }
.trade-slot.unique { border-color: var(--unique); box-shadow: 0 0 12px var(--unique); }
.trade-slot.ltd { border-color: var(--ltd); box-shadow: 0 0 14px var(--ltd); animation: ltdPulse 1.5s infinite; }
@keyframes ltdPulse { 0%,100%{box-shadow:0 0 10px var(--ltd);} 50%{box-shadow:0 0 20px var(--ltd);} }
.trade-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
.trade-actions { display: flex; gap: 0.5rem; justify-content: center; padding-top: 0.5rem; }

#inventory-panel { top: 70px; right: 10px; width: 240px; display: none; flex-direction: column; max-height: 70vh; }
#inventory-panel.active { display: flex; }
.inv-header { font-family: var(--pixel); font-size: 1rem; color: var(--accent-gold);
  padding-bottom: 0.5rem; border-bottom: 2px solid var(--bg-panel-light); display: flex; justify-content: space-between; }
.inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; padding-top: 0.5rem; }
.inv-item { width: 48px; height: 48px; border-radius: 8px; border: 2px solid var(--bg-panel-light); background: var(--bg-deep);
  display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem;
  position: relative; transition: all 0.15s; }
.inv-item:hover { transform: scale(1.1); z-index: 10; }
.inv-item.rare { border-color: var(--rare); } .inv-item.vrare { border-color: var(--vrare); }
.inv-item.aunique { border-color: var(--aunique); } .inv-item.unique { border-color: var(--unique); }
.inv-item.ltd { border-color: var(--ltd); animation: ltdPulse 2s infinite; }

#area-selector { top: 70px; left: 10px; width: 200px; display: none; flex-direction: column; }
#area-selector.active { display: flex; }
.area-list { display: flex; flex-direction: column; gap: 0.3rem; padding-top: 0.5rem; }
.area-btn { padding: 0.5rem 0.75rem; border-radius: 8px; border: 2px solid var(--bg-panel-light); background: var(--bg-panel);
  color: var(--text-main); font-family: var(--pixel); font-size: 0.9rem; cursor: pointer;
  display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s; }
.area-btn:hover, .area-btn.active { border-color: var(--accent-mint); background: rgba(125,211,192,0.1); }
.area-btn .area-icon { font-size: 1.2rem; }

#char-select-overlay { position: fixed; inset:0; background: linear-gradient(180deg, #1a1428 0%, #2a2040 100%);
  z-index: 500; display: none; flex-direction: column; align-items: center; padding: 2rem; overflow-y: auto; }
#char-select-overlay.active { display: flex; }
.char-select-title { font-family: var(--pixel); font-size: 2rem; color: var(--accent-gold);
  margin-bottom: 1.5rem; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
.char-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; max-width: 700px; width: 100%; }
.char-card { background: var(--bg-panel); border: 3px solid var(--bg-panel-light); border-radius: 14px;
  padding: 1rem; cursor: pointer; display: flex; flex-direction: column; align-items: center;
  gap: 0.5rem; transition: all 0.25s; }
.char-card:hover { border-color: var(--accent-gold); transform: translateY(-5px); }
.char-card.selected { border-color: var(--accent-mint); background: rgba(125,211,192,0.1); box-shadow: 0 0 20px rgba(125,211,192,0.2); }
.char-canvas { width: 80px; height: 80px; border-radius: 10px; background: var(--bg-deep); image-rendering: pixelated; }
.char-name { font-family: var(--pixel); font-size: 1rem; color: var(--accent-warm); }
.char-desc { font-size: 0.7rem; color: var(--text-muted); text-align: center; }

#toast-container { position: fixed; top: 70px; right: 10px; display: flex; flex-direction: column; gap: 0.4rem; z-index: 300; pointer-events: none; }
.toast { background: var(--bg-panel); border: 2px solid var(--bg-panel-light); border-radius: 10px;
  padding: 0.6rem 1rem; font-size: 0.85rem; color: var(--text-main);
  animation: toastIn 0.4s ease, toastOut 0.4s ease 2.6s forwards; pointer-events: auto; max-width: 260px; }
.toast.success { border-color: var(--accent-mint); } .toast.warning { border-color: var(--accent-warm); }
.toast.rare { border-color: var(--rare); } .toast.vrare { border-color: var(--vrare); } .toast.unique { border-color: var(--unique); }
@keyframes toastIn { from{opacity:0; transform:translateX(30px);} to{opacity:1; transform:translateX(0);} }
@keyframes toastOut { from{opacity:1; transform:translateX(0);} to{opacity:0; transform:translateX(30px);} }

.daily-reward-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
  z-index: 600; animation: fadeIn 0.3s ease; }
.reward-card { background: var(--bg-panel); border: 3px solid var(--accent-gold); border-radius: 20px;
  padding: 2rem; text-align: center; max-width: 320px; animation: popIn 0.4s ease; box-shadow: 0 0 40px rgba(255,215,0,0.2); }
.reward-title { font-family: var(--pixel); font-size: 1.3rem; color: var(--accent-gold); margin-bottom: 1rem; }
.reward-item { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; padding: 1rem;
  border-radius: 12px; background: var(--bg-deep); margin-bottom: 1rem; }
.reward-item .reward-emoji { font-size: 3rem; } .reward-item .reward-name { font-family: var(--pixel); font-size: 1.1rem; color: var(--text-main); }
.reward-item .reward-rarity { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 6px; }
.reward-item.rare .reward-rarity { background: var(--rare); color: #001; } .reward-item.vrare .reward-rarity { background: var(--vrare); color: #fff; }
.reward-item.aunique .reward-rarity { background: var(--aunique); color: #001; } .reward-item.unique .reward-rarity { background: var(--unique); color: #001; }
.reward-item.ltd .reward-rarity { background: var(--ltd); color: #fff; }

#profile-panel { display: none; z-index: 110; position: absolute; top: 70px; left: 50%; transform: translateX(-50%); width: 360px;
  max-height: 70vh; flex-direction: column; background: rgba(26, 20, 40, 0.92); border: 2px solid var(--bg-panel-light);
  border-radius: 12px; padding: 0.75rem; backdrop-filter: blur(8px); }
#profile-panel.active { display: flex; }

@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
@keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }

@media (max-width: 640px) {
  .ui-dock { gap: 0.3rem; } .dock-btn { min-width: 50px; font-size: 0.7rem; }
  #chat-panel { width: calc(100% - 20px); } #trade-window { width: calc(100% - 20px); }
  .trade-columns { flex-direction: column; } #profile-panel { width: calc(100% - 20px) !important; }
  .reward-card { padding: 1.5rem; }
}
</style>
</head>
<body>

<div id="landing">
  <div class="landing-stars" id="landing-stars"></div>
  <div class="landing-logo">✨ STARLIGHT INN ✨</div>
  <div class="landing-sub">A cozy world of islands, trades, and starlit chats</div>
  <div class="landing-card">
    <h2>🌙 Enter the Inn</h2>
    <input type="text" class="landing-input" id="username-input" placeholder="Your name..." maxlength="16" autocomplete="off">
    <button class="btn btn-primary" id="btn-enter" onclick="enterGame()">Enter World</button>
    <div style="margin-top:1rem; text-align:center; font-size:0.75rem; color:var(--text-muted);">No account needed. Your journey begins now.</div>
  </div>
  <div class="landing-footer">Desktop Edition v0.1 · Works offline! · Made with 💜</div>
</div>

<div id="char-select-overlay">
  <div class="char-select-title">Choose Your Starlight</div>
  <div class="char-grid" id="char-grid"></div>
  <div style="margin-top:1.5rem; display:flex; gap:1rem;">
    <button class="btn btn-secondary" onclick="showLanding()">← Back</button>
    <button class="btn btn-primary" style="min-width:160px;" id="btn-confirm-char" onclick="confirmChar()">Let's Go! ✨</button>
  </div>
</div>

<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <div class="ui-panel ui-topbar">
    <div class="player-info">
      <canvas class="avatar-mini" id="avatar-mini" width="36" height="36"></canvas>
      <div>
        <div class="player-name" id="ui-player-name">Guest</div>
        <div class="player-badges" id="ui-badges"><span class="badge badge-rare">R1</span></div>
      </div>
    </div>
    <div class="actions">
      <button class="ui-btn" id="btn-profile" onclick="toggleProfile()" title="Profile">👤</button>
      <button class="ui-btn" id="btn-areas" onclick="toggleAreas()" title="Areas">🗺️</button>
      <button class="ui-btn" id="btn-inventory" onclick="toggleInventory()" title="Inventory">🎒</button>
      <button class="ui-btn" id="btn-trade" onclick="toggleTrade()" title="Trade">💱</button>
      <button class="ui-btn" id="btn-customize" onclick="toggleCustomize()" title="Customize">🎨</button>
      <button class="ui-btn" id="btn-settings" onclick="toggleSettings()" title="Settings">⚙️</button>
      <button class="ui-btn" id="btn-publish" onclick="showPublishModal()" title="Publish Online">🌐</button>
    </div>
  </div>

  <div class="ui-panel" id="area-selector">
    <div class="inv-header">Areas</div>
    <div class="area-list" id="area-list"></div>
  </div>

  <div class="ui-panel" id="inventory-panel">
    <div class="inv-header"><span>🎒 Inventory</span><span style="font-size:0.75rem; color:var(--text-muted);" id="inv-count">0/40</span></div>
    <div class="inv-grid" id="inv-grid"></div>
  </div>

  <div class="ui-panel" id="chat-panel">
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Say something..." maxlength="120" autocomplete="off">
      <button class="ui-btn" onclick="sendChat()">📤</button>
    </div>
  </div>

  <div class="ui-panel" id="trade-window">
    <div class="trade-header"><h3>💱 Trade</h3><button class="ui-btn" onclick="toggleTrade()" style="width:28px;height:28px;">✕</button></div>
    <div class="trade-columns">
      <div class="trade-column"><h4>Your Offer</h4><div class="trade-grid" id="trade-my-slots"></div></div>
      <div class="trade-column"><h4>Their Offer</h4><div class="trade-grid" id="trade-their-slots"></div></div>
    </div>
    <div class="trade-actions">
      <button class="btn btn-secondary" onclick="addItemToTrade()">+ Add Item</button>
      <button class="btn btn-primary" onclick="confirmTrade()">✅ Confirm</button>
      <button class="btn btn-secondary" onclick="cancelTrade()">❌ Cancel</button>
    </div>
  </div>

  <div class="ui-panel ui-dock">
    <button class="dock-btn active" id="dock-hub" onclick="goToArea('hub')"><span class="icon">🏨</span><span>Inn</span></button>
    <button class="dock-btn" id="dock-beach" onclick="goToArea('beach')"><span class="icon">🏖️</span><span>Beach</span></button>
    <button class="dock-btn" id="dock-forest" onclick="goToArea('forest')"><span class="icon">🌲</span><span>Forest</span></button>
    <button class="dock-btn" id="dock-treehouse" onclick="goToArea('treehouse')"><span class="icon">🏡</span><span>Treehouse</span></button>
    <button class="dock-btn" id="dock-park" onclick="goToArea('park')"><span class="icon">🌸</span><span>Park</span></button>
    <button class="dock-btn" id="dock-island" onclick="goToArea('island')"><span class="icon">🏝️</span><span>My Island</span></button>
  </div>

  <div id="toast-container"></div>
  <div id="profile-panel"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STARLIGHT INN — Monolithic Build (single-file deployment)
// ═══════════════════════════════════════════════════════════════

// ─── Data ─────────────────────────────────────────────────────
const PALETTES = {
  skin: ['#f5d0b5','#e8b896','#d4a07a','#c28b65','#a06d4f','#7d5239','#5a3a28','#3d2719'],
  hair: ['#1a1a1a','#4a3018','#8b6914','#c9a227','#e85d75','#7dd3c0','#b8a9d9','#ff9f5e','#ff5252','#4fc3f7'],
  clothes: ['#ff9f5e','#7dd3c0','#b8a9d9','#ffd54f','#ff8a65','#ba68c8','#4fc3f7','#e0e0e0','#ff5252','#2a2040'],
};
const RARITY = {
  common:{name:'Common',color:'#888',glow:null}, rare:{name:'Rare',color:'#4fc3f7',glow:'0 0 6px #4fc3f7'},
  vrare:{name:'Very Rare',color:'#ba68c8',glow:'0 0 8px #ba68c8'}, aunique:{name:'Almost Unique',color:'#ff8a65',glow:'0 0 10px #ff8a65'},
  unique:{name:'Unique',color:'#ffd54f',glow:'0 0 12px #ffd54f'}, ltd:{name:'LTD',color:'#ff5252',glow:'0 0 14px #ff5252'},
};
const CHARACTERS = [
  {id:'catgirl',name:'Neko',desc:'Playful cat ears & soft purr',base:'catgirl',defaultHair:4,defaultSkin:1,defaultOutfit:0,accessories:['cat_ears','tail','bell']},

// ─── Engine ─────────────────────────────────────────────────────
class StarlightEngine {
  constructor(canvasId) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.ctx.imageSmoothingEnabled = false;
    this.state = {
      screen: 'landing', area: 'hub',
      player: { name: 'Guest', charId: null, skinColor: 0, hairColor: 0, outfitColor: 0, x: 0.5, y: 0.7, facing: 'down', moving: false, accessories: [] },
      inventory: this.generateStarterInventory(),
      islandItems: [],
      chatMessages: [
        { name: 'Innkeeper Elara', text: 'Welcome to Starlight Inn, traveler! ✨', system: true },
        { name: 'Surfer Kai', text: 'Catch you at the beach! 🏄', system: false },
      ],
      tradeOffer: [],
      otherOffer: [{ id: 'golden_throne', name: 'Golden Throne', emoji: '👑', rarity: 'unique' }],
      onlinePlayers: [
        { name: 'NekoStar', x: 0.3, y: 0.5, charId: 'catgirl', skinColor: 1, hairColor: 4, outfitColor: 0 },
        { name: 'RastaVibes', x: 0.7, y: 0.4, charId: 'rasta', skinColor: 4, hairColor: 2, outfitColor: 5 },
        { name: 'LunaMage', x: 0.5, y: 0.3, charId: 'mage', skinColor: 0, hairColor: 6, outfitColor: 3 },
      ],
      selectedChar: null, areaSelectorOpen: false, inventoryOpen: false, tradeOpen: false,
      customizeOpen: false, settingsOpen: false, frameCount: 0, lastTime: 0,
      keys: {}, mouse: { x: 0, y: 0, down: false }, camera: { x: 0, y: 0 },
      particles: [],
    };
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.setupInput();
    this.populateCharSelect();
    this.populateAreaList();
    this.populateInventory();
    this.populateTradeSlots();
    this.startBotChat();
    this.startLoop();
  }
  resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; this.W = this.canvas.width; this.H = this.canvas.height; }
  setupInput() {
    window.addEventListener('keydown', (e) => { this.state.keys[e.key.toLowerCase()] = true;
      if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d'].includes(e.key.toLowerCase())) e.preventDefault(); });
    window.addEventListener('keyup', (e) => this.state.keys[e.key.toLowerCase()] = false);
    this.canvas.addEventListener('mousemove', (e) => { const rect = this.canvas.getBoundingClientRect(); this.state.mouse.x = e.clientX - rect.left; this.state.mouse.y = e.clientY - rect.top; });
    this.canvas.addEventListener('mousedown', () => this.state.mouse.down = true);
    this.canvas.addEventListener('mouseup', () => this.state.mouse.down = false);
  }
  generateStarterInventory() {
    const items = [];
    for (let i = 0; i < 8; i++) { const item = { ...ITEMS[Math.floor(Math.random() * ITEMS.length)] }; item.uid = `item_${Date.now()}_${i}`; items.push(item); }
    return items;
  }

  enterGame() {
    const name = document.getElementById('username-input').value.trim();
    if (!name) { this.toast('Please enter your name first!', 'warning'); return; }
    this.state.player.name = name;
    document.getElementById('ui-player-name').textContent = name;
    document.getElementById('landing').classList.add('hidden');
    document.getElementById('char-select-overlay').classList.add('active');
    this.state.screen = 'charselect';
  }
  showLanding() { document.getElementById('landing').classList.remove('hidden'); document.getElementById('char-select-overlay').classList.remove('active'); this.state.screen = 'landing'; }
  confirmChar() {
    if (this.state.selectedChar === null) { this.toast('Select a character first!', 'warning'); return; }
    const char = CHARACTERS[this.state.selectedChar];
    this.state.player.charId = char.id;
    this.state.player.skinColor = char.defaultSkin;
    this.state.player.hairColor = char.defaultHair;
    this.state.player.outfitColor = char.defaultOutfit;
    this.state.player.accessories = [...char.accessories];
    document.getElementById('char-select-overlay').classList.remove('active');
    document.getElementById('game-container').classList.add('active');
    this.state.screen = 'game';
    this.toast(`Welcome to Starlight Inn, ${this.state.player.name}! ✨`, 'success');
    this.drawMiniAvatar();
    this.showDailyReward();
  }

  populateCharSelect() {
    const grid = document.getElementById('char-grid');
    CHARACTERS.forEach((char, idx) => {
      const card = document.createElement('div'); card.className = 'char-card'; card.dataset.idx = idx;
      card.innerHTML = `<canvas class="char-canvas" id="char-preview-${idx}" width="80" height="80"></canvas><div class="char-name">${char.name}</div><div class="char-desc">${char.desc}</div>`;
      card.addEventListener('click', () => this.selectChar(idx));
      grid.appendChild(card);
      setTimeout(() => this.drawCharPreview(idx, char), 50);
    });
  }
  selectChar(idx) { document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected')); document.querySelector(`.char-card[data-idx="${idx}"]`).classList.add('selected'); this.state.selectedChar = idx; }

  populateAreaList() {
    const list = document.getElementById('area-list');
    Object.entries(AREAS).forEach(([key, area]) => {
      const btn = document.createElement('button'); btn.className = 'area-btn'; btn.dataset.area = key;
      btn.innerHTML = `<span class="area-icon">${area.emoji}</span><span>${area.name}</span>`;
      btn.addEventListener('click', () => this.goToArea(key));
      list.appendChild(btn);
    });
  }
  goToArea(areaId) {
    if (!AREAS[areaId]) return;
    this.state.area = areaId;
    this.state.areaSelectorOpen = false;
    document.getElementById('area-selector').classList.remove('active');
    this.state.player.x = 0.5; this.state.player.y = areaId === 'island' ? 0.5 : 0.7;
    document.querySelectorAll('.dock-btn').forEach(b => b.classList.remove('active'));
    const dockBtn = document.getElementById(`dock-${areaId}`);
    if (dockBtn) dockBtn.classList.add('active');
    this.toast(`Arrived at ${AREAS[areaId].name} ${AREAS[areaId].emoji}`, 'success');
  }
  toggleAreas() { this.state.areaSelectorOpen = !this.state.areaSelectorOpen; document.getElementById('area-selector').classList.toggle('active', this.state.areaSelectorOpen); }

  populateInventory() { this.renderInventory(); }
  renderInventory() {
    const grid = document.getElementById('inv-grid'); grid.innerHTML = '';
    this.state.inventory.forEach((item) => {
      const el = document.createElement('div'); el.className = `inv-item ${item.rarity}`; el.innerHTML = item.emoji;
      el.title = `${item.name} [${RARITY[item.rarity].name}]`;
      el.addEventListener('click', () => this.toast(`${item.name} — ${RARITY[item.rarity].name}`, item.rarity));
      grid.appendChild(el);
    });
    document.getElementById('inv-count').textContent = `${this.state.inventory.length}/40`;
  }
  toggleInventory() { this.state.inventoryOpen = !this.state.inventoryOpen; document.getElementById('inventory-panel').classList.toggle('active', this.state.inventoryOpen); }

  populateTradeSlots() {
    const myGrid = document.getElementById('trade-my-slots'); const theirGrid = document.getElementById('trade-their-slots');
    for (let i = 0; i < 8; i++) { myGrid.appendChild(document.createElement('div')).className = 'trade-slot'; }
    for (let i = 0; i < 8; i++) { theirGrid.appendChild(document.createElement('div')).className = 'trade-slot'; }
  }
  toggleTrade() { this.state.tradeOpen = !this.state.tradeOpen; document.getElementById('trade-window').classList.toggle('active', this.state.tradeOpen); if (this.state.tradeOpen) this.renderTrade(); }
  renderTrade() {
    document.querySelectorAll('#trade-my-slots .trade-slot').forEach((slot, i) => {
      slot.className = 'trade-slot'; slot.innerHTML = '';
      if (this.state.tradeOffer[i]) { slot.classList.add('filled', this.state.tradeOffer[i].rarity); slot.innerHTML = this.state.tradeOffer[i].emoji; }
    });
    document.querySelectorAll('#trade-their-slots .trade-slot').forEach((slot, i) => {
      slot.className = 'trade-slot'; slot.innerHTML = '';
      if (this.state.otherOffer[i]) { slot.classList.add('filled', this.state.otherOffer[i].rarity); slot.innerHTML = this.state.otherOffer[i].emoji; }
    });
  }
  addItemToTrade() {
    if (this.state.inventory.length === 0) { this.toast('Your inventory is empty!', 'warning'); return; }
    const item = this.state.inventory.pop(); this.state.tradeOffer.push(item); this.renderInventory(); this.renderTrade(); this.toast(`Added ${item.name} to trade`, item.rarity);
  }
  confirmTrade() {
    if (this.state.tradeOffer.length === 0) { this.toast('Add items to your offer first!', 'warning'); return; }
    const received = [...this.state.otherOffer]; this.state.inventory.push(...received); this.state.tradeOffer = []; this.state.otherOffer = [];
    this.renderInventory(); this.renderTrade(); this.toggleTrade(); this.toast('Trade complete! 🎉 Check your inventory.', 'success');
  }
  cancelTrade() { this.state.inventory.push(...this.state.tradeOffer); this.state.tradeOffer = []; this.renderInventory(); this.renderTrade(); this.toggleTrade(); }

  sendChat() {
    const input = document.getElementById('chat-input'); const text = input.value.trim(); if (!text) return;
    this.state.chatMessages.push({ name: this.state.player.name, text, system: false }); input.value = '';
    this.renderChat(); this.scrollChat();
  }
  renderChat() {
    const container = document.getElementById('chat-messages'); container.innerHTML = '';
    this.state.chatMessages.slice(-30).forEach(msg => {
      const div = document.createElement('div'); div.className = `chat-msg ${msg.system ? 'system' : ''}`;
      div.innerHTML = `<span class="chat-name">${msg.name}:</span> <span class="chat-text">${this.escapeHtml(msg.text)}</span>`;
      container.appendChild(div);
    });
  }
  scrollChat() { document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight; }
  escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

  toggleCustomize() { this.toast('Character customization coming in next update! 🎨', 'warning'); }
  toggleSettings() { this.toast('Settings panel coming soon! ⚙️', 'warning'); }
  toggleProfile() {
    let panel = document.getElementById('profile-panel');
    if (!panel.innerHTML) {
      panel.innerHTML = `
        <div class="inv-header"><span>👤 ${this.state.player.name}</span><span style="font-size:0.75rem;color:var(--text-muted);">Lvl 1</span></div>
        <div style="padding:1rem 0;display:flex;flex-direction:column;gap:0.75rem;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;font-size:0.85rem;">
            <div style="background:var(--bg-deep);padding:0.5rem;border-radius:8px;"><div style="color:var(--text-muted);font-size:0.7rem;">Items</div><div>${this.state.inventory.length}</div></div>
            <div style="background:var(--bg-deep);padding:0.5rem;border-radius:8px;"><div style="color:var(--text-muted);font-size:0.7rem;">Area</div><div>${this.state.area}</div></div>
          </div>
        </div>`;
    }
    panel.classList.toggle('active');
  }

  toast(message, type = '') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = message;
    container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
  }

  showDailyReward() {
    const rewards = [
      { day: 1, item: { id: 'star_cookie', name: 'Star Cookie', emoji: '🍪', rarity: 'common', type: 'consumable' } },
      { day: 2, item: { id: 'moon_lantern', name: 'Moon Lantern', emoji: '🏮', rarity: 'rare', type: 'furniture' } },
    ];
    const reward = rewards[0];
    const div = document.createElement('div'); div.className = 'daily-reward-popup';
    div.innerHTML = `<div class="reward-card"><div class="reward-title">✨ Day ${reward.day} Reward ✨</div><div class="reward-item ${reward.item.rarity}"><span class="reward-emoji">${reward.item.emoji}</span><span class="reward-name">${reward.item.name}</span><span class="reward-rarity">${reward.item.rarity.toUpperCase()}</span></div><button class="btn btn-primary" id="claim-reward">Claim</button></div>`;
    document.body.appendChild(div);
    document.getElementById('claim-reward').addEventListener('click', () => {
      this.state.inventory.push({ ...reward.item, uid: `daily_${Date.now()}` }); this.renderInventory();
      this.toast(`Claimed ${reward.item.name}! 🎉`, 'success'); div.remove();
    });
  }

  startBotChat() {
    const bots = [
      { name: 'NekoStar', responses: ['mew~ anyone wanna trade? 🐱', 'just found a rare lamp!', 'the treehouse is so cozy'] },
      { name: 'RastaVibes', responses: ['chill vibes only 🌿', 'the sunset here is beautiful mon', 'peace and love friends'] },
      { name: 'LunaMage', responses: ['the stars align tonight ✨', 'I sense rare items in the forest...', 'any mages online?'] },
    ];
    setInterval(() => {
      if (this.state.screen !== 'game') return; if (Math.random() > 0.3) return;
      const bot = bots[Math.floor(Math.random() * bots.length)];
      const msg = bot.responses[Math.floor(Math.random() * bot.responses.length)];
      this.state.chatMessages.push({ name: bot.name, text: msg, system: false });
      if (this.state.chatMessages.length > 50) this.state.chatMessages.shift();
      this.renderChat(); this.scrollChat();
    }, 8000);
  }

  drawCharPreview(idx, char) {
    const canvas = document.getElementById(`char-preview-${idx}`); if (!canvas) return;
    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, 80, 80);
    this.drawAvatar(ctx, 40, 50, 1.2, char.base, char.defaultSkin, char.defaultHair, char.defaultOutfit, char.accessories);
  }
  drawMiniAvatar() {
    const canvas = document.getElementById('avatar-mini'); if (!canvas) return;
    const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, 36, 36);
    const char = CHARACTERS.find(c => c.id === this.state.player.charId) || CHARACTERS[0];
    this.drawAvatar(ctx, 18, 24, 0.5, char.base, this.state.player.skinColor, this.state.player.hairColor, this.state.player.outfitColor, this.state.player.accessories);
  }
  drawAvatar(ctx, cx, cy, scale, base, skinIdx, hairIdx, outfitIdx, accessories = []) {
    const skin = PALETTES.skin[skinIdx % PALETTES.skin.length];
    const hair = PALETTES.hair[hairIdx % PALETTES.hair.length];
    const outfit = PALETTES.clothes[outfitIdx % PALETTES.clothes.length];
    const s = scale * 4; // Scale up 4x for chibi proportions
    
    // Use SpriteForge-style pixel-perfect drawing
    ctx.save(); ctx.translate(cx, cy);
    ctx.imageSmoothingEnabled = false;
    
    // ─── DRAW PROPER CHIBI SPRITE (32×48 grid, scaled) ───────────
    
    // 1. LEGS (behind everything)
    ctx.fillStyle = skin;
    ctx.fillRect(-2*s, 14*s, 3*s, 8*s); // left leg
    ctx.fillRect(1*s, 14*s, 3*s, 8*s);  // right leg
    
    // 2. FEET
    ctx.fillStyle = '#3d2719';
    ctx.fillRect(-3*s, 22*s, 4*s, 2*s);
    ctx.fillRect(1*s, 22*s, 4*s, 2*s);
    
    // 3. TORSO (outfit)
    ctx.fillStyle = outfit;
    ctx.fillRect(-3*s, 8*s, 8*s, 8*s); // main torso
    ctx.fillRect(-2*s, 16*s, 6*s, 2*s); // hem
    
    // 4. ARMS
    ctx.fillStyle = skin;
    ctx.fillRect(-5*s, 9*s, 2*s, 7*s);  // left arm
    ctx.fillRect(5*s, 9*s, 2*s, 7*s);   // right arm
    
    // 5. HANDS
    ctx.fillStyle = skin;
    ctx.fillRect(-6*s, 16*s, 3*s, 2*s);
    ctx.fillRect(5*s, 16*s, 3*s, 2*s);
    
    // 6. HEAD (oversized chibi! 60% of sprite)
    ctx.fillStyle = skin;
    ctx.fillRect(-6*s, -8*s, 14*s, 14*s); // main head block
    // Round corners for circle feel
    ctx.clearRect(-6*s, -8*s, 2*s, 2*s);
    ctx.clearRect(6*s, -8*s, 2*s, 2*s);
    ctx.fillRect(-5*s, -7*s, 12*s, 13*s);
    
    // 7. FACE (highlight area)
    ctx.fillStyle = lightenColor(skin, 10);
    ctx.fillRect(-4*s, -6*s, 10*s, 10*s);
    
    // 8. EYES (large, expressive — signature chibi feature)
    // Sclera (white)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-3*s, -2*s, 3*s, 3*s);  // left eye
    ctx.fillRect(2*s, -2*s, 3*s, 3*s);   // right eye
    
    // Pupils (dark, slightly offset down-right for cuteness)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-2*s, -1*s, 2*s, 2*s);
    ctx.fillRect(3*s, -1*s, 2*s, 2*s);
    
    // Highlights (1×1 sparkle)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-2*s, -1*s, 1*s, 1*s);
    ctx.fillRect(3*s, -1*s, 1*s, 1*s);
    
    // 9. BLUSH (soft pink under eyes)
    ctx.fillStyle = 'rgba(255,150,150,0.5)';
    ctx.fillRect(-4*s, 2*s, 3*s, 1*s);
    ctx.fillRect(3*s, 2*s, 3*s, 1*s);
    
    // 10. MOUTH (tiny, happy)
    ctx.fillStyle = '#a06060';
    ctx.fillRect(-1*s, 3*s, 2*s, 1*s);
    
    // 11. HAIR (style varies by character)
    ctx.fillStyle = hair;
    
    if (base === 'catgirl') {
      // Twintails + cat ears
      ctx.fillRect(-8*s, -10*s, 6*s, 8*s);  // left tail base
      ctx.fillRect(8*s, -10*s, 6*s, 8*s);   // right tail base
      ctx.fillRect(-10*s, -6*s, 6*s, 18*s); // left tail flow
      ctx.fillRect(10*s, -6*s, 6*s, 18*s);  // right tail flow
      ctx.fillRect(-4*s, -10*s, 10*s, 6*s); // bangs
      ctx.fillStyle = hairShadow(hair, 20); // shadow
      ctx.fillRect(-4*s, 4*s, 14*s, 2*s);
      // Cat ears
      ctx.fillStyle = hair;
      ctx.fillRect(-7*s, -14*s, 5*s, 6*s);
      ctx.fillRect(6*s, -14*s, 5*s, 6*s);
      ctx.fillStyle = '#ffb7c5'; // inner ear
      ctx.fillRect(-6*s, -12*s, 3*s, 3*s);
      ctx.fillRect(7*s, -12*s, 3*s, 3*s);
    } else if (base === 'human') {
      // Standard hair with variations by hairIdx
      if (hairIdx % 3 === 0) {
        // Long flowing
        ctx.fillRect(-7*s, -10*s, 6*s, 22*s);
        ctx.fillRect(9*s, -10*s, 6*s, 22*s);
        ctx.fillRect(-5*s, -10*s, 18*s, 6*s);
      } else if (hairIdx % 3 === 1) {
        // Short spiky
        ctx.fillRect(-5*s, -11*s, 8*s, 5*s);
        ctx.fillRect(5*s, -11*s, 8*s, 5*s);
        ctx.fillRect(-3*s, -12*s, 10*s, 5*s);
      } else {
        // Medium wavy
        ctx.fillRect(-6*s, -10*s, 18*s, 5*s);
        ctx.fillRect(-4*s, -8*s, 5*s, 12*s);
        ctx.fillRect(11*s, -8*s, 5*s, 12*s);
      }
      // Hair shadow
      ctx.fillStyle = hairShadow(hair, 20);
      ctx.fillRect(-4*s, 4*s, 14*s, 2*s);
    } else if (base === 'bunny') {
      // Bunny ears
      ctx.fillStyle = hair;
      ctx.fillRect(-4*s, -22*s, 4*s, 20*s);
      ctx.fillRect(8*s, -22*s, 4*s, 20*s);
      ctx.fillStyle = '#ffb7c5'; // inner ear
      ctx.fillRect(-3*s, -20*s, 2*s, 16*s);
      ctx.fillRect(9*s, -20*s, 2*s, 16*s);
      // Head fluff
      ctx.fillStyle = hair;
      ctx.fillRect(-4*s, -8*s, 16*s, 8*s);
    } else if (base === 'robot') {
      // Dome + antenna
      ctx.fillStyle = '#888888';
      ctx.fillRect(-4*s, -10*s, 16*s, 12*s);
      ctx.fillStyle = '#1a1a2e'; // face screen
      ctx.fillRect(-2*s, -6*s, 12*s, 8*s);
      ctx.fillStyle = '#4fc3f7'; // screen eyes
      ctx.fillRect(0, -3*s, 2*s, 2*s);
      ctx.fillRect(5*s, -3*s, 2*s, 2*s);
      ctx.fillStyle = '#7dd3c0'; // screen mouth
      ctx.fillRect(2*s, 0, 4*s, 1*s);
      // Antenna
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(5*s, -16*s, 2*s, 8*s);
      ctx.fillRect(4*s, -18*s, 4*s, 3*s);
    }
    
    // 12. ACCESSORIES
    accessories.forEach(acc => {
      if (acc === 'sunglasses') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-4*s, -2*s, 4*s, 3*s);
        ctx.fillRect(3*s, -2*s, 4*s, 3*s);
        ctx.fillRect(0, -1*s, 3*s, 1*s);
      }
      if (acc === 'headband') {
        ctx.fillStyle = '#4a3018';
        ctx.fillRect(-5*s, -9*s, 16*s, 2*s);
      }
      if (acc === 'witch_hat') {
        ctx.fillStyle = '#2a2040';
        ctx.fillRect(-2*s, -18*s, 10*s, 14*s);
        ctx.fillRect(-6*s, -6*s, 18*s, 3*s);
        ctx.fillStyle = '#b8a9d9';
        ctx.fillRect(2*s, -10*s, 4*s, 2*s);
      }
      if (acc === 'staff') {
        ctx.fillStyle = '#8b6914';
        ctx.fillRect(8*s, 4*s, 2*s, 20*s);
        ctx.fillStyle = '#4fc3f7';
        ctx.fillRect(7*s, 0, 4*s, 4*s);
      }
      if (acc === 'cape') {
        ctx.fillStyle = '#b8a9d9';
        ctx.fillRect(-4*s, 8*s, 16*s, 16*s);
      }
      if (acc === 'pirate_hat') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-4*s, -14*s, 16*s, 8*s);
        ctx.fillRect(-8*s, -8*s, 24*s, 3*s);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(2*s, -10*s, 4*s, 2*s);
      }
      if (acc === 'eyepatch') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(3*s, -2*s, 4*s, 3*s);
      }
      if (acc === 'carrot') {
        ctx.fillStyle = '#ff9f5e';
        ctx.fillRect(8*s, 12*s, 3*s, 8*s);
        ctx.fillStyle = '#7dd3c0';
        ctx.fillRect(8*s, 8*s, 3*s, 4*s);
      }
    });
    
    // 13. OUTLINE (subtle dark edge for pop)
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5 * s;
    ctx.strokeRect(-6*s, -8*s, 14*s, 30*s);
    
    ctx.restore();
  }

  startLoop() {
    const loop = (timestamp) => { this.update(timestamp); this.render(); requestAnimationFrame(loop); };
    requestAnimationFrame(loop);
  }
  update(timestamp) {
    if (this.state.screen !== 'game') return;
    const dt = (timestamp - this.state.lastTime) / 1000; this.state.lastTime = timestamp; this.state.frameCount++;
    const speed = 0.35; let dx = 0, dy = 0;
    if (this.state.keys['w'] || this.state.keys['arrowup']) dy -= speed;
    if (this.state.keys['s'] || this.state.keys['arrowdown']) dy += speed;
    if (this.state.keys['a'] || this.state.keys['arrowleft']) dx -= speed;
    if (this.state.keys['d'] || this.state.keys['arrowright']) dx += speed;
    if (dx !== 0 || dy !== 0) {
      this.state.player.x = Math.max(0.02, Math.min(0.98, this.state.player.x + dx * dt));
      this.state.player.y = Math.max(0.02, Math.min(0.98, this.state.player.y + dy * dt));
      this.state.player.moving = true;
      if (dx > 0) this.state.player.facing = 'right'; else if (dx < 0) this.state.player.facing = 'left'; else if (dy < 0) this.state.player.facing = 'up'; else this.state.player.facing = 'down';
    } else { this.state.player.moving = false; }
    this.state.onlinePlayers.forEach(p => {
      if (Math.random() < 0.01) { p.tx = Math.max(0.1, Math.min(0.9, p.x + (Math.random() - 0.5) * 0.3)); p.ty = Math.max(0.1, Math.min(0.9, p.y + (Math.random() - 0.5) * 0.3)); }
      if (p.tx != null) { p.x += (p.tx - p.x) * 0.02; p.y += (p.ty - p.y) * 0.02; if (Math.abs(p.tx - p.x) < 0.01) p.tx = null; }
    });
    if (Math.random() < 0.05) {
      this.state.particles.push({ x: Math.random() * this.W, y: Math.random() * this.H, vx: (Math.random() - 0.5) * 0.5, vy: -Math.random() * 1,
        life: 1, color: Math.random() > 0.5 ? '#ffd700' : '#b8a9d9', size: Math.random() * 2 + 1 });
    }
    this.state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.008; });
    this.state.particles = this.state.particles.filter(p => p.life > 0);
  }
  render() {
    if (this.state.screen !== 'game') return;
    const ctx = this.ctx; const W = this.W; const H = this.H; const area = AREAS[this.state.area];
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = area.bg; ctx.fillRect(0, 0, W, H);
    const groundY = H * 0.35; ctx.fillStyle = area.floorColor; ctx.fillRect(0, groundY, W, H - groundY);
    ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1; const gridSize = 40;
    for (let x = 0; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, groundY); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = groundY; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
    ctx.font = '16px "VT323", monospace'; ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillText(`${area.emoji} ${area.name}`, 20, H - 80);
    area.decorations.forEach(d => {
      const x = d.x * W; const y = groundY + (d.y * (H - groundY)) * 0.7;
      ctx.font = '28px serif'; ctx.textAlign = 'center'; ctx.globalAlpha = 0.7; ctx.fillText(d.emoji, x, y); ctx.globalAlpha = 1;
    });
    area.npcs.forEach(npc => {
      const x = npc.x * W; const y = groundY + (npc.y * (H - groundY)) * 0.8;
      ctx.font = '32px serif'; ctx.textAlign = 'center'; ctx.fillText(npc.emoji, x, y);
      ctx.font = '12px "Nunito", sans-serif'; ctx.fillStyle = npc.color; ctx.fillText(npc.name, x, y + 20);
    });
    this.state.onlinePlayers.forEach(p => {
      const char = CHARACTERS.find(c => c.id === p.charId) || CHARACTERS[0];
      const px = p.x * W; const py = groundY + (p.y * (H - groundY)) * 0.8;
      this.drawAvatar(ctx, px, py, 0.8, char.base, p.skinColor, p.hairColor, p.outfitColor, char.accessories);
      ctx.font = '11px "Nunito", sans-serif'; ctx.fillStyle = '#b8a9d9'; ctx.textAlign = 'center'; ctx.fillText(p.name, px, py + 28);
    });
    const px = this.state.player.x * W; const py = groundY + (this.state.player.y * (H - groundY)) * 0.8;
    const char = CHARACTERS.find(c => c.id === this.state.player.charId) || CHARACTERS[0];
    const bob = this.state.player.moving ? Math.sin(this.state.frameCount * 0.15) * 2 : 0;
    this.drawAvatar(ctx, px, py + bob, 1.0, char.base, this.state.player.skinColor, this.state.player.hairColor, this.state.player.outfitColor, this.state.player.accessories);
    ctx.font = 'bold 13px "Nunito", sans-serif'; ctx.fillStyle = '#ffd700'; ctx.textAlign = 'center'; ctx.fillText(this.state.player.name, px, py + 36);
    ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, py + 4, 22, 0, Math.PI * 2); ctx.stroke();
    if (this.state.area === 'island') {
      this.state.islandItems.forEach(item => {
        const ix = item.x * W; const iy = groundY + (item.y * (H - groundY)) * 0.7;
        ctx.font = '24px serif'; ctx.textAlign = 'center'; ctx.fillText(item.emoji, ix, iy);
      });
    }
    this.state.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
    ctx.globalAlpha = 1;
    const grad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.8);
    grad.addColorStop(0, 'rgba(0,0,0,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    if (this.state.area === 'island' && this.state.mouse.down) {
      const mx = this.state.mouse.x / W; const my = (this.state.mouse.y - groundY) / (H - groundY);
      if (my > 0.1 && my < 0.9 && mx > 0.05 && mx < 0.95) {
        const selectedItem = this.state.inventory[0];
        if (selectedItem && selectedItem.type === 'furniture') {
          this.state.islandItems.push({ ...selectedItem, x: mx, y: my * 1.2 });
          this.state.inventory.shift(); this.renderInventory(); this.toast(`Placed ${selectedItem.name}! 🏝️`, 'success');
        }
      }
      this.state.mouse.down = false;
    }
  }
}

// Color helpers for pixel art shading
function lightenColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.min(255, (num >> 16) + amt);
  const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
  const B = Math.min(255, (num & 0x0000FF) + amt);
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}
function hairShadow(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * percent);
  const R = Math.max(0, (num >> 16) - amt);
  const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
  const B = Math.max(0, (num & 0x0000FF) - amt);
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}
