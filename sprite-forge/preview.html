<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlight Sprite Forge — Preview</title>
<style>
:root { --bg: #1a1428; --panel: #2a2040; --accent: #ffd700; --text: #f0e6ff; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; padding: 2rem; }
h1 { color: var(--accent); font-size: 2rem; margin-bottom: 0.5rem; }
h2 { color: #7dd3c0; font-size: 1.2rem; margin: 2rem 0 1rem; border-bottom: 2px solid var(--panel); padding-bottom: 0.5rem; }
.sprite-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1.5rem; }
.sprite-card { background: var(--panel); border-radius: 12px; padding: 1rem; text-align: center; border: 2px solid #3a3060; }
.sprite-card canvas { image-rendering: pixelated; width: 128px; height: 192px; border-radius: 8px; background: #1a1428; }
.sprite-card .name { font-weight: bold; color: var(--accent); margin-top: 0.5rem; font-size: 0.9rem; }
.sprite-card .desc { font-size: 0.75rem; color: #a090c0; margin-top: 0.25rem; }
.controls { margin: 2rem 0; display: flex; gap: 1rem; flex-wrap: wrap; }
button { padding: 0.75rem 1.5rem; border-radius: 10px; border: 2px solid var(--accent); background: var(--panel); color: var(--accent); font-weight: bold; cursor: pointer; }
button:hover { background: var(--accent); color: var(--bg); }
.generator-output { margin-top: 2rem; }
</style>
</head>
<body>
<h1>🎨 Starlight Sprite Forge</h1>
<p>Procedural pixel art generator — Maplestory-style chibi sprites</p>

<div class="controls">
  <button onclick="generateBatch()">🎲 Generate 10 New Random Characters</button>
  <button onclick="regenerateCanonical()">✨ Regenerate 6 Canonical Characters</button>
  <button onclick="exportAll()">📦 Export All as PNG</button>
</div>

<h2>Canonical Characters (The 6 Kekos)</h2>
<div class="sprite-grid" id="canonical-grid"></div>

<h2>Random Travelers (Infinite Variations)</h2>
<div class="sprite-grid" id="random-grid"></div>

<div class="generator-output" id="output"></div>

<script src="SpriteForge.js"></script>
<script>
const { SpriteForge, CHARACTERS, generateRandomCharacter, mulberry32 } = window;

const forge = new SpriteForge();
const SCALE = 4; // 4x scale for visibility

function showSprite(canvas, name, desc, containerId) {
  const grid = document.getElementById(containerId);
  const card = document.createElement('div');
  card.className = 'sprite-card';
  
  // Create scaled preview
  const preview = document.createElement('canvas');
  preview.width = canvas.width * SCALE;
  preview.height = canvas.height * SCALE;
  const ctx = preview.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(canvas, 0, 0, preview.width, preview.height);
  
  card.appendChild(preview);
  
  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = name;
  card.appendChild(nameEl);
  
  const descEl = document.createElement('div');
  descEl.className = 'desc';
  descEl.textContent = desc;
  card.appendChild(descEl);
  
  grid.appendChild(card);
}

function regenerateCanonical() {
  document.getElementById('canonical-grid').innerHTML = '';
  CHARACTERS.forEach(char => {
    const sprite = forge.createSpriteSheet(char.id, char);
    showSprite(sprite.canvas, char.name, `${char.hairStyle} + ${char.outfitStyle}`, 'canonical-grid');
  });
}

function generateBatch() {
  const grid = document.getElementById('random-grid');
  // Keep existing + add new
  for (let i = 0; i < 10; i++) {
    const seed = Date.now() + i * 1337 + Math.floor(Math.random() * 10000);
    const char = generateRandomCharacter(seed);
    const sprite = forge.createSpriteSheet(char.id, char);
    showSprite(sprite.canvas, char.name, `${char.hairStyle} + ${char.outfitStyle} + ${char.accessories.length} accessories`, 'random-grid');
  }
}

function exportAll() {
  // Trigger download of all visible sprites
  document.querySelectorAll('.sprite-card canvas').forEach((canvas, i) => {
    const link = document.createElement('a');
    link.download = `starlight-sprite-${i}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
  alert('Exporting all visible sprites as PNG! Check your downloads folder.');
}

// Initial load
regenerateCanonical();
generateBatch();
</script>
</body>
</html>
